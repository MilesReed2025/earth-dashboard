name: Build & publish

on:
  push:
    branches: [main]
  release:
    types: [published]   # also tags a versioned image on each GitHub release

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/earth-dashboard

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # lets the job push to ghcr.io with the auto token

    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx let us cross-compile a single image for both
      # x86-64 servers and ARM64 (Raspberry Pi 4/5, Apple Silicon VMs, etc.)
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # reuse layer cache between runs
          cache-to:   type=gha,mode=max
