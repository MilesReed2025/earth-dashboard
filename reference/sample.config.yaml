# ─────────────────────────────────────────────
# Hearth dashboard config — hand-edited, committed to git
# Keep this file readable: comments and order matter.
# ─────────────────────────────────────────────

# Shared defaults referenced below via an anchor.
defaults: &refresh
  refreshSeconds: 30   # how often live widgets poll

settings:
  # NOTE: theme is intentionally first — I look at it most.
  theme:
    mode: dark
    accent: "#e8743b"   # warm ember
    density: comfortable
  title: Home            # browser tab + header
  startUrl: /

dashboard:
  groups:
    - name: Smart Home          # Home Assistant lives here
      widgets:
        - type: ha.entity
          entity: sensor.firth_of_forth_temp
          label: Sea Temp        # friendly name shown on the tile
          <<: *refresh
        - type: ha.toggle        # the one my partner actually uses
          entity: light.kitchen
          label: Kitchen

    - name: Media
      widgets:
        - type: jellyfin
          url: http://jellyfin.local:8096
          label: Jellyfin
          key: ${HEARTH_JELLYFIN_KEY}   # kept tile — this secret must survive
          <<: *refresh
        - type: sonarr
          url: http://sonarr.local:8989
          key: ${HEARTH_SONARR_KEY}   # secret via env, never committed plaintext

bookmarks:
  - group: Dev
    links:
      - { name: Gitea, url: https://git.local }   # flow style on purpose
      - { name: n8n,   url: https://n8n.local }
