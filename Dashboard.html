/* ─────────────────────────────────────────────────────────
   ONBOARDING WIZARD — shown on first boot
───────────────────────────────────────────────────────── */
function OnboardModal({ cfg, setCfg }) {
  const [step, setStep]           = useState(0);
  const [name, setName]           = useState(cfg.name || '');
  const [locQuery, setLocQuery]   = useState(cfg.location?.name || '');
  const [locResults, setLocResults] = useState([]);
  const [locSearching, setLocSearching] = useState(false);
  const [locPicked, setLocPicked] = useState(cfg.location || null);
  const [mistralKey, setMistralKey] = useState('');
  const [tmdbToken, setTmdbToken]   = useState('');
  const [lastfmKey, setLastfmKey]   = useState('');
  const [saving, setSaving]   = useState(false);
  const [saveErr, setSaveErr] = useState(null);

  const STEPS = 2;

  const dismiss = (andSave = false) => {
    const nc = { ...cfg, onboarded: true, name: name.trim() || cfg.name, ...(locPicked ? { location: locPicked } : {}) };
    if (andSave) {
      setCfg(nc); saveCfg(nc);
    } else {
      const skip = { ...cfg, onboarded: true };
      setCfg(skip); saveCfg(skip);
    }
  };

  const searchLoc = async () => {
    const q = locQuery.trim();
    if (!q) return;
    setLocSearching(true);
    setLocResults([]);
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);
      const j = await r.json();
      setLocResults(j.results || []);
    } catch {}
    setLocSearching(false);
  };

  const pickLoc = (r) => {
    const loc = { name: `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}`, lat: r.latitude, lng: r.longitude };
    setLocPicked(loc);
    setLocQuery(loc.name);
    setLocResults([]);
  };

  const launch = async () => {
    setSaving(true);
    setSaveErr(null);
    try {
      const keys = { mistralKey, tmdbToken, lastfmKey };
      const hasKeys = Object.values(keys).some(v => v.trim());
      if (hasKeys) {
        const r = await fetch('/api/onboard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(keys),
        });
        const text = await r.text();
        let j; try { j = JSON.parse(text); } catch { throw new Error(`Server error ${r.status} — is the server running?`); }
        if (!r.ok || j.error) throw new Error(j.error || `Server error ${r.status}`);
      }
      dismiss(true);
    } catch (e) {
      setSaveErr(String(e?.message || e));
      setSaving(false);
    }
  };

  const Dot = ({ i }) => {
    const cls = i < step ? 'done' : i === step ? 'active' : 'pending';
    return h('div', { className: `ob-dot ${cls}` });
  };

  // STEP 0 — Name + Location
  const step0 = () => h('div', { className: 'ob-body' },
    h('div', { className: 'ob-title' }, 'Welcome to EARTH'),
    h('div', { className: 'ob-sub' }, 'Your personal homelab dashboard. Let\'s get the basics set up — everything can be changed later in Settings.'),

    h('div', { className: 'ob-field' },
      h('label', { className: 'ob-label' }, 'Your name'),
      h('input', {
        className: 'ob-input', type: 'text', placeholder: 'e.g. Alex',
        value: name, onInput: e => setName(e.target.value),
        autoFocus: true,
      }),
    ),

    h('div', { className: 'ob-field' },
      h('label', { className: 'ob-label' }, 'Location (for weather)'),
      h('div', { style: { display: 'flex', gap: 7 } },
        h('input', {
          className: 'ob-input', type: 'text', placeholder: 'City or town…',
          value: locQuery, onInput: e => setLocQuery(e.target.value),
          onKeyDown: e => e.key === 'Enter' && searchLoc(),
          style: { flex: 1 },
        }),
        h('button', {
          type: 'button',
          className: 'ob-btn-pri',
          style: { padding: '8px 14px', flexShrink: 0 },
          onClick: searchLoc,
          disabled: locSearching,
        }, locSearching ? '…' : 'Search'),
      ),
      locPicked && h('div', { className: 'ob-hint' }, `✓ ${locPicked.name} (${locPicked.lat.toFixed(2)}, ${locPicked.lng.toFixed(2)})`),
      locResults.length > 0 && h('div', { className: 'ob-loc-results' },
        locResults.map((r, i) =>
          h('div', { key: i, className: 'ob-loc-result', onClick: () => pickLoc(r) },
            r.name,
            h('small', null, [r.admin1, r.country].filter(Boolean).join(', ')),
          )
        )
      ),
    ),

    h('div', { className: 'ob-actions' },
      h('button', { type: 'button', className: 'ob-btn-sec', onClick: () => dismiss(false) }, 'Skip for now'),
      h('button', { type: 'button', className: 'ob-btn-pri', onClick: () => setStep(1) }, 'Next →'),
    ),
  );

  // STEP 1 — API keys
  const IntRow = ({ label, desc, hint, hintUrl, hintText, value, onChange, secret }) =>
    h('div', { className: 'ob-int-row' },
      h('div', { className: 'ob-int-head' },
        h('span', { className: 'ob-int-name' }, label),
        h('span', { className: 'ob-int-badge' }, 'optional'),
      ),
      h('div', { className: 'ob-int-desc' }, desc),
      h('input', {
        className: 'ob-input mono',
        type: secret ? 'password' : 'text',
        placeholder: 'Paste key here…',
        value, onInput: e => onChange(e.target.value),
        autoComplete: 'off',
      }),
      hint && h('div', { className: 'ob-hint' },
        hintUrl ? h('a', { href: hintUrl, target: '_blank', rel: 'noopener' }, hintText || hintUrl) : hint
      ),
    );

  const step1 = () => h('div', { className: 'ob-body' },
    h('div', { className: 'ob-title' }, 'Connect services'),
    h('div', { className: 'ob-sub' }, 'All optional — add them now or later in Settings → Integrations.'),

    h('div', { className: 'ob-int-list' },
      h(IntRow, {
        label: 'Mistral AI', secret: true,
        desc: 'Powers AI-written weather descriptions for your 7-day forecast.',
        hint: 'console.mistral.ai', hintUrl: 'https://console.mistral.ai', hintText: 'console.mistral.ai — free tier available',
        value: mistralKey, onChange: setMistralKey,
      }),
      h(IntRow, {
        label: 'TMDB', secret: false,
        desc: 'Enables the Discover tab — browse trending films & TV with ratings.',
        hint: 'themoviedb.org/settings/api', hintUrl: 'https://www.themoviedb.org/settings/api', hintText: 'themoviedb.org/settings/api — free API key',
        value: tmdbToken, onChange: setTmdbToken,
      }),
      h(IntRow, {
        label: 'Last.fm', secret: false,
        desc: 'Shows your recently scrobbled tracks on the dashboard.',
        hint: 'last.fm/api', hintUrl: 'https://www.last.fm/api', hintText: 'last.fm/api — free API key',
        value: lastfmKey, onChange: setLastfmKey,
      }),
    ),

    saveErr && h('div', { className: 'ob-err' }, saveErr),

    h('div', { className: 'ob-actions' },
      h('button', { type: 'button', className: 'ob-btn-sec', onClick: () => setStep(0) }, '← Back'),
      h('button', {
        type: 'button', className: 'ob-btn-pri',
        onClick: launch, disabled: saving,
      }, saving ? 'Saving…' : 'Launch Dashboard →'),
    ),
  );

  return h('div', { className: 'modal-bg' },
    h('div', { className: 'modal ob-modal' },
      h('div', { className: 'ob-progress' },
        ...Array.from({ length: STEPS }, (_, i) => h(Dot, { key: i, i })),
      ),
      step === 0 ? step0() : step1(),
    ),
  );
}


/* ─────────────────────────────────────────────────────────
   TOAST NOTIFICATION SYSTEM
───────────────────────────────────────────────────────── */
const toastBus = { listeners: [], emit(t) { this.listeners.forEach(fn => fn(t)); } };

function ToastStack() {
  const [toasts, setToasts] = useState([]);

  useEffect(() => {
    const handler = (toast) => {
      const id = Date.now() + Math.random();
      setToasts(prev => [...prev, { ...toast, id }]);
      setTimeout(() => {
        setToasts(prev => prev.map(t => t.id === id ? { ...t, out: true } : t));
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 200);
      }, toast.duration || 5000);
    };
    toastBus.listeners.push(handler);
    return () => { toastBus.listeners = toastBus.listeners.filter(fn => fn !== handler); };
  }, []);

  if (!toasts.length) return null;
  return h('div', { className: 'toast-stack' },
    ...toasts.map(t =>
      h('div', { key: t.id, className: 'toast' + (t.out ? ' toast-out' : '') },
        h('div', { className: `toast-dot ${t.level || 'info'}` }),
        h('div', { className: 'toast-body' },
          h('div', { className: 'toast-title' }, t.title),
          t.body && h('div', { className: 'toast-msg' }, t.body),
        ),
        h('button', {
          className: 'toast-close',
          onClick: () => setToasts(prev => prev.filter(x => x.id !== t.id)),
        }, '×'),
      )
    )
  );
}

/* ─────────────────────────────────────────────────────────
   COMMAND PALETTE  (⌘S / Ctrl+S)
───────────────────────────────────────────────────────── */
function CommandPalette({ cfg, view, setView, open, onClose, dockerContainers }) {
  const [query, setQuery]   = useState('');
  const [active, setActive] = useState(0);
  const inputRef = useRef(null);
  const listRef  = useRef(null);

  useEffect(() => {
    if (open) { setQuery(''); setActive(0); setTimeout(() => inputRef.current?.focus(), 30); }
  }, [open]);

  // ── Build flat item list ──────────────────────────────────────────────────
  const allItems = React.useMemo(() => {
    const hidden = cfg.layout?.hiddenNav || [];
    const nav = [
      { group: 'Go to', icon: I.home,     label: 'Home',        action: () => { setView('home'); onClose(); } },
      { group: 'Go to', icon: I.news,     label: 'News',        action: () => { setView('news'); onClose(); }, skip: hidden.includes('news') },
      { group: 'Go to', icon: I.film,     label: 'Discover',    action: () => { setView('discover'); onClose(); }, skip: hidden.includes('discover') },
      { group: 'Go to', icon: I.srvr,     label: 'Services',    action: () => { setView('servers'); onClose(); }, skip: hidden.includes('servers') },
      { group: 'Go to', icon: I.bolt,     label: 'Automations', action: () => { setView('automations'); onClose(); }, skip: hidden.includes('automations') },
      { group: 'Go to', icon: I.docker,   label: 'Docker',      action: () => { setView('docker'); onClose(); }, skip: hidden.includes('docker') },
      { group: 'Go to', icon: I.settings, label: 'Settings',    action: () => { setView('settings'); onClose(); } },
    ].filter(x => !x.skip);

    const THEMES = ['dark','light','nord','catppuccin','gruvbox','dracula','tokyo','rosepine','solarized','monokai'];
    const THEME_LABELS = { dark:'Dark', light:'Light', nord:'Nord', catppuccin:'Catppuccin', gruvbox:'Gruvbox', dracula:'Dracula', tokyo:'Tokyo', rosepine:'Rosé Pine', solarized:'Solarized', monokai:'Monokai' };
    const themes = THEMES.map(t => ({
      group: 'Theme', icon: I.palette,
      label: THEME_LABELS[t],
      meta: t === (cfg.theme || 'dark') ? 'active' : '',
      action: () => { const n = { ...cfg, theme: t }; saveCfg(n); onClose(); },
    }));

    const services = (cfg.services || []).map(s => ({
      group: 'Services', icon: null, logo: s.logo || s.adapter,
      label: s.name, meta: s.url,
      action: () => { window.open(s.url, '_blank', 'noopener'); onClose(); },
    }));

    const links = (cfg.links || []).map(l => ({
      group: 'Links', icon: I.link,
      label: l.name, meta: l.desc || l.url,
      action: () => { window.open(l.url, '_blank', 'noopener'); onClose(); },
    }));

    const docker = (dockerContainers || []).map(ct => ({
      group: 'Docker', icon: I.docker,
      label: ct.name, meta: ct.status,
      dotColor: ct.state === 'running' ? 'var(--g)' : ct.state === 'restarting' ? 'oklch(78% 0.16 60)' : 'var(--r)',
      action: () => { setView('docker'); onClose(); },
    }));

    return [...nav, ...themes, ...services, ...links, ...docker];
  }, [cfg, dockerContainers]);

  // ── Fuzzy filter + score ──────────────────────────────────────────────────
  const filtered = React.useMemo(() => {
    const q = query.toLowerCase().trim();
    if (!q) {
      // No query: show nav + services only (keep list short)
      return allItems.filter(it => it.group === 'Go to' || it.group === 'Services');
    }
    const score = (it) => {
      const haystack = [it.label, it.meta || '', it.group].join(' ').toLowerCase();
      if (!haystack.includes(q)) return -1;
      // Prefer label-start matches → label-anywhere → meta/group
      if (it.label.toLowerCase().startsWith(q)) return 3;
      if (it.label.toLowerCase().includes(q))   return 2;
      return 1;
    };
    return allItems
      .map(it => ({ it, s: score(it) }))
      .filter(({ s }) => s >= 0)
      .sort((a, b) => b.s - a.s)
      .map(({ it }) => it);
  }, [allItems, query]);

  useEffect(() => { setActive(0); }, [query]);

  // Keyboard nav
  const onKey = e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(a => Math.min(a + 1, filtered.length - 1)); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setActive(a => Math.max(a - 1, 0)); }
    if (e.key === 'Enter')     { e.preventDefault(); filtered[active]?.action?.(); }
    if (e.key === 'Escape')    { onClose(); }
  };

  // Scroll active into view
  useEffect(() => {
    listRef.current?.querySelector('.pal-active')?.scrollIntoView({ block: 'nearest' });
  }, [active]);

  // Group for display — preserve filtered order, just add headers
  const grouped = React.useMemo(() => {
    const out = [];
    let lastGroup = null;
    filtered.forEach((it, i) => {
      if (it.group !== lastGroup) { out.push({ type: 'header', label: it.group }); lastGroup = it.group; }
      out.push({ type: 'item', it, idx: i });
    });
    return out;
  }, [filtered]);

  if (!open) return null;

  return h('div', { className: 'pal-backdrop', onClick: e => { if (e.target === e.currentTarget) onClose(); } },
    h('div', { className: 'pal-box' },
      // Input
      h('div', { className: 'pal-input-row' },
        h(Icon, { d: I.search, size: 16, style: { color: 'var(--t4)', flexShrink: 0 } }),
        h('input', {
          ref: inputRef, className: 'pal-input',
          placeholder: 'Search pages, services, themes…',
          value: query, onChange: e => setQuery(e.target.value), onKeyDown: onKey,
        }),
        query
          ? h('button', { type:'button', className:'pal-clear', onClick: () => setQuery('') }, '✕')
          : h('span', { className: 'pal-kbd' }, '⌘S'),
      ),
      // Results
      h('div', { className: 'pal-results', ref: listRef },
        filtered.length === 0
          ? h('div', { className: 'pal-empty' }, 'Nothing matching "', query, '"')
          : grouped.map((row, ri) =>
              row.type === 'header'
                ? h('div', { key: 'h-' + row.label + ri, className: 'pal-group-label' }, row.label)
                : h('div', {
                    key: 'i-' + row.idx,
                    className: 'pal-item' + (row.idx === active ? ' pal-active' : ''),
                    onClick: row.it.action,
                    onMouseEnter: () => setActive(row.idx),
                  },
                    h('div', { className: 'pal-item-icon' },
                      row.it.dotColor
                        ? h('span', { style: { display:'inline-block', width:7, height:7, borderRadius:'50%', background: row.it.dotColor } })
                        : row.it.logo
                          ? h('img', { src: `/icons/${row.it.logo}.svg`, width: 15, height: 15, style: { objectFit:'contain' }, onError: e => { e.target.style.display='none'; } })
                          : h(Icon, { d: row.it.icon || I.home, size: 14 }),
                    ),
                    h('span', { className: 'pal-item-name' }, row.it.label),
                    row.it.meta && h('span', { className: 'pal-item-meta' + (row.it.meta === 'active' ? ' pal-item-active' : '') }, row.it.meta.length > 45 ? row.it.meta.slice(0,45)+'…' : row.it.meta),
                  )
            )
      ),
      // Footer
      h('div', { className: 'pal-footer' },
        h('span', { className: 'pal-footer-key' }, h('span', { className: 'pal-kbd' }, '↑↓'), ' navigate'),
        h('span', { className: 'pal-footer-key' }, h('span', { className: 'pal-kbd' }, '↵'), ' open'),
        h('span', { className: 'pal-footer-key' }, h('span', { className: 'pal-kbd' }, 'Esc'), ' close'),
      ),
    )
  );
}


/* ─────────────────────────────────────────────────────────
   DOCKER VIEW
───────────────────────────────────────────────────────── */
function useDockerAvailable() {
  const [avail, setAvail] = useState(null);
  useEffect(() => {
    fetch('/api/docker/ping')
      .then(r => r.json())
      .then(d => setAvail(d.ok))
      .catch(() => setAvail(false));
  }, []);
  return avail;
}

function DockerView() {
  const [containers, setContainers]     = useState(null);
  const [error, setError]               = useState(null);
  const [selected, setSelected]         = useState(null);
  const selectedRef = useRef(null);
  const [tab, setTab]                   = useState('logs'); // logs | stats | info
  const [logs, setLogs]                 = useState('');
  const [logsLoading, setLogsLoading]   = useState(false);
  const [logFilter, setLogFilter]       = useState('');
  const [confirming, setConfirming]     = useState(null);
  const [statsMap, setStatsMap]         = useState({});
  const [statsHistory, setStatsHistory] = useState({}); // id → [{cpu,mem,ts}]
  const [search, setSearch]             = useState('');
  const logRef = useRef(null);

  // Keep a ref in sync so the interval closure always reads the current value
  useEffect(() => { selectedRef.current = selected; }, [selected]);

  // ── Load container list every 15 s ───────────────────────────────────────
  const load = () =>
    fetch('/api/docker/containers')
      .then(r => r.json())
      .then(d => {
        if (Array.isArray(d)) {
          setContainers(d);
          window.__earthDockerContainers = d;
          if (selectedRef.current && !d.find(c => c.id === selectedRef.current)) setSelected(null);
        } else setError(d.error);
      })
      .catch(e => setError(e.message));

  useEffect(() => { load(); const t = setInterval(load, 15000); return () => clearInterval(t); }, []);

  // ── Logs polling when selected + logs tab ────────────────────────────────
  useEffect(() => {
    if (!selected || tab !== 'logs') return;
    setLogsLoading(true);
    const fetchLogs = () =>
      fetch(`/api/docker/logs/${selected}?tail=400`)
        .then(r => r.json())
        .then(d => { setLogs(d.logs || d.error || ''); setLogsLoading(false); })
        .catch(() => setLogsLoading(false));
    fetchLogs();
    const t = setInterval(fetchLogs, 6000);
    return () => clearInterval(t);
  }, [selected, tab]);

  useEffect(() => {
    if (logRef.current && !logFilter) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs]);

  // ── Stats polling when stats tab ─────────────────────────────────────────
  useEffect(() => {
    if (!selected || tab !== 'stats') return;
    const fetchStats = () =>
      fetch(`/api/docker/stats/${selected}`)
        .then(r => r.json())
        .then(s => {
          if (!s.error) {
            setStatsMap(prev => ({ ...prev, [selected]: s }));
            setStatsHistory(prev => {
              const hist = [...(prev[selected] || []), { ...s, ts: Date.now() }].slice(-30);
              return { ...prev, [selected]: hist };
            });
          }
        })
        .catch(() => {});
    fetchStats();
    const t = setInterval(fetchStats, 3000);
    return () => clearInterval(t);
  }, [selected, tab]);

  const restart = id => {
    setConfirming(null);
    fetch(`/api/docker/restart/${id}`, { method: 'POST' }).then(() => setTimeout(load, 2000));
    toastBus.emit({ level: 'info', title: 'Restarting container', body: containers?.find(c=>c.id===id)?.name });
  };
  const stop = id => {
    setConfirming(null);
    fetch(`/api/docker/stop/${id}`, { method: 'POST' }).then(() => setTimeout(load, 2000));
    toastBus.emit({ level: 'warn', title: 'Stopping container', body: containers?.find(c=>c.id===id)?.name });
  };

  const stateColor = s => s === 'running' ? 'var(--g)' : s === 'restarting' ? 'oklch(78% 0.16 60)' : 'var(--r)';

  // Group by compose project label (containers carry Names[] only; we infer project from name prefix)
  const grouped = React.useMemo(() => {
    if (!containers) return {};
    const q = search.toLowerCase().trim();
    // Search: name, image, state, project
    const filtered = q
      ? containers.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.image.toLowerCase().includes(q) ||
          c.state.toLowerCase().includes(q) ||
          (c.project || '').toLowerCase().includes(q)
        )
      : containers;
    const groups = {};
    filtered.forEach(c => {
      // Use actual Docker Compose project label when available; fall back to 'standalone'
      const project = c.project || 'standalone';
      if (!groups[project]) groups[project] = [];
      groups[project].push(c);
    });
    return groups;
  }, [containers, search]);

  const selContainer = containers?.find(c => c.id === selected);

  // Sparkline SVG helper
  const Sparkline = ({ data, key_ }) => {
    if (!data || data.length < 2) return null;
    const max = Math.max(...data, 1);
    const W = 80, H = 28;
    const pts = data.map((v, i) => `${(i / (data.length-1)) * W},${H - (v/max)*H}`).join(' ');
    return h('svg', { width: W, height: H, style: { overflow: 'visible' } },
      h('polyline', { points: pts, fill: 'none', stroke: 'var(--a)', strokeWidth: 1.5, strokeLinejoin: 'round', strokeLinecap: 'round' }),
    );
  };

  if (error) return h('div', { className: 'docker-error' },
    h('p', null, 'Docker socket unavailable'),
    h('code', null, error),
    h('p', { style: { fontSize: '.73rem', color: 'var(--t4)', marginTop: 8 } },
      'Add to docker-compose.yml volumes: ', h('code', null, '/var/run/docker.sock:/var/run/docker.sock')),
  );

  const filteredLogs = logFilter
    ? logs.split('\n').filter(l => l.toLowerCase().includes(logFilter.toLowerCase())).join('\n')
    : logs;

  return h('div', { className: 'docker-layout' },

    // ══ LEFT: container list ════════════════════════════════════════════════
    h('div', { className: 'docker-list' },

      // Header + search
      h('div', { className: 'docker-list-hd' },
        h('div', { className: 'docker-list-title-row' },
          h('span', { className: 'docker-list-title' }, 'Containers'),
          containers && h('span', { className: 'docker-list-badge' },
            `${containers.filter(c=>c.state==='running').length}/${containers.length}`),
          h('button', { type: 'button', className: 'docker-refresh', onClick: load, title: 'Refresh' },
            h(Icon, { d: I.refresh, size: 13 })),
        ),
        h('div', { className: 'docker-search-row' },
          h(Icon, { d: I.search, size: 12, style: { color: 'var(--t4)', flexShrink: 0 } }),
          h('input', {
            className: 'docker-search', placeholder: 'Search name, image, state…',
            value: search, onChange: e => setSearch(e.target.value),
          }),
          search && h('button', {
            type: 'button', className: 'docker-search-clear',
            onClick: () => setSearch(''),
            title: 'Clear',
          }, '✕'),
        ),
      ),

      // Groups
      !containers
        ? h('div', { className: 'docker-list-loading' },
            h('svg', { width: 13, height: 13, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, className: 'spin' },
              h('path', { d: 'M21 12a9 9 0 11-6.219-8.56' })),
            ' Loading…')
        : Object.keys(grouped).length === 0
          ? h('div', { className: 'docker-empty-search' },
              h(Icon, { d: I.search, size: 16, style: { opacity: .3 } }),
              h('span', null, `No containers matching "${search}"`),
            )
          : h('div', { className: 'docker-groups' },
            ...Object.entries(grouped).map(([project, cts]) =>
              h('div', { key: project, className: 'docker-group' },
                Object.keys(grouped).length > 1 && h('div', { className: 'docker-group-label' }, project),
                ...cts.map(ct =>
                  h('div', {
                    key: ct.id,
                    className: 'docker-row' + (ct.id === selected ? ' active' : '') + (ct.state !== 'running' ? ' stopped' : ''),
                    onClick: () => { setSelected(ct.id === selected ? null : ct.id); setTab('logs'); },
                  },
                    h('div', { className: 'docker-state-dot', style: { background: stateColor(ct.state), flexShrink: 0 } }),
                    h('div', { className: 'docker-row-info' },
                      h('span', { className: 'docker-row-name' }, ct.name),
                      h('span', { className: 'docker-row-img' }, ct.image.split('/').pop().split(':')[0]),
                    ),
                    statsMap[ct.id] && h('span', { className: 'docker-row-cpu' }, `${statsMap[ct.id].cpu}%`),
                  )
                )
              )
            )
          )
    ),

    // ══ RIGHT: detail panel ════════════════════════════════════════════════
    h('div', { className: 'docker-detail' },
      !selected
        ? h('div', { className: 'docker-detail-empty' },
            h(Icon, { d: I.docker, size: 28, style: { color: 'var(--t4)', opacity: .4 } }),
            h('p', null, 'Select a container'),
          )
        : h(React.Fragment, null,

          // Detail header
          h('div', { className: 'docker-detail-hd' },
            h('div', { className: 'docker-state-dot', style: { background: stateColor(selContainer?.state) } }),
            h('div', { className: 'docker-detail-hd-text' },
              h('span', { className: 'docker-detail-name' }, selContainer?.name),
              h('span', { className: 'docker-detail-status' }, selContainer?.status),
            ),
            h('div', { className: 'docker-detail-actions' },
              confirming === selected
                ? h('div', { className: 'docker-confirm' },
                    h('span', null, 'Restart?'),
                    h('button', { type: 'button', className: 'docker-confirm-yes', onClick: () => restart(selected) }, 'Yes'),
                    h('button', { type: 'button', className: 'docker-confirm-no',  onClick: () => setConfirming(null) }, 'No'),
                  )
                : h(React.Fragment, null,
                    selContainer?.state === 'running' && h('button', {
                      type: 'button', className: 'docker-act-btn',
                      onClick: () => setConfirming(selected), title: 'Restart',
                    }, h(Icon, { d: I.refresh, size: 13 }), ' Restart'),
                  )
            ),
          ),

          // Tabs
          h('div', { className: 'docker-tabs' },
            ['logs', 'stats', 'info'].map(t =>
              h('button', {
                key: t, type: 'button',
                className: 'docker-tab' + (tab === t ? ' on' : ''),
                onClick: () => setTab(t),
              }, t.charAt(0).toUpperCase() + t.slice(1))
            )
          ),

          // ── LOGS TAB ────────────────────────────────────────────────────
          tab === 'logs' && h('div', { className: 'docker-tab-body' },
            h('div', { className: 'docker-log-filter-row' },
              h(Icon, { d: I.search, size: 12, style: { color: 'var(--t4)', flexShrink: 0 } }),
              h('input', {
                className: 'docker-log-filter', placeholder: 'Filter logs…',
                value: logFilter, onChange: e => setLogFilter(e.target.value),
              }),
              logsLoading && h('span', { className: 'docker-log-live' }, 'live'),
            ),
            h('pre', { className: 'docker-log-body', ref: logRef },
              filteredLogs || (logsLoading ? 'Loading…' : 'No logs'),
            ),
          ),

          // ── STATS TAB ───────────────────────────────────────────────────
          tab === 'stats' && h('div', { className: 'docker-tab-body docker-stats-body' },
            (() => {
              const s    = statsMap[selected];
              const hist = statsHistory[selected] || [];
              if (!s) return h('div', { className: 'docker-stats-loading' }, 'Collecting stats…');
              const cpuHist = hist.map(h => h.cpu);
              const memHist = hist.map(h => h.memPct);
              return h(React.Fragment, null,
                h('div', { className: 'docker-stat-card' },
                  h('div', { className: 'docker-stat-label' }, 'CPU'),
                  h('div', { className: 'docker-stat-val' }, `${s.cpu}%`),
                  h('div', { className: 'docker-stat-bar-wrap' },
                    h('div', { className: 'docker-stat-bar', style: { width: `${Math.min(s.cpu, 100)}%`, background: s.cpu > 80 ? 'var(--r)' : s.cpu > 50 ? 'oklch(78% 0.16 60)' : 'var(--a)' } }),
                  ),
                  h(Sparkline, { data: cpuHist }),
                ),
                h('div', { className: 'docker-stat-card' },
                  h('div', { className: 'docker-stat-label' }, 'Memory'),
                  h('div', { className: 'docker-stat-val' }, `${s.memMB} MB`, h('span', { className: 'docker-stat-pct' }, ` (${s.memPct}%)`)),
                  h('div', { className: 'docker-stat-bar-wrap' },
                    h('div', { className: 'docker-stat-bar', style: { width: `${Math.min(s.memPct, 100)}%`, background: s.memPct > 85 ? 'var(--r)' : s.memPct > 65 ? 'oklch(78% 0.16 60)' : 'var(--g)' } }),
                  ),
                  h(Sparkline, { data: memHist }),
                ),
              );
            })()
          ),

          // ── INFO TAB ────────────────────────────────────────────────────
          tab === 'info' && h('div', { className: 'docker-tab-body docker-info-body' },
            selContainer && h(React.Fragment, null,
              h('div', { className: 'docker-info-row' },
                h('span', { className: 'docker-info-lbl' }, 'Image'),
                h('span', { className: 'docker-info-val' }, selContainer.image),
              ),
              h('div', { className: 'docker-info-row' },
                h('span', { className: 'docker-info-lbl' }, 'Container ID'),
                h('span', { className: 'docker-info-val docker-info-mono' }, selContainer.id),
              ),
              h('div', { className: 'docker-info-row' },
                h('span', { className: 'docker-info-lbl' }, 'State'),
                h('span', { className: 'docker-info-val' }, selContainer.status),
              ),
              selContainer.ports.length > 0 && h('div', { className: 'docker-info-row' },
                h('span', { className: 'docker-info-lbl' }, 'Ports'),
                h('div', { className: 'docker-info-ports' },
                  selContainer.ports.map(p => h('span', { key: p, className: 'docker-port-chip' }, p))
                ),
              ),
              h('div', { className: 'docker-info-row' },
                h('span', { className: 'docker-info-lbl' }, 'Created'),
                h('span', { className: 'docker-info-val' },
                  new Date(selContainer.created * 1000).toLocaleString()),
              ),
            )
          ),
        )
    )
  );
}



function App() {
  const [cfg, setCfg] = useState(loadCfg);
  const [view, setView] = useState('home');
  const [collapsed, setCollapsed] = useState(false);
  // Redirect to home if current view gets hidden in layout settings
  React.useEffect(() => {
    const hidden = cfg.layout?.hiddenNav || [];
    if (hidden.includes(view)) setView('home');
  }, [cfg.layout?.hiddenNav]);
  const [now, setNow] = useState(new Date());
  const [mode, setMode] = useState(() => getAutoMode(loadCfg()) || 'personal');
  const [backend, setBackend] = useState(false);
  const [paletteOpen, setPaletteOpen] = useState(false);

  // Backend handshake: prefer earth.yaml via /api/config, then subscribe to
  // /ws so external edits ($EDITOR, git pull) refresh the UI live.
  useEffect(() => {
    let ws = null, retry = null, dead = false;
    backendProbe.then(remote => {
      if (dead || !remote) return;
      setCfg(remote);
      setBackend(true);
      const connect = () => {
        try {
          ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
          ws.onmessage = e => {
            try {
              const m = JSON.parse(e.data);
              if (m.type === 'alert') {
                toastBus.emit(m.payload);
                if (document.hidden && m.payload?.title && Notification.permission === 'granted') {
                  new Notification('EARTH · ' + m.payload.title, { body: m.payload.body || '', icon: '/icons/earth.svg' });
                }
                return;
              }
              if (m.type === 'config' && m.payload) {
                // ignore the echo of a save we just made (avoids clobbering fast typing)
                if (Date.now() - lastLocalSaveAt < 1500) return;
                setCfg({ ...DEFAULTS, ...m.payload });
              }
            } catch {}
          };
          ws.onclose = () => { if (!dead) retry = setTimeout(connect, 3000); };
        } catch {}
      };
      connect();
    });
    return () => { dead = true; clearTimeout(retry); if (ws) { ws.onclose = null; ws.close(); } };
  }, []);

  // ⌘S / Ctrl+S → command palette
  useEffect(() => {
    const handler = e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        setPaletteOpen(p => !p);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // Request notification permission once when backend is live
  useEffect(() => {
    if (backend && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, [backend]);

  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(id);
  }, []);

  // Auto-switch mode on each clock tick when enabled
  useEffect(() => {
    const auto = getAutoMode(cfg);
    if (auto !== null) setMode(auto);
  }, [now]);

  // Apply theme on mount and whenever cfg changes
  useEffect(() => {
    document.body.dataset.theme = cfg.theme !== 'dark' ? (cfg.theme || '') : '';
  }, [cfg.theme]);


  const isFileOrigin = location.protocol === 'file:';

  return h('div', { className: `frame${collapsed ? ' col' : ''}` },
    // FIRST-BOOT ONBOARDING
    !cfg.onboarded && h(OnboardModal, { cfg, setCfg }),
    // FILE:// WARNING BANNER
    isFileOrigin && h('div', { style: {
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 9999,
      background: 'oklch(55% 0.18 55)', color: 'oklch(98% 0.01 55)',
      padding: '9px 20px', fontSize: '.75rem', fontWeight: 500,
      display: 'flex', alignItems: 'center', gap: 10,
      boxShadow: '0 2px 8px oklch(0% 0 0 / .2)',
    }},
      h('span', null, '⚠'),
      h('span', null, 'Open via the server — feeds, stats, and settings won\'t work from a file:// URL. Run: '),
      h('code', { style: {
        background: 'oklch(45% 0.15 55)', borderRadius: 4,
        padding: '1px 7px', fontFamily: 'monospace', fontSize: '.8rem',
      }}, 'node server.mjs'),
      h('span', null, ' then visit '),
      h('a', { href: 'http://localhost:8787', style: { color: 'inherit', fontWeight: 700 } }, 'http://localhost:8787'),
    ),
    // SIDEBAR
    h('nav', { className: 'sidebar' },
      h('div', { className: 'brand' },
        h('div', { className: 'brand-mark' }, h(EarthIcon)),
        h('span', { className: 'brand-name' }, 'EARTH')
      ),
      h('div', { className: 'ni' + (view === 'home' ? ' on' : ''), onClick: () => setView('home'), 'data-label': 'Home' },
        h(Icon, { d: I.home }), h('span', { className: 'ni-lbl' }, 'Home')
      ),
      h('div', { style: { width: 'calc(100% - 16px)', margin: '6px 8px', height: 1, background: 'var(--b)', flexShrink: 0 } }),
      !(cfg.layout?.hiddenNav || []).includes('news') && h('div', { className: 'ni' + (view === 'news' ? ' on' : ''), onClick: () => setView('news'), 'data-label': 'News' },
        h(Icon, { d: I.news }), h('span', { className: 'ni-lbl' }, 'News')
      ),
      !(cfg.layout?.hiddenNav || []).includes('discover') && h('div', { className: 'ni' + (view === 'discover' ? ' on' : ''), onClick: () => setView('discover'), 'data-label': 'Discover' },
        h(Icon, { d: I.film }), h('span', { className: 'ni-lbl' }, 'Discover')
      ),
      !(cfg.layout?.hiddenNav || []).includes('servers') && h('div', { className: 'ni' + (view === 'servers' ? ' on' : ''), onClick: () => setView('servers'), 'data-label': 'Services' },
        h(Icon, { d: I.srvr }), h('span', { className: 'ni-lbl' }, 'Services')
      ),
      !(cfg.layout?.hiddenNav || []).includes('automations') && h('div', { className: 'ni' + (view === 'automations' ? ' on' : ''), onClick: () => setView('automations'), 'data-label': 'Automations' },
        h(Icon, { d: I.bolt }), h('span', { className: 'ni-lbl' }, 'Automations')
      ),
      !(cfg.layout?.hiddenNav || []).includes('docker') && h('div', {
        className: 'ni' + (view === 'docker' ? ' on' : ''),
        onClick: () => setView('docker'), 'data-label': 'Docker',
      }, h(Icon, { d: I.srvr }), h('span', { className: 'ni-lbl' }, 'Docker')),
      h('div', { className: 'sb-foot' },
        (cfg.layout?.showModePill !== false) && h('div', { className: 'mode-toggle' },
          h('div', { className: 'mode-pill' },
            h('button', { type: 'button',
              className: 'mode-btn' + (mode === 'work' ? ' on' : ''),
              onClick: () => setMode('work'),
              'data-label': 'Work',
              title: 'Work mode',
            },
              h(Icon, { d: I.brief, size: 13 }),
              h('span', { className: 'mode-btn-lbl' }, 'Work'),
            ),
            h('button', { type: 'button',
              className: 'mode-btn' + (mode === 'personal' ? ' on' : ''),
              onClick: () => setMode('personal'),
              'data-label': 'Personal',
              title: 'Personal mode',
            },
              h(Icon, { d: I.home, size: 13 }),
              h('span', { className: 'mode-btn-lbl' }, 'Personal'),
            ),
          ),
        ),
        h('div', { style: { height: 1, background: 'var(--b)', margin: '4px 8px' } }),
        h('div', { className: 'usr' },
          h('div', { className: 'av' }, (cfg.name || 'U')[0].toUpperCase()),
          h('div', { className: 'usr-info' },
            h('span', { className: 'usr-name' }, cfg.name || 'User'),
            cfg.location?.name && h('span', { className: 'usr-loc' }, cfg.location.name),
          )
        ),
        h('div', { style: { height: 1, background: 'var(--b)', margin: '4px 8px' } }),
        h('div', { className: 'ni' + (view === 'settings' ? ' on' : ''), onClick: () => setView('settings'), 'data-label': 'Settings', title: 'Settings' },
          h(Icon, { d: I.settings }), h('span', { className: 'ni-lbl' }, 'Settings')
        ),
        h('button', { type: 'button', className: 'col-btn', onClick: () => setCollapsed(c => !c) },
          h(Icon, { d: I.collapse }),
          h('span', { className: 'col-lbl' }, 'Collapse')
        )
      )
    ),

    // MOBILE BOTTOM NAV (hidden via CSS on desktop, shown ≤600px)
    h('nav', { className: 'mobile-nav' },
      ...[
        { key: 'home',        icon: I.home,   label: 'Home'     },
        { key: 'news',        icon: I.news,   label: 'News',     hidden: (cfg.layout?.hiddenNav||[]).includes('news')        },
        { key: 'discover',    icon: I.film,   label: 'Discover', hidden: (cfg.layout?.hiddenNav||[]).includes('discover')    },
        { key: 'servers',     icon: I.srvr,   label: 'Services', hidden: (cfg.layout?.hiddenNav||[]).includes('servers')     },
        { key: 'automations', icon: I.bolt,   label: 'Autos',    hidden: (cfg.layout?.hiddenNav||[]).includes('automations') },
        { key: 'settings',    icon: I.settings, label: 'Settings' },
      ]
        .filter(n => !n.hidden)
        .slice(0, 5)
        .map(n =>
          h('button', {
            key: n.key,
            type: 'button',
            className: 'mobile-nav-btn' + (view === n.key ? ' on' : ''),
            onClick: () => setView(n.key),
          },
            h(Icon, { d: n.icon, size: 20 }),
            h('span', { className: 'mobile-nav-btn-lbl' }, n.label),
          )
        )
    ),

    // INNER
    h('div', { className: 'inner' },
      h(CommandPalette, { cfg, view, setView, open: paletteOpen, onClose: () => setPaletteOpen(false), dockerContainers: window.__earthDockerContainers }),
      h(ToastStack, null),
      h('div', { className: 'topbar', style: { position: 'relative' } },
        (cfg.layout?.showResources !== false) && h(TopbarStats, { backend }),
        (cfg.layout?.showStatus !== false) && h(TopbarStatus, { services: cfg.externalStatus, backend }),
        h('div', { className: 'tb-r' },
          window.EARTH_DEMO && h('div', { className: 'demo-pill', title: 'Demo mode — configure your own at localhost:8787' }, 'Demo'),
          h(ClockChip),
          (() => {
            const THEMES = ['dark','light','nord','catppuccin','gruvbox','dracula','tokyo','rosepine','solarized','monokai'];
            const THEME_LABELS = { dark: 'Dark', light: 'Light', nord: 'Nord', catppuccin: 'Cat', gruvbox: 'Gruvbox', dracula: 'Dracula', tokyo: 'Tokyo', rosepine: 'Rosé Pine', solarized: 'Solarized', monokai: 'Monokai' };
            const cur = cfg.theme || 'dark';
            const nextT = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
            return h('div', {
              className: 'theme-chip',
              onClick: () => { setCfg(p => { const n = {...p, theme: nextT}; saveCfg(n); return n; }); document.body.dataset.theme = nextT !== 'dark' ? nextT : ''; },
              title: `Theme: ${THEME_LABELS[cur] || cur} → ${THEME_LABELS[nextT] || nextT}`,
            },
              h(Icon, { d: cur === 'light' ? I.sun : I.moon, size: 12 }),
              h('span', null, THEME_LABELS[cur] || cur),
            );
          })(),
        )
      ),
      h('div', { className: 'scroll' },
        view === 'home'        ? h(HomeView, { cfg, setCfg, mode, goSettings: () => setView('settings'), backend })
        : view === 'settings'  ? h(SettingsView, { cfg, setCfg, backend })
        : view === 'docker'    ? h(DockerView, null)
        : view === 'news'      ? h(NewsView, { feeds: cfg.feeds, mode })
        : view === 'discover'  ? h(DiscoverView, { cfg })
        : view === 'servers'   ? h(ServersView, { cfg, mode, backend })
        : view === 'automations' ? h(AutomationsView, { cfg })
        : h(HomeView, { cfg, setCfg, mode, goSettings: () => setView('settings'), backend })
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
