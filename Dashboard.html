<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ── EARTH OKLCH PALETTE ─────────────────────────────── */
    :root {
      --desk:  oklch(9% 0.016 236);
      --frame: oklch(12.5% 0.018 233);
      --inner: oklch(15.5% 0.019 230);
      --s1:    oklch(19% 0.02 228);
      --s2:    oklch(23% 0.022 226);
      --t1: oklch(93% 0.01 228);
      --t2: oklch(72% 0.016 228);
      --t3: oklch(52% 0.02 228);
      --t4: oklch(36% 0.018 228);
      --b:  oklch(21% 0.02 228);
      --b2: oklch(28% 0.026 226);
      --a:     oklch(76% 0.006 228);
      --a-lo:  oklch(100% 0 0 / .07);
      --g:     oklch(72% 0.17 154);
      --g-lo:  oklch(20% 0.05 154);
      --r:     oklch(65% 0.2 25);
    }
    [data-theme="light"] {
      --desk:  oklch(80% 0.035 228);
      --frame: oklch(87% 0.022 226);
      --inner: oklch(95% 0.008 224);
      --s1:    oklch(92% 0.012 222);
      --s2:    oklch(88% 0.016 220);
      --t1: oklch(12% 0.016 232);
      --t2: oklch(28% 0.02 230);
      --t3: oklch(48% 0.022 228);
      --t4: oklch(65% 0.016 226);
      --b:  oklch(85% 0.018 224);
      --b2: oklch(78% 0.024 222);
      --a:    oklch(28% 0.006 228);
      --a-lo: oklch(0% 0 0 / .07);
      --g:    oklch(40% 0.18 155);
      --g-lo: oklch(92% 0.04 155);
      --r:    oklch(45% 0.18 25);
    }

    body {
      background: var(--desk);
      font-family: 'Geist', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background .3s;
    }

    /* ── FRAME ───────────────────────────────────────────── */
    .frame {
      position: fixed; inset: 12px;
      display: flex;
      background: var(--frame);
      border: 1px solid var(--b);
      border-radius: 22px;
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .72), 0 2px 4px oklch(0% 0 0 / .35);
      overflow: hidden;
      --sw: 204px; --sc: 54px;
      transition: background .3s, border-color .3s;
    }
    [data-theme="light"] .frame {
      box-shadow: 0 20px 50px -12px oklch(0% 0 0 / .14), 0 1px 3px oklch(0% 0 0 / .07);
    }

    /* ── NORD ──────────────────────────────────────────────── */
    [data-theme="nord"] {
      --desk:  oklch(23% 0.022 252);
      --frame: oklch(27% 0.025 250);
      --inner: oklch(31% 0.027 248);
      --s1:    oklch(35% 0.030 246);
      --s2:    oklch(39% 0.028 244);
      --t1: oklch(93% 0.010 240);
      --t2: oklch(84% 0.010 238);
      --t3: oklch(76% 0.013 240);
      --t4: oklch(60% 0.016 242);
      --b:  oklch(30% 0.028 248);
      --b2: oklch(38% 0.028 246);
      --a:     oklch(78% 0.006 248);
      --a-lo:  oklch(100% 0 0 / .07);
      --g:     oklch(72% 0.11 149);
      --g-lo:  oklch(22% 0.04 149);
      --r:     oklch(56% 0.14 18);
    }
    [data-theme="nord"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .65), 0 2px 4px oklch(0% 0 0 / .3);
    }

    /* ── CATPPUCCIN (Mocha) ─────────────────────────────────── */
    [data-theme="catppuccin"] {
      --desk:  oklch(13% 0.020 290);
      --frame: oklch(16% 0.022 288);
      --inner: oklch(19% 0.024 286);
      --s1:    oklch(23% 0.026 284);
      --s2:    oklch(28% 0.025 282);
      --t1: oklch(88% 0.040 276);
      --t2: oklch(78% 0.035 272);
      --t3: oklch(72% 0.026 274);
      --t4: oklch(57% 0.022 276);
      --b:  oklch(21% 0.025 286);
      --b2: oklch(29% 0.026 284);
      --a:     oklch(80% 0.006 290);
      --a-lo:  oklch(100% 0 0 / .07);
      --g:     oklch(82% 0.13 152);
      --g-lo:  oklch(18% 0.04 152);
      --r:     oklch(70% 0.14 10);
    }
    [data-theme="catppuccin"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .70), 0 2px 4px oklch(0% 0 0 / .35);
    }

    /* ── GRUVBOX ────────────────────────────────────────────── */
    [data-theme="gruvbox"] {
      --desk:  oklch(18% 0.014 64);
      --frame: oklch(22% 0.016 62);
      --inner: oklch(26% 0.018 60);
      --s1:    oklch(30% 0.020 58);
      --s2:    oklch(35% 0.019 56);
      --t1: oklch(89% 0.042 88);
      --t2: oklch(79% 0.036 85);
      --t3: oklch(72% 0.028 80);
      --t4: oklch(57% 0.020 75);
      --b:  oklch(25% 0.018 61);
      --b2: oklch(32% 0.020 59);
      --a:     oklch(78% 0.008 64);
      --a-lo:  oklch(100% 0 0 / .07);
      --g:     oklch(73% 0.15 120);
      --g-lo:  oklch(20% 0.05 120);
      --r:     oklch(48% 0.17 26);
    }
    [data-theme="gruvbox"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .65), 0 2px 4px oklch(0% 0 0 / .3);
    }

    /* ── DRACULA ────────────────────────────────────────────── */
    [data-theme="dracula"] {
      --desk:  oklch(17% 0.028 296);
      --frame: oklch(20% 0.030 294);
      --inner: oklch(23% 0.032 292);
      --s1:    oklch(27% 0.034 290);
      --s2:    oklch(31% 0.032 288);
      --t1: oklch(97% 0.010 290);
      --t2: oklch(85% 0.018 285);
      --t3: oklch(76% 0.022 286);
      --t4: oklch(58% 0.018 288);
      --b:  oklch(22% 0.030 291);
      --b2: oklch(30% 0.030 289);
      --a:     oklch(80% 0.22 320);
      --a-lo:  oklch(80% 0.22 320 / .12);
      --g:     oklch(78% 0.18 149);
      --g-lo:  oklch(20% 0.05 149);
      --r:     oklch(65% 0.20 18);
    }
    [data-theme="dracula"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .72), 0 2px 4px oklch(0% 0 0 / .35);
    }

    /* ── TOKYO NIGHT ────────────────────────────────────────── */
    [data-theme="tokyo"] {
      --desk:  oklch(14% 0.022 264);
      --frame: oklch(17% 0.024 262);
      --inner: oklch(20% 0.026 260);
      --s1:    oklch(24% 0.028 258);
      --s2:    oklch(29% 0.027 256);
      --t1: oklch(88% 0.018 256);
      --t2: oklch(76% 0.022 252);
      --t3: oklch(70% 0.022 254);
      --t4: oklch(56% 0.018 256);
      --b:  oklch(19% 0.024 260);
      --b2: oklch(27% 0.026 258);
      --a:     oklch(72% 0.18 264);
      --a-lo:  oklch(72% 0.18 264 / .12);
      --g:     oklch(75% 0.14 149);
      --g-lo:  oklch(18% 0.05 149);
      --r:     oklch(63% 0.18 14);
    }
    [data-theme="tokyo"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .72), 0 2px 4px oklch(0% 0 0 / .35);
    }

    /* ── ROSE PINE ──────────────────────────────────────────── */
    [data-theme="rosepine"] {
      --desk:  oklch(16% 0.030 340);
      --frame: oklch(19% 0.032 338);
      --inner: oklch(23% 0.034 336);
      --s1:    oklch(27% 0.036 334);
      --s2:    oklch(32% 0.033 332);
      --t1: oklch(87% 0.020 330);
      --t2: oklch(76% 0.024 328);
      --t3: oklch(70% 0.022 330);
      --t4: oklch(56% 0.018 332);
      --b:  oklch(22% 0.032 337);
      --b2: oklch(30% 0.032 335);
      --a:     oklch(76% 0.16 335);
      --a-lo:  oklch(76% 0.16 335 / .12);
      --g:     oklch(74% 0.14 158);
      --g-lo:  oklch(20% 0.05 158);
      --r:     oklch(62% 0.17 15);
    }
    [data-theme="rosepine"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .72), 0 2px 4px oklch(0% 0 0 / .35);
    }

    /* ── SOLARIZED DARK ─────────────────────────────────────── */
    [data-theme="solarized"] {
      --desk:  oklch(17% 0.028 210);
      --frame: oklch(20% 0.030 208);
      --inner: oklch(24% 0.032 206);
      --s1:    oklch(28% 0.034 204);
      --s2:    oklch(33% 0.032 202);
      --t1: oklch(84% 0.028 200);
      --t2: oklch(72% 0.024 198);
      --t3: oklch(68% 0.020 200);
      --t4: oklch(56% 0.016 202);
      --b:  oklch(23% 0.030 207);
      --b2: oklch(31% 0.030 205);
      --a:     oklch(68% 0.22 205);
      --a-lo:  oklch(68% 0.22 205 / .12);
      --g:     oklch(68% 0.18 142);
      --g-lo:  oklch(20% 0.06 142);
      --r:     oklch(55% 0.17 22);
    }
    [data-theme="solarized"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .65), 0 2px 4px oklch(0% 0 0 / .3);
    }

    /* ── MONOKAI ────────────────────────────────────────────── */
    [data-theme="monokai"] {
      --desk:  oklch(17% 0.010 68);
      --frame: oklch(20% 0.012 66);
      --inner: oklch(24% 0.014 64);
      --s1:    oklch(28% 0.016 62);
      --s2:    oklch(33% 0.015 60);
      --t1: oklch(95% 0.010 68);
      --t2: oklch(83% 0.014 65);
      --t3: oklch(74% 0.016 62);
      --t4: oklch(58% 0.012 65);
      --b:  oklch(22% 0.012 65);
      --b2: oklch(30% 0.014 63);
      --a:     oklch(80% 0.20 140);
      --a-lo:  oklch(80% 0.20 140 / .12);
      --g:     oklch(80% 0.20 140);
      --g-lo:  oklch(22% 0.06 140);
      --r:     oklch(64% 0.20 15);
    }
    [data-theme="monokai"] .frame {
      box-shadow: 0 40px 100px -20px oklch(0% 0 0 / .65), 0 2px 4px oklch(0% 0 0 / .3);
    }



    /* ── DOCKER VIEW ─────────────────────────────────────────── */
    .docker-layout {
      display: flex; height: calc(100vh - 52px); overflow: hidden;
    }
    /* ── Left list ── */
    .docker-list {
      width: 260px; flex-shrink: 0; border-right: 1px solid var(--b);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .docker-list-hd { padding: 14px 14px 8px; border-bottom: 1px solid var(--b); display: flex; flex-direction: column; gap: 8px; }
    .docker-list-title-row { display: flex; align-items: center; gap: 6px; }
    .docker-list-title { font-size: .8rem; font-weight: 600; color: var(--t1); flex: 1; }
    .docker-list-badge { font-size: .62rem; background: var(--s1); border: 1px solid var(--b); border-radius: 99px; padding: 1px 7px; color: var(--t4); font-variant-numeric: tabular-nums; }
    .docker-refresh { background: none; border: 1px solid var(--b); border-radius: 7px; padding: 4px 7px; color: var(--t3); cursor: pointer; display: flex; align-items: center; transition: background .12s; }
    .docker-refresh:hover { background: var(--s1); }
    .docker-search-row { display: flex; align-items: center; gap: 6px; background: var(--s1); border: 1px solid var(--b); border-radius: 8px; padding: 5px 8px; }
    .docker-search { background: none; border: none; outline: none; font-size: .75rem; color: var(--t1); font-family: inherit; flex: 1; }
    .docker-search::placeholder { color: var(--t4); }
    .docker-list-loading { display: flex; align-items: center; gap: 7px; padding: 20px 14px; color: var(--t4); font-size: .75rem; }
    .docker-groups { flex: 1; overflow-y: auto; padding: 4px 0; scrollbar-width: thin; scrollbar-color: var(--b) transparent; }
    .docker-group-label { font-size: .58rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--t4); padding: 10px 14px 4px; }
    .docker-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      cursor: pointer; transition: background .1s;
    }
    .docker-row:hover { background: var(--s1); }
    .docker-row.active { background: var(--a-lo); }
    .docker-row.active .docker-row-name { color: var(--a); }
    .docker-row.stopped { opacity: .6; }
    .docker-row-info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .docker-row-name { font-size: .77rem; font-weight: 500; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .docker-row-img  { font-size: .62rem; color: var(--t4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .docker-row-cpu  { font-size: .62rem; color: var(--t4); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .docker-search-clear { background: none; border: none; color: var(--t4); cursor: pointer; font-size: .7rem; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .docker-search-clear:hover { color: var(--t2); }
    .docker-empty-search { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 32px 16px; color: var(--t4); font-size: .73rem; text-align: center; }
    .docker-state-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    /* ── Right detail ── */
    .docker-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .docker-detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--t4); font-size: .8rem; }
    .docker-detail-hd { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--b); flex-shrink: 0; }
    .docker-detail-hd-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .docker-detail-name   { font-size: .88rem; font-weight: 600; color: var(--t1); }
    .docker-detail-status { font-size: .68rem; color: var(--t4); }
    .docker-detail-actions { display: flex; align-items: center; gap: 6px; }
    .docker-act-btn { display: flex; align-items: center; gap: 5px; background: var(--s1); border: 1px solid var(--b); border-radius: 7px; padding: 5px 10px; color: var(--t2); cursor: pointer; font-size: .72rem; font-family: inherit; transition: background .12s; }
    .docker-act-btn:hover { background: var(--s2); }
    .docker-confirm { display: flex; align-items: center; gap: 6px; font-size: .72rem; }
    .docker-confirm span { color: var(--t3); }
    .docker-confirm-yes { background: var(--a-lo); border: 1px solid var(--a); color: var(--a); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: .72rem; font-family: inherit; }
    .docker-confirm-no  { background: none; border: 1px solid var(--b); color: var(--t4); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: .72rem; font-family: inherit; }
    /* Tabs */
    .docker-tabs { display: flex; gap: 2px; padding: 8px 14px; border-bottom: 1px solid var(--b); flex-shrink: 0; }
    .docker-tab { background: none; border: none; color: var(--t4); font-family: inherit; font-size: .75rem; font-weight: 500; padding: 4px 12px; border-radius: 7px; cursor: pointer; transition: background .1s, color .1s; }
    .docker-tab:hover { background: var(--s1); color: var(--t2); }
    .docker-tab.on { background: var(--a-lo); color: var(--a); }
    .docker-tab-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    /* Logs */
    .docker-log-filter-row { display: flex; align-items: center; gap: 7px; padding: 8px 14px; border-bottom: 1px solid var(--b); flex-shrink: 0; }
    .docker-log-filter { background: none; border: none; outline: none; flex: 1; font-size: .73rem; color: var(--t1); font-family: inherit; }
    .docker-log-filter::placeholder { color: var(--t4); }
    .docker-log-live { font-size: .6rem; background: color-mix(in oklch, var(--g) 15%, transparent); color: var(--g); border: 1px solid color-mix(in oklch, var(--g) 35%, transparent); border-radius: 99px; padding: 1px 8px; flex-shrink: 0; }
    .docker-log-body { flex: 1; overflow-y: auto; padding: 12px 16px; margin: 0; font-family: 'JetBrains Mono','Fira Code',ui-monospace,monospace; font-size: .67rem; line-height: 1.65; color: var(--t2); white-space: pre-wrap; word-break: break-all; scrollbar-width: thin; scrollbar-color: var(--b) transparent; }
    /* Stats */
    .docker-stats-body { padding: 18px; gap: 16px; flex-direction: row !important; flex-wrap: wrap; align-content: flex-start; overflow-y: auto; }
    .docker-stats-loading { padding: 24px; color: var(--t4); font-size: .8rem; }
    .docker-stat-card { background: var(--s1); border: 1px solid var(--b); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; min-width: 200px; flex: 1; }
    .docker-stat-label { font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--t4); }
    .docker-stat-val   { font-size: 1.4rem; font-weight: 300; color: var(--t1); line-height: 1; }
    .docker-stat-pct   { font-size: .75rem; color: var(--t3); font-weight: 400; }
    .docker-stat-bar-wrap { height: 4px; background: var(--b); border-radius: 99px; overflow: hidden; }
    .docker-stat-bar      { height: 100%; border-radius: 99px; transition: width .4s ease; }
    /* Info */
    .docker-info-body { padding: 4px 0; overflow-y: auto; }
    .docker-info-row  { display: flex; align-items: baseline; gap: 12px; padding: 10px 18px; border-bottom: 1px solid var(--b); }
    .docker-info-lbl  { font-size: .68rem; color: var(--t4); width: 90px; flex-shrink: 0; }
    .docker-info-val  { font-size: .75rem; color: var(--t2); flex: 1; word-break: break-all; }
    .docker-info-mono { font-family: ui-monospace, monospace; font-size: .68rem; }
    .docker-info-ports { display: flex; flex-wrap: wrap; gap: 4px; }
    .docker-port-chip { font-size: .62rem; background: var(--inner); border: 1px solid var(--b); border-radius: 4px; padding: 2px 6px; color: var(--t3); font-variant-numeric: tabular-nums; }
    .yt-mode-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--s1); border: 1px solid var(--b); border-radius: 9px; padding: 3px; }
    .yt-mode-tab { flex: 1; background: none; border: none; border-radius: 6px; padding: 5px 10px; font-size: .72rem; font-family: inherit; color: var(--t3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: background .1s, color .1s; }
    .yt-mode-tab:hover { color: var(--t1); }
    .yt-mode-tab.on { background: var(--frame); color: var(--t1); box-shadow: 0 1px 3px oklch(0% 0 0 / .12); }
    .docker-error { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 60px 24px; color: var(--t4); text-align: center; }
    .docker-error code { font-size: .72rem; background: var(--s1); padding: 4px 10px; border-radius: 6px; color: var(--r); }

        /* ── ENTITY WIDGETS ──────────────────────────────────────────────── */
    .entity-room { margin-bottom: 24px; }
    .entity-room-label { font-size: .62rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--t4); margin-bottom: 10px; }
    .entity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(188px, 1fr)); gap: 10px; }
    .entity-widget {
      background: var(--frame); border: 1px solid var(--b); border-radius: 14px;
      padding: 14px 16px 12px; display: flex; flex-direction: column; gap: 10px;
      transition: border-color .15s;
    }
    .entity-widget:hover { border-color: var(--b2); }
    .entity-widget.unavail { opacity: .55; }
    .ew-header { display: flex; align-items: center; gap: 7px; }
    .ew-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background .3s; }
    .ew-name { font-size: .78rem; font-weight: 600; color: var(--t1); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: capitalize; }
    .ew-domain { font-size: .58rem; color: var(--t4); flex-shrink: 0; text-transform: uppercase; letter-spacing: .06em; }
    .ew-body { display: flex; flex-direction: column; gap: 8px; }
    .ew-loading { color: var(--t4); font-size: .72rem; }

    /* Toggle */
    .ew-toggle-row { display: flex; align-items: center; gap: 10px; }
    .ew-toggle-body { flex-direction: row; align-items: center; gap: 10px; }
    .ew-toggle {
      width: 40px; height: 22px; border-radius: 99px; border: none; cursor: pointer;
      background: var(--b2); position: relative; flex-shrink: 0; transition: background .2s;
      padding: 0;
    }
    .ew-toggle.on { background: var(--a); }
    .ew-toggle:disabled { opacity: .4; cursor: not-allowed; }
    .ew-toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%;
      background: oklch(98% 0.005 228); transition: left .15s ease; box-shadow: 0 1px 3px oklch(0% 0 0 / .2);
    }
    .ew-toggle.on .ew-toggle-thumb { left: calc(100% - 19px); }
    .ew-state-label { font-size: .74rem; color: var(--t3); }

    /* Slider */
    .ew-slider {
      width: 100%; height: 4px; border-radius: 99px; cursor: pointer;
      accent-color: var(--a); background: var(--b2);
    }

    /* Sensor */
    .ew-sensor-body { flex-direction: row; align-items: baseline; gap: 4px; }
    .ew-sensor-val  { font-size: 1.5rem; font-weight: 300; color: var(--t1); line-height: 1; }
    .ew-sensor-unit { font-size: .78rem; color: var(--t3); }
    .ew-number-row  { display: flex; align-items: baseline; gap: 4px; }

    /* Climate */
    .ew-climate-body { gap: 6px; }
    .ew-climate-temps { display: flex; align-items: center; gap: 14px; }
    .ew-climate-current { display: flex; flex-direction: column; font-size: 1.4rem; font-weight: 300; color: var(--t1); line-height: 1.1; }
    .ew-climate-target  { display: flex; align-items: center; gap: 6px; }
    .ew-climate-setpoint { font-size: 1.1rem; font-weight: 500; color: var(--a); min-width: 48px; text-align: center; }
    .ew-climate-label { font-size: .58rem; color: var(--t4); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .ew-climate-mode { font-size: .7rem; color: var(--t3); text-transform: capitalize; }
    .ew-temp-btn { background: var(--s1); border: 1px solid var(--b); border-radius: 6px; width: 24px; height: 24px; cursor: pointer; color: var(--t2); font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: background .1s; }
    .ew-temp-btn:hover { background: var(--s2); }

    /* Cover */
    .ew-cover-body { gap: 6px; }
    .ew-cover-btns { display: flex; gap: 4px; }
    .ew-cover-btn { flex: 1; background: var(--s1); border: 1px solid var(--b); border-radius: 7px; padding: 5px 4px; cursor: pointer; font-size: .68rem; color: var(--t2); font-family: inherit; transition: background .1s; text-align: center; }
    .ew-cover-btn:hover { background: var(--s2); }

    /* Media player */
    .ew-media-body { gap: 7px; }
    .ew-media-title { font-size: .7rem; color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ew-media-controls { display: flex; align-items: center; gap: 6px; }
    .ew-media-btn { background: var(--s1); border: 1px solid var(--b); border-radius: 7px; width: 30px; height: 28px; cursor: pointer; color: var(--t2); font-size: .8rem; display: flex; align-items: center; justify-content: center; transition: background .1s; }
    .ew-media-btn:hover { background: var(--s2); }
    .ew-media-btn.main { width: 36px; height: 34px; background: var(--a-lo); border-color: var(--a); color: var(--a); font-size: 1rem; }

    /* Person */
    .ew-person-body { align-items: flex-start; }
    .ew-person-badge { font-size: .78rem; background: var(--s1); border: 1px solid var(--b); border-radius: 99px; padding: 4px 12px; color: var(--t3); display: inline-flex; align-items: center; gap: 5px; }
    .ew-person-badge.home { background: var(--a-lo); border-color: var(--a); color: var(--a); }

    /* Lock */
    .ew-lock-btn { background: var(--s1); border: 1px solid var(--b); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: .78rem; color: var(--t2); font-family: inherit; transition: background .1s; }
    .ew-lock-btn:hover { background: var(--s2); }
    .ew-lock-btn.locked { background: var(--a-lo); border-color: var(--a); color: var(--a); }

    /* Entity add form in settings */
    .entity-add-form { margin-top: 8px; }
    .entity-add-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .entity-add-input { min-width: 120px; }

        /* ── COMMAND PALETTE ─────────────────────────────────────────── */
    .pal-backdrop {
      position: fixed; inset: 0; z-index: 9000;
      background: oklch(0% 0 0 / .55); backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: clamp(60px, 12vh, 120px);
      animation: pal-in .12s ease;
    }
    @keyframes pal-in { from { opacity: 0 } to { opacity: 1 } }
    .pal-box {
      width: min(580px, 92vw);
      background: var(--frame); border: 1px solid var(--b2);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 32px 80px oklch(0% 0 0 / .5), 0 2px 8px oklch(0% 0 0 / .3);
      animation: pal-up .14s cubic-bezier(0,.85,.3,1);
    }
    @keyframes pal-up { from { transform: translateY(8px); opacity: .6 } to { transform: none; opacity: 1 } }
    .pal-input-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid var(--b);
    }
    .pal-icon { color: var(--t4); flex-shrink: 0; }
    .pal-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: .95rem; color: var(--t1); font-family: inherit;
      caret-color: var(--a);
    }
    .pal-input::placeholder { color: var(--t4); }
    .pal-kbd {
      font-size: .6rem; color: var(--t4); background: var(--s1);
      border: 1px solid var(--b); border-radius: 4px;
      padding: 2px 6px; letter-spacing: .04em; flex-shrink: 0;
    }
    .pal-results { max-height: 380px; overflow-y: auto; padding: 6px 0; }
    .pal-results::-webkit-scrollbar { width: 4px; }
    .pal-results::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }
    .pal-group-label {
      font-size: .58rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--t4);
      padding: 8px 16px 4px;
    }
    .pal-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; cursor: pointer;
      transition: background .08s;
    }
    .pal-item:hover, .pal-item.pal-active {
      background: var(--a-lo);
    }
    .pal-item.pal-active .pal-item-name { color: var(--a); }
    .pal-item-icon {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--s1); border: 1px solid var(--b);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--t3);
    }
    .pal-item-name { font-size: .82rem; font-weight: 500; color: var(--t2); flex: 1; }
    .pal-item-meta { font-size: .65rem; color: var(--t4); }
    .pal-item-tag {
      font-size: .6rem; color: var(--t4); background: var(--s1);
      border: 1px solid var(--b); border-radius: 4px; padding: 1px 5px;
    }
    .pal-empty { text-align: center; padding: 28px 16px; color: var(--t4); font-size: .82rem; }
    .pal-clear { background: none; border: none; color: var(--t4); cursor: pointer; font-size: .72rem; padding: 2px 4px; border-radius: 4px; }
    .pal-clear:hover { color: var(--t2); }
    .pal-item-active { color: var(--a) !important; font-style: italic; }
    .pal-footer {
      display: flex; align-items: center; gap: 14px;
      padding: 8px 16px; border-top: 1px solid var(--b);
      font-size: .62rem; color: var(--t4);
    }
    .pal-footer-key { display: flex; align-items: center; gap: 4px; }

    /* ── TOAST ALERTS ────────────────────────────────────────────── */
    .toast-stack {
      position: fixed; bottom: 24px; right: 24px; z-index: 9100;
      display: flex; flex-direction: column-reverse; gap: 8px;
      pointer-events: none;
    }
    @media (max-width: 600px) { .toast-stack { bottom: 72px; right: 12px; left: 12px; } }
    .toast {
      pointer-events: all;
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 14px; border-radius: 12px; min-width: 260px; max-width: 340px;
      background: var(--frame); border: 1px solid var(--b2);
      box-shadow: 0 8px 32px oklch(0% 0 0 / .4);
      animation: toast-in .2s cubic-bezier(0,.85,.3,1);
    }
    @keyframes toast-in { from { transform: translateX(24px); opacity: 0 } to { transform: none; opacity: 1 } }
    .toast.toast-out { animation: toast-out .18s ease forwards; }
    @keyframes toast-out { to { transform: translateX(24px); opacity: 0 } }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .toast-dot.error  { background: var(--r); box-shadow: 0 0 6px var(--r); }
    .toast-dot.warn   { background: oklch(78% 0.16 60); box-shadow: 0 0 6px oklch(78% 0.16 60); }
    .toast-dot.info   { background: var(--a); box-shadow: 0 0 6px var(--a); }
    .toast-body { flex: 1; min-width: 0; }
    .toast-title { font-size: .78rem; font-weight: 600; color: var(--t1); margin-bottom: 2px; }
    .toast-msg   { font-size: .7rem; color: var(--t3); line-height: 1.4; }
    .toast-close {
      background: none; border: none; color: var(--t4); cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0; flex-shrink: 0;
    }

    /* ── SIDEBAR ─────────────────────────────────────────── */
    .sidebar {
      flex: 0 0 auto; width: var(--sw);
      display: flex; flex-direction: column;
      padding: 16px 10px 14px;
      transition: width .3s cubic-bezier(.4,0,.2,1);
      overflow: hidden; position: relative; z-index: 2;
    }
    .frame.col .sidebar { width: var(--sc); }

    .brand { display: flex; align-items: center; gap: 10px; padding: 2px 7px 24px; white-space: nowrap; }
    .brand-mark {
      width: 26px; height: 26px; flex: 0 0 26px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: 0 2px 6px oklch(0% 0 0 / .32), 0 0 0 1px oklch(100% 0 0 / .08);
    }
    .brand-name {
      font-size: .9rem; font-weight: 600; letter-spacing: -.025em;
      color: var(--t1); opacity: 1; transition: opacity .18s; white-space: nowrap;
    }
    .frame.col .brand-name { opacity: 0; pointer-events: none; }

    .ni {
      display: flex; align-items: center; gap: 9px; padding: 8px 9px;
      border-radius: 8px; cursor: pointer; white-space: nowrap;
      color: var(--t3); font-size: .82rem; font-weight: 500;
      position: relative; user-select: none;
      transition: background .12s, color .12s;
    }
    .ni svg { flex: 0 0 15px; }
    .ni-lbl { opacity: 1; transition: opacity .14s; overflow: hidden; }
    .frame.col .ni-lbl { opacity: 0; }
    .ni:hover { background: var(--s1); color: var(--t2); }
    .ni.on { background: var(--a-lo); color: var(--a); }
    .frame.col .ni:hover::after {
      content: attr(data-label);
      position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
      background: var(--s2); color: var(--t1); border: 1px solid var(--b);
      border-radius: 7px; padding: 5px 10px; font-size: .75rem; white-space: nowrap;
      pointer-events: none; z-index: 100; box-shadow: 0 4px 16px oklch(0% 0 0 / .3);
    }

    /* ── MODE TOGGLE ─────────────────────────────────────── */
    .mode-toggle { display: flex; margin: 0 8px 4px; }
    .frame.col .mode-toggle { margin: 0 4px 4px; justify-content: center; }
    .mode-pill { display: flex; flex-direction: row; align-items: center; background: var(--s1); border-radius: 9px; padding: 3px; gap: 2px; border: 1px solid var(--b); width: 100%; }
    .frame.col .mode-pill { flex-direction: column; width: auto; }
    .mode-btn { flex: 1; height: 30px; min-width: 0; border-radius: 7px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; gap: 5px; color: var(--t4); cursor: pointer; transition: background .15s, color .15s, opacity .15s; position: relative; padding: 0 6px; overflow: hidden; }
    .mode-btn.on { background: var(--a-lo); color: var(--a); box-shadow: 0 1px 3px oklch(0% 0 0 / .18); }
    .frame.col .mode-btn { flex: none; width: 36px; height: 28px; padding: 0; gap: 0; }
    .mode-btn-lbl { font-size: .73rem; font-weight: 500; letter-spacing: .01em; white-space: nowrap; pointer-events: none; }
    .mode-btn.on .mode-btn-lbl { font-weight: 600; }
    .frame.col .mode-btn-lbl { display: none; }
    .mode-btn:hover:not(.on) { background: var(--s2); color: var(--t2); }
    .frame.col .mode-btn:hover::after { content: attr(data-label); position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%); background: var(--s2); color: var(--t1); border: 1px solid var(--b); border-radius: 7px; padding: 5px 10px; font-size: .75rem; white-space: nowrap; pointer-events: none; z-index: 100; box-shadow: 0 4px 16px oklch(0% 0 0 / .3); }

    /* ── MODE PICKER (edit forms) ───────────────────────── */
    .mpk { display: flex; align-items: center; gap: 6px; }
    .mpk-label { font-size: .72rem; font-weight: 500; color: var(--t4); white-space: nowrap; }
    .mpk-pill { display: inline-flex; align-items: center; background: var(--s1); border-radius: 8px; padding: 2px; gap: 1px; border: 1px solid var(--b); }
    .mpk-btn { display: flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: 6px; border: none; background: transparent; font-size: .72rem; font-weight: 500; color: var(--t3); cursor: pointer; transition: background .12s, color .12s; white-space: nowrap; font-family: inherit; }
    .mpk-btn:hover:not(.on) { background: var(--s2); color: var(--t2); }
    .mpk-btn.on.work  { background: oklch(55% 0.14 55 / .18); color: oklch(62% 0.16 55); box-shadow: 0 1px 3px oklch(0% 0 0 / .1); }
    .mpk-btn.on.both  { background: var(--a-lo); color: var(--a); box-shadow: 0 1px 3px oklch(0% 0 0 / .1); }
    .mpk-btn.on.personal { background: oklch(55% 0.14 250 / .18); color: oklch(60% 0.15 250); box-shadow: 0 1px 3px oklch(0% 0 0 / .1); }

    /* ── MODE BADGE (settings list) ─────────────────────── */
    .mbadge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 4px; font-size: .62rem; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; flex-shrink: 0; }
    .mbadge.work     { background: oklch(55% 0.14 55 / .14); color: oklch(62% 0.16 55); }
    .mbadge.personal { background: oklch(55% 0.14 250 / .14); color: oklch(60% 0.15 250); }

    .sb-foot { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--b); display: flex; flex-direction: column; }
    .col-btn {
      display: flex; align-items: center; gap: 9px; padding: 8px 9px;
      border-radius: 8px; cursor: pointer; color: var(--t4);
      font-size: .78rem; font-weight: 500;
      background: none; border: none; width: 100%; white-space: nowrap;
      font-family: 'Geist', sans-serif;
      transition: background .12s, color .12s;
    }
    .col-btn:hover { background: var(--s1); color: var(--t3); }
    .col-btn svg { flex: 0 0 15px; transition: transform .3s cubic-bezier(.4,0,.2,1); }
    .frame.col .col-btn svg { transform: rotate(180deg); }
    .col-lbl { opacity: 1; transition: opacity .14s; }
    .frame.col .col-lbl { opacity: 0; }

    /* ── AUTO-SWITCH UI ──────────────────────────────────── */
    .as-toggle { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .as-toggle-label { display: flex; flex-direction: column; gap: 2px; }
    .as-toggle-title { font-size: .82rem; font-weight: 500; color: var(--t1); }
    .as-toggle-sub   { font-size: .7rem; color: var(--t4); }
    .as-switch { position: relative; width: 38px; height: 22px; flex: none; cursor: pointer; }
    .as-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .as-track { position: absolute; inset: 0; background: var(--s2); border-radius: 99px; border: 1px solid var(--b); transition: background .2s, border-color .2s; }
    .as-switch input:checked ~ .as-track { background: var(--t2); border-color: var(--t2); }
    .as-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: var(--t4); border-radius: 50%; transition: transform .2s, background .2s; }
    .as-switch input:checked ~ .as-thumb { transform: translateX(16px); background: oklch(98% 0.005 228); }
    .as-hours { display: flex; align-items: center; gap: 8px; background: var(--s2); border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
    .as-hours-icon { color: var(--t4); flex: none; }
    .as-hours-body { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .as-time-row { display: flex; align-items: center; gap: 6px; }
    .as-time-label { font-size: .68rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--t4); width: 38px; flex: none; }
    .as-time-sep { font-size: .72rem; color: var(--t4); }
    .as-time-sel { background: var(--s1); border: 1px solid var(--b); border-radius: 6px; color: var(--t1); font-size: .78rem; font-family: inherit; padding: 3px 6px; cursor: pointer; }
    .as-time-sel:focus { outline: none; border-color: var(--a); }
    .as-days { display: flex; gap: 3px; flex-wrap: wrap; }
    .as-day { height: 26px; min-width: 32px; padding: 0 6px; border-radius: 5px; border: 1px solid var(--b); background: var(--s1); color: var(--t3); font-size: .68rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .1s, color .1s, border-color .1s; }
    .as-day.on { background: oklch(55% 0.14 55 / .18); color: oklch(62% 0.16 55); border-color: oklch(55% 0.14 55 / .3); }
    .as-preview { margin-top: 8px; font-size: .7rem; color: var(--t4); line-height: 1.5; }

    .usr { display: flex; align-items: center; gap: 9px; padding: 10px 7px 0; white-space: nowrap; overflow: hidden; }
    .av {
      width: 24px; height: 24px; flex: 0 0 24px; border-radius: 50%;
      background: var(--b2); display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 700; color: var(--t1);
    }
    .usr-info { overflow: hidden; opacity: 1; transition: opacity .14s; }
    .frame.col .usr-info { opacity: 0; }
    .usr-name { font-size: .77rem; font-weight: 600; color: var(--t2); display: block; letter-spacing: -.01em; }
    .usr-loc  { font-size: .67rem; color: var(--t4); display: block; }

    /* ── INNER PANEL ─────────────────────────────────────── */
    .inner {
      flex: 1; min-width: 0; margin: 10px 10px 10px 0;
      background: var(--inner); border-radius: 16px;
      border: 1px solid var(--b);
      display: flex; flex-direction: column; overflow: hidden;
      transition: background .3s, border-color .3s;
    }

    /* ── TOPBAR ──────────────────────────────────────────── */
    .topbar {
      flex: 0 0 auto; height: 46px;
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px; border-bottom: 1px solid var(--b);
    }
    .pg-title { font-size: .8rem; font-weight: 600; color: var(--t1); letter-spacing: -.01em; }
    .crumb { font-size: .72rem; color: var(--t4); }
    .tb-r { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 28px; height: 28px; border-radius: 7px;
      background: transparent; border: 1px solid var(--b);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--t3);
      transition: background .12s, color .12s, border-color .12s;
    }
    .icon-btn:hover { background: var(--s1); color: var(--t1); border-color: var(--b2); }
    .theme-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 0 9px; height: 28px; background: transparent; border: 1px solid var(--b); border-radius: 7px;
      font-size: .72rem; color: var(--t3); cursor: pointer; user-select: none; white-space: nowrap;
      transition: background .12s, color .12s, border-color .12s;
    }
    .theme-chip:hover { background: var(--s1); color: var(--t1); border-color: var(--b2); }
    .time-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; background: var(--s1); border-radius: 7px;
      font-size: .76rem; color: var(--t3); font-variant-numeric: tabular-nums;
    }
    .time-chip b { color: var(--t2); font-weight: 500; }

    /* ── TOPBAR STATS ────────────────────────────────────── */
    .tb-stats { display: flex; align-items: center; gap: 5px; position: relative; }
    .tb-stat-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 6px;
      background: var(--s1); border: 1px solid var(--b);
      font-size: .68rem; color: var(--t3); cursor: pointer;
      font-variant-numeric: tabular-nums; transition: background .12s, border-color .12s;
      white-space: nowrap;
    }
    .tb-stat-chip:hover { background: var(--s2); color: var(--t1); border-color: var(--b2); }
    .tb-stat-chip.warn { color: oklch(70% 0.14 60); border-color: oklch(70% 0.14 60 / .35); }
    .tb-stat-chip.crit { color: oklch(65% 0.18 25); border-color: oklch(65% 0.18 25 / .35); }
    .tb-stat-label { color: var(--t4); }
    .tb-stat-bar {
      width: 28px; height: 3px; border-radius: 99px;
      background: var(--s2); overflow: hidden;
    }
    .tb-stat-bar-fill { height: 100%; border-radius: 99px; background: var(--t3); transition: width .4s ease; }
    .tb-stat-bar-fill.warn { background: oklch(70% 0.14 60); }
    .tb-stat-bar-fill.crit { background: oklch(65% 0.18 25); }
    /* Stats drop panel */
    .tb-panel-backdrop { position: fixed; inset: 0; z-index: 399; }
    .tb-panel {
      position: absolute; top: calc(100% + 6px); left: 0;
      width: 300px; background: var(--frame); border: 1px solid var(--b2);
      border-radius: 12px; z-index: 400; box-shadow: 0 8px 32px oklch(0% 0 0 / .22);
      animation: fadeIn .14s ease-out; overflow: hidden;
    }
    .tb-panel-hd { padding: 11px 14px 8px; border-bottom: 1px solid var(--b); display: flex; align-items: center; justify-content: space-between; }
    .tb-panel-title { font-size: .76rem; font-weight: 600; color: var(--t1); letter-spacing: -.01em; }
    .tb-panel-close { width: 20px; height: 20px; border-radius: 5px; border: none; background: var(--s1); color: var(--t3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .12s; }
    .tb-panel-close:hover { background: var(--s2); color: var(--t1); }
    .tb-panel-body { padding: 11px 14px 13px; display: flex; flex-direction: column; gap: 9px; }
    .tb-panel-stat { display: flex; flex-direction: column; gap: 5px; }
    .tb-panel-stat-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .tb-panel-stat-lbl { font-size: .69rem; color: var(--t3); min-width: 40px; }
    .tb-panel-stat-val { font-size: .72rem; font-weight: 600; color: var(--t1); font-variant-numeric: tabular-nums; text-align: right; }
    .tb-panel-bar { height: 5px; border-radius: 99px; background: var(--s2); overflow: hidden; flex: 1; }
    .tb-panel-bar-fill { height: 100%; border-radius: 99px; background: oklch(55% 0.08 250); transition: width .5s ease; }
    .tb-panel-bar-fill.warn { background: oklch(70% 0.14 60); }
    .tb-panel-bar-fill.crit { background: oklch(65% 0.18 25); }
    .tb-panel-sub { font-size: .63rem; color: var(--t4); padding-left: 1px; }
    .tb-panel-divider { height: 1px; background: var(--b); margin: 1px 0; }
    .tb-panel-net-row { display: flex; gap: 10px; }
    .tb-panel-net-half { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0; }
    .tb-panel-net-lbl { font-size: .68rem; color: var(--t3); white-space: nowrap; flex-shrink: 0; }
    .tb-panel-net-val { font-size: .72rem; font-weight: 600; color: var(--t1); font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── SCROLL ──────────────────────────────────────────── */
    .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
    .scroll::-webkit-scrollbar { display: none; }

    /* ── HERO ────────────────────────────────────────────── */
    .hero {
      padding: 30px 24px 26px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 24px; flex-wrap: wrap;
      border-bottom: 1px solid var(--b);
    }
    .hero-left { flex: 1; min-width: 200px; }
    .hero-greeting {
      font-family: 'Fraunces', serif; font-style: italic;
      font-size: clamp(1.7rem, 2.8vw, 2.2rem); font-weight: 300;
      letter-spacing: -.03em; line-height: 1;
      color: var(--t1); margin-bottom: 10px;
    }
    .hero-wx {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      font-size: .8rem; color: var(--t3);
    }
    .hero-narrative {
      font-size: .82rem; color: var(--t3); line-height: 1.55;
      margin: 6px 0 10px; max-width: 480px;
      font-style: italic;
    }
    .hero-forecast-btn {
      display: inline-flex; align-items: center; gap: 2px;
      margin-left: 10px;
      padding: 3px 9px; border-radius: 6px;
      background: var(--a-lo); border: 1px solid color-mix(in oklch, var(--a) 28%, transparent);
      color: var(--a); font-size: .65rem; font-weight: 600; letter-spacing: .03em;
      cursor: pointer; font-family: inherit; transition: background .15s;
      vertical-align: middle;
    }
    .hero-forecast-btn:hover { background: color-mix(in oklch, var(--a) 18%, transparent); }
    .hero-temp { font-size: 1.3rem; font-weight: 300; color: var(--t2); letter-spacing: -.02em; }
    .hero-meta { display: flex; align-items: center; gap: 10px; }
    .hero-meta span { display: flex; align-items: center; gap: 4px; }

    /* ── DAY PANEL ───────────────────────────────────────── */
    .day-panel { display: flex; flex-direction: column; gap: 8px; min-width: 200px; max-width: 300px; overflow: hidden; }
    .day-events-list { display: flex; flex-direction: column; gap: 0; overflow: hidden; }
    .day-section { display: flex; flex-direction: column; gap: 4px; }
    .day-section-label {
      font-size: .62rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
      color: var(--t4); margin-bottom: 2px; display: flex; align-items: center; gap: 5px;
    }
    .day-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .day-nav-left { display: flex; align-items: center; gap: 5px; font-size: .62rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--t4); }
    .day-nav-arrows { display: flex; align-items: center; gap: 0; }
    .day-nav-btn { background: none; border: none; cursor: pointer; color: var(--t4); padding: 1px 3px; line-height: 1; display: flex; align-items: center; border-radius: 4px; transition: color .12s, background .12s; font-family: inherit; }
    .day-nav-btn:hover { color: var(--t2); background: var(--s1); }
    .day-event {
      display: flex; align-items: baseline; gap: 8px; padding: 3px 0;
    }
    .day-event-time {
      font-size: .68rem; color: var(--t4); font-variant-numeric: tabular-nums;
      min-width: 38px; flex-shrink: 0; text-align: right; line-height: 1.4;
    }
    .day-event-title {
      font-size: .76rem; color: var(--t2); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4;
    }
    .day-event-allday { font-size: .68rem; color: var(--t4); min-width: 38px; flex-shrink: 0; text-align: right; }
    .day-email { display: flex; flex-direction: column; gap: 1px; padding: 3px 0; }
    .day-email-from { font-size: .74rem; font-weight: 500; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .day-email-subj { font-size: .7rem; color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .day-sep { height: 1px; background: var(--b); margin: 2px 0; }
    .day-empty { font-size: .72rem; color: var(--t4); }
    .day-more { font-size: .65rem; color: var(--t4); padding: 3px 0 0; background: none; border: none; cursor: pointer; font-family: inherit; text-align: left; transition: color .12s; }
    .day-more:hover { color: var(--t2); }
    .day-uncfg { font-size: .7rem; color: var(--t4); display: flex; align-items: center; gap: 5px; }

    /* ── WEATHER PERSONALITY PICKER ─────────────────────────────────────── */
    .wx-pers-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .wx-pers-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--b2);
      background: var(--s1); color: var(--t3); font-size: .74rem; font-family: inherit;
      cursor: pointer; transition: background .12s, color .12s, border-color .12s;
    }
    .wx-pers-btn:hover { background: var(--s2); color: var(--t2); }
    .wx-pers-btn.active { background: var(--a-lo); border-color: color-mix(in oklch, var(--a) 40%, transparent); color: var(--t1); font-weight: 600; }

    /* ── ONBOARDING WIZARD ───────────────────────────────────────────────── */
    .ob-modal { max-width: 460px; }
    .ob-progress { display: flex; gap: 6px; align-items: center; justify-content: center; padding: 18px 20px 0; }
    .ob-dot { height: 5px; border-radius: 3px; background: var(--b2); transition: all .22s cubic-bezier(.2,0,.2,1); }
    .ob-dot.done { width: 18px; background: color-mix(in oklch, var(--a) 50%, var(--b2)); }
    .ob-dot.active { width: 24px; background: var(--a); }
    .ob-dot.pending { width: 12px; }
    .ob-body { padding: 22px 22px 26px; }
    .ob-title { font-size: 1.1rem; font-weight: 700; color: var(--t1); letter-spacing: -.025em; margin-bottom: 3px; }
    .ob-sub { font-size: .75rem; color: var(--t3); margin-bottom: 20px; line-height: 1.5; }
    .ob-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .ob-label { font-size: .67rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--t4); }
    .ob-input { background: var(--s1); border: 1px solid var(--b2); border-radius: 8px; padding: 8px 11px; font-size: .82rem; color: var(--t1); font-family: inherit; outline: none; width: 100%; box-sizing: border-box; transition: border-color .12s; }
    .ob-input:focus { border-color: var(--a); }
    .ob-input.mono { font-family: 'Geist Mono', monospace; font-size: .78rem; }
    .ob-hint { font-size: .67rem; color: var(--t4); margin-top: 2px; }
    .ob-hint a { color: var(--a); text-decoration: none; }
    .ob-hint a:hover { text-decoration: underline; }
    .ob-loc-results { background: var(--frame); border: 1px solid var(--b2); border-radius: 8px; overflow: hidden; margin-top: 4px; }
    .ob-loc-result { padding: 7px 11px; font-size: .8rem; color: var(--t2); cursor: pointer; transition: background .1s; }
    .ob-loc-result:hover { background: var(--s2); }
    .ob-loc-result small { color: var(--t4); font-size: .68rem; margin-left: 5px; }
    .ob-int-list { display: flex; flex-direction: column; border: 1px solid var(--b); border-radius: 10px; overflow: hidden; margin-top: 2px; }
    .ob-int-row { padding: 13px 14px; border-bottom: 1px solid var(--b); }
    .ob-int-row:last-child { border-bottom: none; }
    .ob-int-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .ob-int-name { font-size: .82rem; font-weight: 600; color: var(--t1); }
    .ob-int-badge { font-size: .58rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; padding: 2px 7px; border-radius: 20px; background: var(--s2); color: var(--t4); border: 1px solid var(--b); }
    .ob-int-desc { font-size: .71rem; color: var(--t3); margin-bottom: 7px; line-height: 1.4; }
    .ob-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 22px; }
    .ob-btn-pri { background: var(--a); color: var(--bg); border: none; border-radius: 9px; padding: 9px 22px; font-size: .82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .12s; }
    .ob-btn-pri:hover:not(:disabled) { opacity: .82; }
    .ob-btn-pri:disabled { opacity: .4; cursor: not-allowed; }
    .ob-btn-sec { background: none; border: none; color: var(--t4); font-size: .76rem; cursor: pointer; font-family: inherit; padding: 0; transition: color .12s; }
    .ob-btn-sec:hover { color: var(--t2); }
    .ob-err { font-size: .72rem; color: oklch(60% 0.19 25); margin-top: 10px; }

    .wx-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 0;
      font-family: 'Geist', sans-serif;
      transition: opacity .14s;
    }
    .wx-btn:hover { opacity: .75; }

    /* ── WEATHER MODAL ───────────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0; z-index: 200;
      background: oklch(0% 0 0 / .65);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      animation: fadeIn 160ms ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--frame); border: 1px solid var(--b2);
      border-radius: 18px; width: 100%; max-width: 560px;
      max-height: 86vh; overflow-y: auto; scrollbar-width: none;
      box-shadow: 0 40px 80px oklch(0% 0 0 / .55);
      animation: slideUp 200ms cubic-bezier(.2,0,.2,1);
    }
    .modal::-webkit-scrollbar { display: none; }
    @keyframes slideUp {
      from { transform: translateY(14px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-hd {
      position: sticky; top: 0; z-index: 1;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      padding: 18px 20px 14px; background: var(--frame); border-bottom: 1px solid var(--b);
    }
    .modal-titles {}
    .modal-title { font-size: .9rem; font-weight: 600; color: var(--t1); letter-spacing: -.02em; display: block; }
    .modal-sub   { font-size: .72rem; color: var(--t4); display: block; margin-top: 2px; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 7px; flex: none;
      background: var(--s1); border: 1px solid var(--b); color: var(--t3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; line-height: 1;
      transition: background .12s, color .12s;
    }
    .modal-close:hover { background: var(--s2); color: var(--t1); }
    .modal-body { padding: 18px 20px 24px; }
    .fx-narrative { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
    .fx-narrative p { font-size: .82rem; line-height: 1.72; color: var(--t2); margin: 0; }
    .fx-loading { display: flex; align-items: center; gap: 8px; font-size: .78rem; color: var(--t3); margin-bottom: 18px; }
    .fx-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    @media (max-width: 500px) { .fx-days { grid-template-columns: repeat(4, 1fr); } }
    .fx-day {
      background: var(--s1); border-radius: 10px; padding: 12px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center;
      border: 1px solid var(--b);
    }
    .fx-today { background: var(--a-lo); border-color: color-mix(in oklch, var(--a) 35%, transparent); }
    .fx-dn  { font-size: .58rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--t4); }
    .fx-hi  { font-size: .82rem; font-weight: 600; color: var(--t1); }
    .fx-lo  { font-size: .68rem; color: var(--t4); }
    .fx-cond { font-size: .52rem; color: var(--t4); line-height: 1.2; }
    .fx-rain { font-size: .55rem; color: oklch(62% 0.16 230); }
    .fx-divider { border: none; border-top: 1px solid var(--b); margin: 18px 0; }

    /* Scrollable day strip in forecast modal */
    .fx-days-scroll {
      display: flex !important; flex-direction: row !important;
      overflow-x: auto; gap: 8px;
      padding: 4px 2px 10px;
      grid-template-columns: none !important;
      scrollbar-width: thin; scrollbar-color: var(--b) transparent;
    }
    .fx-days-scroll .fx-day {
      flex: 0 0 86px; min-width: 86px;
      cursor: pointer; transition: background .15s, border-color .15s, transform .12s;
      outline: none;
    }
    .fx-days-scroll .fx-day:hover { background: var(--s2); transform: translateY(-2px); }
    .fx-days-scroll .fx-day.fx-selected {
      background: var(--a-lo);
      border-color: color-mix(in oklch, var(--a) 50%, transparent);
      transform: translateY(-2px);
    }
    .fx-days-scroll .fx-day.fx-selected .fx-dn { color: var(--a); }

    /* Inline forecast panel (home view) */
    .wx-panel {
      margin: 0 24px 0; padding: 18px 20px 16px;
      background: var(--s1); border: 1px solid var(--b); border-radius: 14px;
    }
    .wx-panel-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .wx-panel-title { font-size: .72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: var(--t4); }
    .wx-panel-loc { font-size: .7rem; color: var(--t4); }
    .wx-panel-narrative { margin-top: 14px; }
    .wx-today-banner {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px; margin-bottom: 14px;
      background: var(--a-lo); border-radius: 10px;
      border: 1px solid color-mix(in oklch, var(--a) 25%, transparent);
    }
    .wx-today-icon { flex-shrink: 0; }
    .wx-today-temps { display: flex; flex-direction: column; }
    .wx-today-hi { font-size: 1.5rem; font-weight: 700; color: var(--t1); letter-spacing: -.03em; line-height: 1; }
    .wx-today-lo { font-size: .75rem; color: var(--t4); margin-top: 2px; }
    .wx-today-meta { display: flex; flex-direction: column; gap: 3px; }
    .wx-today-cond { font-size: .82rem; font-weight: 600; color: var(--t1); }
    .wx-today-detail { font-size: .7rem; color: var(--t3); }

    /* ── SECTION ROWS (Netflix-style) ─────────────────────── */
    .section { padding: 26px 0 0; }
    .section-hd {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 0 24px; margin-bottom: 12px;
    }
    .section-title { font-size: .88rem; font-weight: 600; color: var(--t2); letter-spacing: -.01em; }
    .section-note  { font-size: .72rem; color: var(--t4); }

    /* Row scrolls edge-to-edge within inner panel */
    .row-outer { overflow-x: auto; scrollbar-width: none; }
    .row-outer::-webkit-scrollbar { display: none; }
    .row-track {
      display: flex; gap: 10px;
      padding: 2px 24px 10px;
      scroll-snap-type: x mandatory;
      width: max-content; min-width: 100%;
    }

    /* ── THUMBNAIL CARDS (YouTube / media) ───────────────── */
    .thumb-card {
      flex: 0 0 216px; border-radius: 8px; overflow: hidden;
      cursor: pointer; text-decoration: none; display: block;
      scroll-snap-align: start; position: relative;
      transform: perspective(700px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
      transition: transform 120ms ease-out, box-shadow 120ms ease-out, filter 120ms ease-out;
      will-change: transform;
    }
    .thumb-card:hover { }
    .thumb-img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
      background: var(--s1);
      filter: saturate(0.45) brightness(0.82) contrast(1.05);
      transition: filter .25s ease-out;
    }
    .thumb-card:hover .thumb-img {
      filter: saturate(0.72) brightness(0.93);
    }
    .thumb-body { padding: 9px 2px 2px; }
    .thumb-title {
      font-size: .79rem; font-weight: 500; color: var(--t1); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .thumb-ch  { font-size: .67rem; color: var(--t3); margin-top: 3px; }
    .thumb-age { font-size: .64rem; color: var(--t4); margin-top: 1px; }

    /* ── SERVICE SECTIONS ───────────────────────────────── */
    .svc-sections { display: flex; flex-direction: column; }
    .svc-section  { display: flex; flex-direction: column; }
    .svc-section-hd {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 24px 6px; cursor: pointer; user-select: none;
    }
    .svc-section-hd:hover .svc-section-lbl { color: var(--t1); }
    .svc-section-toggle {
      width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;
      color: var(--t4); flex-shrink: 0; transition: transform .18s ease;
      transform: rotate(-90deg); /* left-pointing icon → down when rotated -90 */
    }
    .svc-section-toggle.closed { transform: rotate(0deg); /* back to left-pointing = collapsed */ }
    .svc-section-lbl {
      font-size: .72rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--t3); transition: color .12s;
    }
    .svc-section-count {
      font-size: .62rem; font-weight: 600; padding: 1px 6px;
      border-radius: 99px; background: var(--s1); color: var(--t4);
      border: 1px solid var(--b);
    }

    /* ── NEWS CARDS (home row) ───────────────────────────── */
    .news-card { flex: 0 0 200px; background: var(--s1); border-radius: 10px; padding: 14px 15px; scroll-snap-align: start; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; gap: 7px; border: 1px solid transparent; transition: background .14s, border-color .14s; }
    .news-card:hover { background: var(--s2); border-color: var(--b); }
    .news-meta { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    .news-src  { font-size: .56rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; }
    .news-age  { font-size: .6rem; color: var(--t4); flex-shrink: 0; }
    .news-hl   { font-size: .8rem; font-weight: 500; color: var(--t1); line-height: 1.38; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── NEWS VIEW (full page) ────────────────────────────── */
    .nv-wrap    { padding: 20px 24px 40px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; height: 100%; box-sizing: border-box; scrollbar-width: none; }
    .nv-wrap::-webkit-scrollbar { display: none; }
    .nv-filters { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 2px; }
    .nv-pill    { padding: 4px 13px; border-radius: 99px; border: 1px solid var(--b); background: transparent; color: var(--t3); font-size: .7rem; cursor: pointer; transition: all .12s; font-family: inherit; line-height: 1.5; }
    .nv-pill:hover { color: var(--t1); border-color: var(--b2); background: var(--s1); }
    .nv-pill.on { background: var(--a-lo); border-color: color-mix(in oklch, var(--a) 40%, transparent); color: var(--a); font-weight: 600; }
    .nv-loading { display: flex; align-items: center; gap: 8px; color: var(--t4); font-size: .78rem; padding: 48px 0; justify-content: center; }
    .nv-empty   { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 64px 20px; text-align: center; color: var(--t4); font-size: .82rem; }

    /* ── NEWS MAGAZINE LAYOUT ────────────────────────────── */
    .nm-src  { font-size: .57rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
    .nm-when { font-size: .6rem; color: var(--t4); flex-shrink: 0; }
    .nm-hd   { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 8px; }
    .nm-top  { display: grid; grid-template-columns: 3fr 2fr; gap: 10px; }
    @media (max-width: 580px) { .nm-top { grid-template-columns: 1fr; } }
    .nm-hero {
      background: var(--s1); border-radius: 12px; padding: 20px 22px;
      display: flex; flex-direction: column; justify-content: space-between; gap: 10px;
      text-decoration: none; border: 1px solid transparent; transition: border-color .14s; min-height: 180px;
    }
    .nm-hero:hover { border-color: var(--b2); }
    .nm-hero-body { display: flex; flex-direction: column; gap: 8px; }
    .nm-hero-title {
      font-size: 1.22rem; font-weight: 700; color: var(--t1);
      line-height: 1.24; letter-spacing: -.03em;
      display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
    }
    .nm-hero-desc {
      font-size: .8rem; line-height: 1.62; color: var(--t3);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .nm-stack { display: flex; flex-direction: column; gap: 8px; }
    .nm-side  {
      background: var(--s1); border-radius: 10px; padding: 14px 15px;
      flex: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 6px;
      text-decoration: none; border: 1px solid transparent; transition: border-color .14s;
    }
    .nm-side:hover { border-color: var(--b2); }
    .nm-side-title {
      font-size: .82rem; font-weight: 500; color: var(--t1); line-height: 1.38;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .nm-grid  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    @media (max-width: 580px) { .nm-grid { grid-template-columns: repeat(2, 1fr); } }
    .nm-item  {
      background: var(--s1); border-radius: 9px; padding: 13px 14px;
      display: flex; flex-direction: column; gap: 6px;
      text-decoration: none; border: 1px solid transparent; transition: border-color .14s;
    }
    .nm-item:hover { border-color: var(--b2); }
    .nm-item-title {
      font-size: .77rem; font-weight: 500; color: var(--t1); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .nm-item .nm-hd, .nm-side .nm-hd { margin-bottom: 0; }
    .nm-item-desc {
      font-size: .69rem; color: var(--t4); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ── NEWS VIEW: toolbar (search / refresh) ───────────── */
    .nv-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nv-bar .nv-filters { padding-bottom: 0; flex: 1 1 auto; }
    .nv-pill b { font-weight: 600; opacity: .55; margin-left: 5px; font-size: .62rem; }
    .nv-search { position: relative; flex: 0 1 190px; min-width: 130px; }
    .nv-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--t4); pointer-events: none; }
    .nv-search input {
      width: 100%; box-sizing: border-box; padding: 5px 11px 5px 27px;
      border-radius: 99px; border: 1px solid var(--b); background: var(--s1);
      color: var(--t1); font-size: .72rem; font-family: inherit; outline: none; transition: border-color .12s;
    }
    .nv-search input::placeholder { color: var(--t4); }
    .nv-search input:focus { border-color: var(--a); }
    .nv-refresh {
      display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 99px;
      border: 1px solid var(--b); background: transparent; color: var(--t3);
      font-size: .7rem; cursor: pointer; font-family: inherit; transition: all .12s; line-height: 1.5; white-space: nowrap;
    }
    .nv-refresh:hover { color: var(--t1); border-color: var(--b2); background: var(--s1); }
    .nv-refresh:disabled { opacity: .6; cursor: default; }
    .nv-updated { font-size: .64rem; color: var(--t4); white-space: nowrap; }

    /* ── NEWS VIEW: images, read state, day groups ───────── */
    .nm-hero-img  { width: 100%; aspect-ratio: 16 / 7; object-fit: cover; border-radius: 9px; display: block; background: var(--inner); }
    .nm-side-row  { display: flex; gap: 10px; align-items: flex-start; }
    .nm-side-thumb { width: 64px; height: 48px; object-fit: cover; border-radius: 7px; flex-shrink: 0; background: var(--inner); }
    .nm-item-thumb { width: 100%; aspect-ratio: 16 / 8; object-fit: cover; border-radius: 7px; display: block; background: var(--inner); }
    .nm-read { opacity: .55; }
    .nm-read .nm-hero-title, .nm-read .nm-side-title, .nm-read .nm-item-title { color: var(--t3); }
    .nm-day-hd {
      font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
      color: var(--t4); margin: 16px 0 0; display: flex; align-items: center; gap: 10px;
    }
    .nm-day-hd::after { content: ''; flex: 1; height: 1px; background: var(--b); }

    /* ── SERVICE WIDGETS ─────────────────────────────────── */
    .widget {
      flex: 0 0 186px; background: var(--s1);
      border-radius: 12px; padding: 14px;
      scroll-snap-align: start; position: relative; overflow: hidden;
      display: flex; flex-direction: column; gap: 0;
    }
    .widget::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 90% 60% at 10% 0%, color-mix(in oklch, var(--wc, var(--t2)) 20%, transparent), transparent 70%),
        linear-gradient(160deg, color-mix(in oklch, var(--wc, var(--t2)) 10%, transparent) 0%, transparent 50%);
      border-radius: inherit;
    }
    /* Header */
    .widget-hd { display: flex; align-items: center; gap: 7px; margin-bottom: 11px; }
    .widget-logo {
      width: 30px; height: 30px; flex: none;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: color-mix(in oklch, var(--wc, var(--t2)) 18%, var(--s2));
    }
    .widget-logo img { width: 20px; height: 20px; border-radius: 3px; object-fit: contain; display: block; }
    .widget-name { font-size: .77rem; font-weight: 600; color: var(--t2); flex: 1; letter-spacing: -.01em; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .widget-url { color: var(--t4); flex: none; text-decoration: none; font-size: .7rem; line-height: 1; transition: color .12s; }
    .widget-url:hover { color: var(--wc, var(--t2)); }
    /* Primary stat — featured big number */
    .stat-primary { margin-bottom: 9px; padding-bottom: 9px; border-bottom: 1px solid var(--b); }
    .stat-primary-val {
      display: block; font-size: 1.7rem; font-weight: 600; line-height: 1;
      color: var(--wc, var(--t2)); letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }
    .stat-primary-lbl {
      display: block; font-size: .6rem; color: var(--t4); font-weight: 500;
      text-transform: uppercase; letter-spacing: .07em; margin-top: 3px;
    }
    /* Secondary stats */
    .widget-stats { display: flex; flex-direction: column; gap: 4px; }
    .stat-row { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
    .stat-k { font-size: .63rem; color: var(--t4); flex: none; }
    .stat-v { font-size: .68rem; font-weight: 500; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    /* Status footer */
    .widget-foot { display: flex; align-items: center; gap: 5px; margin-top: auto; padding-top: 9px; }
    .widget-status-dot { width: 5px; height: 5px; border-radius: 50%; flex: none; background: var(--t4); }
    .widget-status-dot.live { background: var(--g); box-shadow: 0 0 0 3px color-mix(in oklch, var(--g) 22%, transparent); }
    .widget-status-dot.err  { background: var(--r); box-shadow: 0 0 0 3px color-mix(in oklch, var(--r) 22%, transparent); }
    .widget-status-lbl { font-size: .6rem; color: var(--t4); }

    /* ── SYSTEM SECTION (Glances) ────────────────────────── */
    .sys-tile {
      flex: 0 0 130px;
      background: var(--s1); border-radius: 10px; padding: 11px 13px;
      display: flex; flex-direction: column; gap: 0;
      scroll-snap-align: start;
    }
    .sys-tile-lbl {
      font-size: .58rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--t4); margin-bottom: 4px;
    }
    .sys-tile-val {
      font-size: 1.25rem; font-weight: 600; line-height: 1.1;
      color: var(--t1); letter-spacing: -.03em;
      font-variant-numeric: tabular-nums;
    }
    .sys-tile-sub { font-size: .6rem; color: var(--t4); margin-top: 2px; }
    .sys-bar { height: 3px; background: var(--s2); border-radius: 99px; margin-top: 8px; overflow: hidden; }
    .sys-bar-fill {
      height: 100%; border-radius: inherit;
      background: var(--a);
      transition: width .6s cubic-bezier(.22, 1, .36, 1);
    }
    .sys-bar-fill.warn { background: oklch(72% 0.19 75); }
    .sys-bar-fill.crit { background: var(--r); }
    .sys-tile.net { flex: 0 0 190px; flex-direction: row; align-items: center; gap: 0; padding: 0; }
    .sys-tile.net .sys-half { flex: 1; padding: 11px 13px; }
    .sys-tile.net .sys-half + .sys-half { border-left: 1px solid var(--b); }

    /* ── LINK TILES ──────────────────────────────────────── */
    .link-tile {
      flex: 0 0 148px; background: var(--s1);
      border-radius: 9px; padding: 14px;
      scroll-snap-align: start; cursor: pointer; text-decoration: none;
      display: flex; flex-direction: column; gap: 9px;
      border: 1px solid transparent;
      transition: background 140ms, border-color .15s;
      position: relative; overflow: hidden;
    }
    .link-tile::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(135deg, color-mix(in oklch, var(--lc, var(--t3)) 10%, transparent) 0%, transparent 50%);
      border-radius: inherit;
    }
    .link-tile:hover { background: var(--s2); border-color: color-mix(in oklch, var(--lc, var(--t3)) 35%, transparent); }
    .link-tile-ico {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: color-mix(in oklch, var(--lc, var(--t3)) 18%, var(--s2));
      color: var(--lc, var(--t3));
    }
    .link-tile-ico img { width: 26px; height: 26px; border-radius: 5px; object-fit: contain; display: block; }
    .link-tile-name { font-size: .79rem; font-weight: 600; color: var(--t1); letter-spacing: -.01em; }
    .link-tile-desc { font-size: .67rem; color: var(--t4); margin-top: -5px; }

    /* ── EXTERNAL STATUS SECTION ────────────────────────── */
    .ext-status-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 4px; }
    .ext-status-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px 6px 8px;
      background: var(--s1); border-radius: 99px;
      border: 1px solid var(--b); font-size: .72rem; font-weight: 500;
      color: var(--t2); text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .ext-status-pill:hover { background: var(--s2); border-color: var(--b2); }
    .ext-status-pill img { width: 14px; height: 14px; border-radius: 3px; object-fit: contain; }
    .ext-status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex: none;
      background: var(--t4);
    }
    .ext-status-dot.ok       { background: var(--g); box-shadow: 0 0 0 2px color-mix(in oklch, var(--g) 20%, transparent); }
    .ext-status-dot.minor    { background: oklch(78% 0.18 85); box-shadow: 0 0 0 2px oklch(78% 0.18 85 / 0.2); }
    .ext-status-dot.major    { background: oklch(72% 0.19 55); box-shadow: 0 0 0 2px oklch(72% 0.19 55 / 0.2); }
    .ext-status-dot.critical { background: var(--r); box-shadow: 0 0 0 2px color-mix(in oklch, var(--r) 20%, transparent); }
    .ext-status-dot.loading  { background: var(--t4); animation: pulse 1.2s ease-in-out infinite; }

    /* ── STATUS BAR (compact home indicator) ─────────────── */
    .status-bar {
      display: flex; align-items: center; gap: 6px;
      margin: 0 24px 16px;
      padding: 9px 14px;
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: 10px;
      cursor: pointer;
      transition: background .14s, border-color .14s, box-shadow .14s;
      user-select: none;
    }
    .status-bar:hover {
      background: var(--s2);
      border-color: var(--b2);
      box-shadow: 0 2px 8px oklch(0% 0 0 / .12);
    }
    .status-bar:active { opacity: .85; }
    .status-bar-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
    .status-bar-sep { width: 1px; height: 9px; background: var(--b2); margin: 0 5px; }
    .status-bar-label { font-size: .7rem; color: var(--t3); font-weight: 500; }
    .status-bar-open {
      margin-left: auto;
      display: flex; align-items: center; gap: 4px;
      font-size: .7rem; color: var(--a); font-weight: 600;
      padding: 2px 8px 2px 10px;
      background: var(--a-lo);
      border-radius: 99px;
      transition: gap .15s;
    }
    .status-bar:hover .status-bar-open { gap: 6px; }
    .status-bar-chevron { font-size: .65rem; line-height: 1; }

    /* ── STATUS DRAWER ───────────────────────────────────── */
    .status-backdrop {
      position: fixed; inset: 0;
      background: oklch(0% 0 0 / .35);
      z-index: 499;
      animation: fadeIn .18s ease-out;
    }
    .status-drawer {
      position: fixed; top: 12px; right: 12px; bottom: 12px;
      width: 290px;
      background: var(--frame);
      border: 1px solid var(--b2);
      border-radius: 16px;
      z-index: 500;
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: slideInRight .22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideInRight {
      from { transform: translateX(calc(100% + 24px)); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    .sdr-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 13px;
      border-bottom: 1px solid var(--b);
      flex: none;
    }
    .sdr-title { font-size: .82rem; font-weight: 600; color: var(--t1); letter-spacing: -.01em; }
    .sdr-body { flex: 1; overflow-y: auto; }
    .sdr-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--b);
    }
    .sdr-item-ico { width: 20px; height: 20px; border-radius: 4px; object-fit: contain; flex: none; }
    .sdr-item-info { flex: 1; min-width: 0; }
    .sdr-item-name { font-size: .76rem; font-weight: 500; color: var(--t1); }
    .sdr-item-desc { font-size: .66rem; color: var(--t3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sdr-foot {
      padding: 10px 16px;
      font-size: .64rem; color: var(--t4);
      border-top: 1px solid var(--b);
      flex: none;
    }

    /* ── SYSTEM SECTION ─────────────────────────────────── */
    .sys-empty {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px;
      background: var(--s1); border-radius: 10px;
      border: 1px dashed var(--b2);
    }
    .sys-empty-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t4); flex: none; }
    .sys-empty-text { font-size: .75rem; color: var(--t3); }
    .sys-empty-hint { font-size: .68rem; color: var(--t4); font-family: 'Geist Mono', monospace; margin-left: auto; }

    /* ── DISCOVER VIEW ──────────────────────────────────────── */
    .discover-wrap { padding: 20px 24px 0; }
    .discover-type-tabs { display: inline-flex; background: var(--b2); border-radius: 8px; padding: 3px; margin-bottom: 16px; gap: 2px; }
    .discover-type-tab { padding: 5px 18px; border-radius: 6px; border: none; background: transparent; color: var(--t3); font-size: .8rem; font-weight: 500; cursor: pointer; transition: all .15s; }
    .discover-type-tab:hover { color: var(--t1); }
    .discover-type-tab.on { background: var(--b1); color: var(--t1); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
    .genre-chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 6px; }
    .genre-chips::-webkit-scrollbar { display: none; }
    .genre-chip {
      flex: none; padding: 4px 13px; border-radius: 99px;
      border: 1px solid var(--b); background: var(--s1);
      font-size: .7rem; font-weight: 500; color: var(--t3);
      cursor: pointer; transition: all .12s; font-family: inherit;
    }
    .genre-chip:hover { background: var(--s2); color: var(--t2); border-color: var(--b2); }
    .genre-chip.on { background: var(--a-lo); border-color: color-mix(in oklch, var(--a) 35%, transparent); color: var(--a); }

    .film-section { margin-bottom: 26px; }
    .film-section-hd { display: flex; align-items: baseline; gap: 8px; margin-bottom: 11px; }
    .film-section-title { font-size: .82rem; font-weight: 600; color: var(--t2); letter-spacing: -.01em; }
    .film-section-count { font-size: .66rem; color: var(--t4); }
    .film-row {
      display: flex; gap: 11px; overflow-x: auto; padding-bottom: 6px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .film-row::-webkit-scrollbar { display: none; }
    .film-row::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 99px; }

    .film-card {
      flex: 0 0 130px; scroll-snap-align: start; cursor: pointer;
      border-radius: 10px; overflow: hidden;
      background: var(--s1); border: 1px solid var(--b);
