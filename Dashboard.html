    if (!feeds?.length) { setItems([]); setLoading(false); setError(null); return; }
    let dead = false; // ignore late responses after unmount / feed-list change
    const force = forceRef.current; forceRef.current = false;

    // 1) last good items paint instantly (stale-while-revalidate);
    //    on a manual refresh, keep what's already on screen instead
    const cachedAll = feeds.flatMap(f =>
      (feedCacheRead('rss', f.url) || []).map(it => ({ ...it, date: it.date ? new Date(it.date) : null, feedName: f.name })));
    cachedAll.sort((a, b) => new Date(b.date) - new Date(a.date));
    if (!force) setItems(cachedAll);
    setLoading(!force && !cachedAll.length);
    setRefreshing(true);
    setError(null);

    // 2) fresh fetch in the background (force bypasses the server cache)
    let serverMissing = false;
    const fetches = feeds.map(f =>
      fetchRSS(f.url, { force })
        .then(items => { feedCacheWrite('rss', f.url, items); return items.map(item => ({ ...item, feedName: f.name })); })
        .catch(e => { if (e?.message === 'server-required') serverMissing = true; return null; })
    );
    Promise.all(fetches).then(results => {
      if (dead) return;
      const all = results.filter(Boolean).flat();
      all.sort((a, b) => new Date(b.date) - new Date(a.date));
      if (all.length) { setItems(all); setUpdatedAt(Date.now()); }
      else if (serverMissing) setError('Open via http://localhost:8787 — feeds need the backend server.');
      else if (!cachedAll.length) setError('Could not load feeds. Check URLs in Settings.');
      setLoading(false);
      setRefreshing(false);
    });
    return () => { dead = true; };
  }, [JSON.stringify(feeds), tick]);

  const refresh = useCallback(() => { forceRef.current = true; setTick(t => t + 1); }, []);
  return { items, loading, refreshing, error, refresh, updatedAt };
}

function NewsView({ feeds: allFeeds, mode }) {

  const [filter, setFilter] = useState('all');
  const [q, setQ] = useState('');
  const [, setReadTick] = useState(0); // re-render after marking an item read
  const onOpen = link => { markRead(link); setReadTick(t => t + 1); };

  if (!feeds?.length) {
    return h('div', { className: 'nv-empty' },
      h(Icon, { d: I.news, size: 22 }),
      h('span', null, 'No feeds configured'),
      h('span', { style: { fontSize: '.72rem' } }, 'Add RSS feeds in Settings → Feeds to get started.')
    );
  }

  const colorMap = {};
  feeds.forEach(f => { colorMap[f.name] = feedColor(f.id); });
  const feedNames = feeds.map(f => f.name);

  const counts = {};
  items.forEach(it => { counts[it.feedName] = (counts[it.feedName] || 0) + 1; });

  const ql = q.trim().toLowerCase();
  const visible = items.filter(it =>
    (filter === 'all' || it.feedName === filter) &&
    (!ql || (it.title || '').toLowerCase().includes(ql) || (it.desc || '').toLowerCase().includes(ql)));

  const hero = visible[0];
  const secondary = visible.slice(1, 4);
  const stream = visible.slice(4);

  // group the stream under Today / Yesterday / This week / Earlier
  const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
  const dayBucket = d => {
    const t = d ? new Date(d).getTime() : NaN;
    if (isNaN(t)) return 'Earlier';
    if (t >= midnight.getTime()) return 'Today';
    if (t >= midnight.getTime() - 86400000) return 'Yesterday';
    if (t >= midnight.getTime() - 6 * 86400000) return 'This week';
    return 'Earlier';
  };
  const byBucket = {};
  stream.forEach(it => { (byBucket[dayBucket(it.date)] ||= []).push(it); });
  const groups = ['Today', 'Yesterday', 'This week', 'Earlier']
    .filter(b => byBucket[b]?.length).map(b => ({ label: b, items: byBucket[b] }));

  const Src = ({ name }) => h('span', { className: 'nm-src', style: { color: colorMap[name] || 'var(--a)' } }, name);

    href: it.link || '#', target: '_blank', rel: 'noreferrer',

  });

  return h('div', { className: 'nv-wrap' },
    // ── Toolbar: filter pills · search · refresh ──────────
    h('div', { className: 'nv-bar' },
      h('div', { className: 'nv-filters' },
        h('button', { type: 'button', className: 'nv-pill' + (filter === 'all' ? ' on' : ''), onClick: () => setFilter('all') },
          'All', items.length > 0 && h('b', null, items.length)),
        ...feedNames.map(name =>
          h('button', { type: 'button', key: name, className: 'nv-pill' + (filter === name ? ' on' : ''), onClick: () => setFilter(name) },
            name, counts[name] > 0 && h('b', null, counts[name]))
        )
      ),
      h('div', { className: 'nv-search' },
        h(Icon, { d: I.search, size: 12 }),
        h('input', { value: q, onChange: e => setQ(e.target.value), placeholder: 'Search…', 'aria-label': 'Search news' })
      ),
      h('button', { type: 'button', className: 'nv-refresh', onClick: refresh, disabled: refreshing, title: 'Fetch feeds again now' },
        h('svg', { width: 12, height: 12, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', className: refreshing ? 'spin' : '' },
          h('path', { d: 'M21 12a9 9 0 11-6.219-8.56M21 3v6h-6' })),
        refreshing ? 'Refreshing…' : 'Refresh'
      ),
      updatedAt && !refreshing && h('span', { className: 'nv-updated' }, `updated ${relTime(updatedAt)}`),
    ),

    loading && h('div', { className: 'nv-loading' },

/* ─────────────────────────────────────────────────────────
   EXTERNAL STATUS SECTION
───────────────────────────────────────────────────────── */
function useStatusCheck(services, backend) {
  const [results, setResults] = useState({});
  useEffect(() => {
    if (!backend || !services?.length) return;
    let dead = false;
    const check = async () => {
      const entries = await Promise.all(services.map(async svc => {
        try {
          const r = await fetch(`/api/status-check?url=${encodeURIComponent(svc.url)}`, { signal: AbortSignal.timeout(8000) });
          const j = await r.json();
          return [svc.id, j];
        } catch {
          return [svc.id, { indicator: 'unknown' }];
        }
      }));
      if (!dead) setResults(Object.fromEntries(entries));
    };
    check();
    const id = setInterval(check, 3 * 60 * 1000); // re-check every 3 min
    return () => { dead = true; clearInterval(id); };
  }, [JSON.stringify(services?.map(s => s.id)), backend]);
  return results;
}

const indToCls = ind => {
  if (ind === 'none')     return 'ok';
  if (ind === 'minor')    return 'minor';
  if (ind === 'major')    return 'major';
  if (ind === 'critical') return 'critical';
  return 'loading';
};

// Compact indicator bar shown on the home page
function StatusBar({ services, onOpen }) {
  const results = useStatusCheck(services);
  if (!services?.length) return null;

  const checked = services.filter(s => results[s.id]);
  const issues  = checked.filter(s => results[s.id]?.indicator !== 'none');
  const allOk   = checked.length === services.length && issues.length === 0;
  const label   = allOk ? 'All systems operational'
    : issues.length ? `${issues.length} issue${issues.length > 1 ? 's' : ''} detected`
    : 'Checking…';

  return h('div', { className: 'status-bar', onClick: onOpen, title: 'View service status' },
    services.map(svc => {
      const res = results[svc.id];
      const cls = res ? indToCls(res.indicator) : 'loading';
      return h('div', { key: svc.id, className: `status-bar-dot ext-status-dot ${cls}`, title: svc.name });
    }),
    h('div', { className: 'status-bar-sep' }),
    h('span', { className: 'status-bar-label' }, label),
    h('span', { className: 'status-bar-open' },
      'View status',
      h('span', { className: 'status-bar-chevron' }, '›'),
    ),
  );
}

/* ── mode filter util ───────────────────────────────────── */

  (items || []).filter(item => !item.mode || item.mode === 'both' || item.mode === mode);

// shared: validate a {name, url} form — shake blank names, flag bad URLs
function useFormValidation() {
  const [urlErr, setUrlErr] = useState(null);
  const [shakeName, setShakeName] = useState(false);
  const validate = (d, { urlRequired = false } = {}) => {
    if (!String(d.name || '').trim()) {
      setShakeName(true);
      setTimeout(() => setShakeName(false), 450);
      return false;
    }
    if (d.url || urlRequired) {
      try { new URL(d.url); setUrlErr(null); }
      catch { setUrlErr('Enter a valid URL, e.g. http://jellyfin.local'); return false; }
    }
    setUrlErr(null);
    return true;
  };
  return { urlErr, shakeName, validate, clearUrlErr: () => setUrlErr(null) };
}

  const upd = (k, v) => setD(p => ({ ...p, [k]: v }));

  // Effective adapter: explicit 'adapter' field wins, then falls back to logo
  const adKey  = d.adapter || d.logo || '';
  const adMeta = KNOWN_ADAPTERS[adKey] || null;

  // statsVisible: array of stat keys to show; null/undefined = show all
  const isStatOn  = key => !d.statsVisible?.length || d.statsVisible.includes(key);
  const toggleStat = key => {
    const allKeys = adMeta ? adMeta.stats.map(s => s.key) : [];
    const current = d.statsVisible?.length ? d.statsVisible : allKeys;
    const next    = current.includes(key) ? current.filter(k => k !== key) : [...current, key];
    upd('statsVisible', next.length === allKeys.length ? null : next);
  };

  const updStat = (i, k, v) => {
    const s = [...(d.stats || [])]; s[i] = { ...s[i], [k]: v };
    setD(p => ({ ...p, stats: s }));
  };

/* ─────────────────────────────────────────────────────────
   SETTINGS — YOUTUBE EDIT FORM (Mistral channel suggestions)
───────────────────────────────────────────────────────── */
function YTEditForm({ ch, onSave, onCancel }) {
  const isNew = !ch.id;
  const [d, setD] = useState({ ...ch });
  const [mode, setMode] = useState('ai');          // 'ai' | 'manual'
  const [selected, setSelected] = useState(new Set());
  const [keywords, setKeywords] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const [searching, setSearching] = useState(false);
  const [searchErr, setSearchErr] = useState(null);
  const [manualName, setManualName] = useState(ch.name || '');
  const [manualId, setManualId]     = useState(ch.channelId || '');

  const suggest = async () => {
    const kw = keywords.trim();
    if (!kw) return;
    setSearching(true); setSearchErr(null); setSuggestions([]);
    try {
      const text = await llmChat({
        model: 'mistral-small-latest',
        messages: [{ role: 'user', content: `Suggest 10 popular YouTube channels for someone interested in: "${kw}". Only include well-known channels where you are certain of the exact channel ID. Return ONLY a valid JSON array with no markdown or explanation:\n[{"name":"Channel Name","channelId":"UC...","desc":"One sentence about the channel"}]\nChannel IDs must start with UC and be exactly 24 characters. Omit any channel you are unsure about.` }],
        max_tokens: 1200, temperature: 0.2,
      });
      const match = text.match(/\[[\s\S]*?\]/);
      if (!match) throw new Error('No channels returned — try different keywords.');
      const parsed = JSON.parse(match[0]);
      const valid = parsed.filter(c => /^UC[a-zA-Z0-9_-]{22}$/.test(c.channelId));
      if (!valid.length) throw new Error('No valid channels found. Try broader keywords.');
      setSuggestions(valid);
    } catch (e) {
      setSearchErr(e.message || 'Suggestion failed.');
    }
    setSearching(false);
  };

  const toggle = (s) => {
    if (isNew) {
      setSelected(prev => { const n = new Set(prev); n.has(s.channelId) ? n.delete(s.channelId) : n.add(s.channelId); return n; });
    } else {
      setD(p => ({ ...p, channelId: s.channelId, name: p.name || s.name }));
    }
  };
  const isSel = (s) => isNew ? selected.has(s.channelId) : d.channelId === s.channelId;

  const handleSave = () => {
    if (mode === 'manual') {
      const id = manualId.trim();
      const nm = manualName.trim() || id;
      if (!id) return;
      if (isNew) onSave([{ name: nm, channelId: id }]);
      else onSave({ ...d, name: nm, channelId: id });
    } else {
      if (isNew) onSave(suggestions.filter(s => selected.has(s.channelId)));
      else onSave(d);
    }
  };

  const canSave = mode === 'manual'
    ? manualId.trim().length > 0
    : isNew ? selected.size > 0 : !!d.channelId;

  return h('div', { className: 'edit-form' },

    // Mode tabs (AI suggest vs manual entry)
    h('div', { className: 'yt-mode-tabs' },
      h('button', { type: 'button', className: 'yt-mode-tab' + (mode === 'ai' ? ' on' : ''), onClick: () => setMode('ai') },
        h(Icon, { d: I.bolt, size: 12 }), ' AI suggest'),
      h('button', { type: 'button', className: 'yt-mode-tab' + (mode === 'manual' ? ' on' : ''), onClick: () => setMode('manual') },
        h(Icon, { d: I.plus, size: 12 }), ' Manual entry'),
    ),

    // ── AI mode ──────────────────────────────────────────────────────────
    mode === 'ai' && h(React.Fragment, null,
      h('div', { className: 'set-f' },
        h('label', { className: 'set-l' }, 'What are you into?'),
        h('div', { style: { display: 'flex', gap: 6 } },
          h('input', {
            className: 'set-i', value: keywords,
            onChange: e => setKeywords(e.target.value),
            onKeyDown: e => e.key === 'Enter' && suggest(),
            placeholder: 'e.g. linux, cooking, space, finance…',
            style: { flex: 1 },
          }),
          h('button', { type: 'button', className: 'btn btn-s', onClick: suggest, disabled: searching, style: { flex: 'none' } },
            searching
              ? h('svg', { width: 13, height: 13, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, className: 'spin' }, h('path', { d: 'M21 12a9 9 0 11-6.219-8.56' }))
              : h(Icon, { d: I.bolt, size: 13 }),
            ' Suggest'
          ),
        ),
      ),
      searchErr && h('p', { style: { fontSize: '.7rem', color: 'var(--r)', margin: '4px 0 8px', lineHeight: 1.4 } }, searchErr),

      (searching || suggestions.length > 0) && h('div', { style: { position: 'relative', margin: '4px 0 10px', minHeight: searching && !suggestions.length ? 88 : 'auto' } },
        searching && h(React.Fragment, null,

let yamlLibPromise = null; // lazy-loaded yaml parser for client-side validation
function getYamlLib() {
  if (!yamlLibPromise) {
    yamlLibPromise = import('https://cdn.jsdelivr.net/npm/yaml@2/+esm').catch(() => null);
  }
  return yamlLibPromise;
}

function ConfigTab({ backend }) {
  const [text, setText] = useState('');
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [saving, setSaving] = useState(false);
  const [savedOk, setSavedOk] = useState(false);
  const [dirty, setDirty] = useState(false);
  const importRef = React.useRef(null);

  const exportYaml = () => {
    const blob = new Blob([text], { type: 'text/yaml' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'earth.yaml'; a.click();
    URL.revokeObjectURL(url);
  };

  const onImport = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setText(ev.target.result || ''); setDirty(true); };
    reader.readAsText(file);
    e.target.value = '';
  };

  const load = () => {
    if (!backend) { setLoading(false); return; }
    setLoading(true); setErr(null);
    fetch('/api/config/raw', { signal: AbortSignal.timeout(4000) })
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
      .then(t => { setText(t); setDirty(false); setLoading(false); })
      .catch(e => { setErr(`Could not load config: ${e.message}`); setLoading(false); });
  };
  useEffect(load, [backend]);

  const save = async () => {
    setSaving(true); setErr(null); setSavedOk(false);
    // client-side validation first, when the yaml lib is reachable
    try {
      const YAML = await getYamlLib();
      if (YAML) YAML.parse(text, { merge: true });
    } catch (e) {
      setErr(`Invalid YAML: ${e.message}`);
      setSaving(false);
      return;
    }
    try {
      lastLocalSaveAt = Date.now();
      const r = await fetch('/api/config/raw', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: text,
        signal: AbortSignal.timeout(5000),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
      setSavedOk(true); setDirty(false);
      setTimeout(() => setSavedOk(false), 1800);
    } catch (e) {
      setErr(String(e.message || e));
    }
    setSaving(false);
  };

  if (!backend) {
    return h('div', { className: 'set-g' },
      h('div', { className: 'set-gtitle' }, 'earth.yaml'),
      h('p', { className: 'set-help', style: { marginTop: 0, lineHeight: 1.6 } },
        'Config file editing requires the backend server. Start it with ',
        h('code', { style: { color: 'var(--t2)' } }, 'node server.mjs'),
        ' and reload this page.'),
    );
  }

  return h('div', null,
    h('div', { className: 'set-g' },
      h('div', { className: 'set-gtitle' }, 'earth.yaml'),
      loading
        ? h('div', { className: 'row-loading', style: { padding: '8px 0' } }, 'Loading config…')
        : h('textarea', {
            className: 'cfg-ta',
            value: text,
            spellCheck: false,
            onChange: e => { setText(e.target.value); setDirty(true); },
            'aria-label': 'earth.yaml contents',
          }),
      err && h('p', { className: 'field-err', style: { marginTop: 8 } }, err),
      h('div', { className: 'save-bar' },
        h('button', { type: 'button', className: 'btn btn-p', onClick: save, disabled: saving || loading || !dirty },
          h(Icon, { d: I.check, size: 13 }), saving ? ' Saving…' : ' Save'),
        h('button', { type: 'button', className: 'btn btn-s', onClick: load, disabled: saving }, 'Reload'),
        h('button', { type: 'button', className: 'btn btn-s', onClick: exportYaml, disabled: loading, title: 'Download earth.yaml' }, '↓ Export'),
        h('button', { type: 'button', className: 'btn btn-s', onClick: () => importRef.current?.click(), title: 'Import a earth.yaml file' }, '↑ Import'),
        h('input', { ref: importRef, type: 'file', accept: '.yaml,.yml,text/yaml,text/plain', style: { display: 'none' }, onChange: onImport }),
        savedOk && h('span', { className: 'saved-ok' }, h(Icon, { d: I.check, size: 13 }), ' Saved'),
      ),
      h('p', { className: 'set-help', style: { marginTop: 12, lineHeight: 1.6 } },
        'This file is the single source of truth. Comments and formatting are preserved. ',
        'You can also edit it in your own editor — the dashboard refreshes automatically.'),
    )
  );
}

function LocationSearchField({ cfg, save }) {
  const [query,     setQuery]     = useState('');
  const [results,   setResults]   = useState([]);
  const [searching, setSearching] = useState(false);
  const [open,      setOpen]      = useState(false);
  const debounceRef = React.useRef(null);

  const current = cfg.location;

  const search = (q) => {
    if (!q.trim()) { setResults([]); setOpen(false); return; }
    setSearching(true);
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`)
      .then(r => r.json())
      .then(j => { setResults(j.results || []); setOpen(true); })
      .catch(() => setResults([]))
      .finally(() => setSearching(false));
  };

  const onType = (e) => {
    const v = e.target.value;
    setQuery(v);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => search(v), 350);
  };

  const pick = (r) => {
    const parts = [r.name, r.admin1, r.country].filter(Boolean);
    const name  = parts.join(', ');
    save({ ...cfg, location: { name, lat: r.latitude, lng: r.longitude } });
    setQuery('');
    setResults([]);
    setOpen(false);
  };

  const clear = () => save({ ...cfg, location: null });

  return h('div', { className: 'set-g' },
    h('div', { className: 'set-gtitle' }, 'Location (for weather)'),
    current?.name && h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 } },
      h('div', { style: { fontSize: '.78rem', color: 'var(--ok, #4c8)' } },
        '✓ ', h('strong', null, current.name),
        h('span', { style: { color: 'var(--t4)', fontWeight: 400, marginLeft: 6 } },
          `${current.lat?.toFixed(3)}, ${current.lng?.toFixed(3)}`,
        ),
      ),
      h('button', {
        onClick: clear,
        style: { fontSize: '.68rem', color: 'var(--t4)', background: 'none', border: 'none', cursor: 'pointer', padding: '1px 4px' },
      }, '✕ clear'),
    ),
    h('div', { style: { position: 'relative' } },
      h('div', { className: 'set-f', style: { marginBottom: 0 } },
        h('label', { className: 'set-l' }, current?.name ? 'Search to change' : 'Search for a city'),
        h('div', { style: { position: 'relative', display: 'flex', alignItems: 'center' } },
          h('input', {
            className: 'set-i',
            type: 'text',
            placeholder: 'e.g. Edinburgh, London, New York…',
            value: query,
            onChange: onType,
            onFocus: () => results.length && setOpen(true),
            onBlur:  () => setTimeout(() => setOpen(false), 150),
            autoComplete: 'off',
            style: { paddingRight: 28 },
          }),
          searching && h('span', { style: { position: 'absolute', right: 10, fontSize: '.7rem', color: 'var(--t4)' } }, '…'),
        ),
      ),
      open && results.length > 0 && h('div', {
        style: {
          position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 50,
          background: 'var(--frame)', border: '1px solid var(--b2)',
          borderRadius: 8, boxShadow: '0 8px 24px oklch(0% 0 0 / .22)',
          overflow: 'hidden', marginTop: 4,
        },
      },
        results.map((r, i) => {
          const parts = [r.name, r.admin1, r.country].filter(Boolean);
          return h('button', {
            key: r.id || i,
            onMouseDown: () => pick(r),
            style: {
              display: 'block', width: '100%', textAlign: 'left',
              padding: '8px 14px', background: 'none', border: 'none',
              cursor: 'pointer', fontFamily: 'inherit',
              borderBottom: i < results.length - 1 ? '1px solid var(--b)' : 'none',
              transition: 'background .1s',
            },
            onMouseEnter: e => e.currentTarget.style.background = 'var(--s1)',
            onMouseLeave: e => e.currentTarget.style.background = 'none',
          },
            h('span', { style: { fontSize: '.78rem', fontWeight: 600, color: 'var(--t1)' } }, r.name),
            parts.length > 1 && h('span', { style: { fontSize: '.72rem', color: 'var(--t4)', marginLeft: 6 } },
              parts.slice(1).join(', '),
            ),
            h('span', { style: { fontSize: '.66rem', color: 'var(--t4)', float: 'right', paddingTop: 2 } },
              `${r.latitude?.toFixed(2)}, ${r.longitude?.toFixed(2)}`,
            ),
          );
        }),
      ),
    ),
  );
}

function ApiKeyField({ label, hint, hintUrl, hintUrlText, placeholder, statusUrl, saveUrl, bodyKey, cachePrefix }) {
  const [val,    setVal]    = useState('');
  const [status, setStatus] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saved,  setSaved]  = useState(false);
  const [err,    setErr]    = useState(null);

  useEffect(() => {
    fetch(statusUrl).then(r => r.json())
      .then(j => setStatus(j.configured ? 'configured' : 'unconfigured'))
      .catch(() => {});
  }, []);

  const save = async () => {
    if (!val.trim()) return;
    setSaving(true); setErr(null);
    try {
      const r = await fetch(saveUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [bodyKey]: val.trim() }),
      });
      const j = await r.json();
      if (j.ok) { setStatus('configured'); setSaved(true); setVal(''); setTimeout(() => setSaved(false), 3000); }
      else setErr(j.error || 'Save failed');
    } catch (e) { setErr(String(e?.message || e)); }
    finally { setSaving(false); }
  };

  return h('div', { className: 'set-g' },
    h('div', { className: 'set-gtitle' }, label),
    h('p', { className: 'field-hint', style: { marginBottom: 12 } },
      hint, ' ',
      h('a', { href: hintUrl, target: '_blank', rel: 'noopener', style: { color: 'var(--a)' } }, hintUrlText),
      '. Written to ',
      h('code', null, '.env'),
      ', never sent to the browser.'
    ),
    status && h('div', { style: { marginBottom: 10, fontSize: '.78rem', color: status === 'configured' ? 'var(--ok, #4c8)' : 'var(--t4)' } },
      status === 'configured' ? '✓ Configured' : '✗ Not configured',
    ),
    h('div', { className: 'set-f' },
      h('label', { className: 'set-l' }, status === 'configured' ? 'Replace' : 'Key / Token'),
      h('input', {
        className: 'set-i', type: 'password', placeholder,
        value: val,
        onChange: e => setVal(e.target.value),
        onKeyDown: e => e.key === 'Enter' && save(),
      }),
    ),
    err && h('div', { className: 'field-hint', style: { color: 'var(--err, #e55)', marginTop: 4 } }, err),
    h('button', {
      className: 'set-save', disabled: !val.trim() || saving,
      onClick: save, style: { marginTop: 10 },
    }, saving ? 'Saving…' : 'Save'),
    saved && h('div', { className: 'saved-ok' }, h(Icon, { d: I.check, size: 13 }), ' Saved'),
  );
}

  }, []);

  const save = async () => {
    const anyEmpty = fields.some(f => !vals[f.key]?.trim());
    if (anyEmpty) { setErr('All fields are required'); return; }
    setSaving(true); setErr(null);
    try {
      const body = fields.reduce((o, f) => ({ ...o, [f.key]: vals[f.key].trim() }), {});
      const r = await fetch(saveUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const text = await r.text();
      let j;
      try { j = JSON.parse(text); } catch { throw new Error(`Server error ${r.status} — try restarting the server`); }
      if (!r.ok || j.error) throw new Error(j.error || `Server error ${r.status}`);
      setStatus('configured'); setSaved(true);
      setTimeout(() => setSaved(false), 2500);
      setVals(fields.reduce((o, f) => ({ ...o, [f.key]: '' }), {}));
    } catch (e) { setErr(String(e?.message || e)); }
    finally { setSaving(false); }
  };

  return h('div', { className: 'set-g' },
    h('div', { className: 'set-gtitle' },
      label,
      h('span', { style: {
        marginLeft: 8, fontSize: '.62rem', fontWeight: 500, padding: '2px 7px', borderRadius: 4,
        background: status === 'configured' ? 'var(--g-lo)' : 'var(--a-lo)',
        color: status === 'configured' ? 'var(--g)' : 'var(--t4)',
      } }, status === 'configured' ? 'Connected' : status === 'unconfigured' ? 'Not set' : '…'),
    ),
    hint && h('p', { className: 'field-hint' }, hint, ' ',
      hintUrl && h('a', { href: hintUrl, target: '_blank', rel: 'noopener', style: { color: 'var(--a)' } }, hintUrlText || hintUrl)
    ),
    h('div', { style: { display: 'flex', flexDirection: 'column', gap: 8 } },
      fields.map(f =>
        h('div', { key: f.key, className: 'set-f' },
          h('label', { className: 'set-l' }, f.label),
          h('input', {
            className: 'set-i',
            type: f.secret ? 'password' : 'text',
            value: vals[f.key],
            placeholder: f.placeholder || '',
            onChange: e => setVals(v => ({ ...v, [f.key]: e.target.value })),
            onKeyDown: e => e.key === 'Enter' && save(),
            style: { fontFamily: f.mono ? 'monospace' : undefined, fontSize: f.mono ? '.78rem' : undefined },
          })
        )
      ),
    ),
    err && h('p', { style: { fontSize: '.72rem', color: 'var(--r)', marginTop: 4 } }, err),
    h('div', { style: { display: 'flex', gap: 8, marginTop: 4 } },
      h('button', { type: 'button', className: 'btn btn-s', onClick: save, disabled: saving },
        saving ? 'Saving…' : saved ? '✓ Saved' : 'Save'),
    ),
  );
}

function CustomApiBuilder({ cfg, save }) {
  const apis = cfg.customApis || [];
  const [form, setForm] = React.useState(null);
  const [draft, setDraft] = React.useState({ name: '', url: '', jsonPath: '', label: '' });
  const [testing, setTesting] = React.useState(false);
  const [testResult, setTestResult] = React.useState(null);

  const openNew = () => { setDraft({ name: '', url: '', jsonPath: '', label: '' }); setForm('new'); setTestResult(null); };
  const openEdit = api => { setDraft({ ...api }); setForm(api.id); setTestResult(null); };
  const cancel = () => { setForm(null); setTestResult(null); };

  const commit = () => {
    if (!draft.name || !draft.url) return;
    const list = form === 'new'
      ? [...apis, { ...draft, id: uid() }]
      : apis.map(a => a.id === form ? { ...draft } : a);
    save({ ...cfg, customApis: list });
    setForm(null);
  };
  const del = id => save({ ...cfg, customApis: apis.filter(a => a.id !== id) });

  const test = async () => {
    setTesting(true); setTestResult(null);
    try {
      const r = await fetch(`/api/proxy?url=${encodeURIComponent(draft.url)}`);
      const j = await r.json();
      if (j.error) { setTestResult({ ok: false, msg: j.error }); return; }
      let val = j.data;
      if (draft.jsonPath) {
        for (const k of draft.jsonPath.split('.')) val = val?.[k];
      }
      setTestResult({ ok: true, msg: JSON.stringify(val).slice(0, 120) });
    } catch (e) { setTestResult({ ok: false, msg: String(e?.message || e) }); }
    finally { setTesting(false); }
  };

  return h('div', { className: 'set-g' },
    h('div', { className: 'set-gtitle' }, 'Custom API widgets'),
    h('p', { className: 'field-hint', style: { marginBottom: 10 } },
      'Fetch any JSON API on your network and display a value on the dashboard.'),
    apis.map(api =>
      form === api.id
        ? h(CustomApiForm, { key: api.id, draft, setDraft, onSave: commit, onCancel: cancel, onTest: test, testing, testResult })
        : h('div', { key: api.id, className: 'list-item' },
            h('div', { className: 'li-body' },
              h('span', { className: 'li-name' }, api.name),
              api.label && h('span', { className: 'li-url' }, api.label),
              h('span', { className: 'li-url', style: { opacity: .6 } }, api.url),
            ),
            h('div', { className: 'li-acts' },
              h('button', { type: 'button', className: 'mini', onClick: () => openEdit(api) }, 'Edit'),
              h('button', { type: 'button', className: 'mini del', onClick: () => del(api.id) }, 'Delete'),
            ),
          )
    ),
    form === 'new'
      ? h(CustomApiForm, { draft, setDraft, onSave: commit, onCancel: cancel, onTest: test, testing, testResult })
      : h('button', { type: 'button', className: 'btn btn-s', style: { marginTop: 6 }, onClick: openNew },
          h(Icon, { d: I.plus, size: 13 }), ' Add widget'),
  );
}

    const fn = e => {

  const trailer     = detail?.videos?.results?.find(v => v.site === 'YouTube' && v.type === 'Trailer');

  return h(React.Fragment, null,
    showTrailer && trailer && h(React.Fragment, null,
      h('div', { className: 'trailer-bg', onClick: () => setShowTrailer(false) }),
      h('div', { className: 'trailer-wrap' },
        h('button', { className: 'trailer-close', onClick: () => setShowTrailer(false), 'aria-label': 'Close trailer' }, '×'),
        h('iframe', {
          className: 'trailer-frame',
          src: `https://www.youtube-nocookie.com/embed/${trailer.key}?autoplay=1&rel=0`,
          allow: 'autoplay; fullscreen',
          allowFullScreen: true,
          frameBorder: '0',

    ),
    h('div', { className: 'film-modal-bg', onClick: onClose }),

      h('div', { className: 'film-modal-top' },
        backdrop && h('img', { src: backdrop, alt: '' }),
        h('div', { className: 'film-modal-top-grad' }),

      h('div', { className: 'film-modal-scroll' },
        h('div', { className: 'film-modal-body' },
          !detail

            : h(React.Fragment, null,
                h('div', { className: 'film-modal-row' },
                  h('div', { className: 'film-modal-poster' },
                    poster && h('img', { src: poster, alt: title }),
                  ),
                  h('div', { className: 'film-modal-info' },
                    h('div', { className: 'film-modal-title' }, title),
                    detail.tagline && h('div', { className: 'film-modal-tagline' }, '"', detail.tagline, '"'),
                    h('div', { className: 'film-modal-pills' },
                      detail.vote_average > 0 && h('span', { className: 'film-modal-pill gold' }, '★ ', detail.vote_average.toFixed(1)),
                      year && h('span', { className: 'film-modal-pill' }, year),

function fmtPlaycount(n) {
  if (!n) return null;
  const num = parseInt(n, 10);
  if (isNaN(num)) return null;
  if (num >= 1_000_000) return (num / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M plays';
  if (num >= 1_000) return (num / 1_000).toFixed(0) + 'K plays';
  return num + ' plays';
}

function DiscoverView({ cfg }) {
  const [mediaType,   setMediaType]   = useState('movie'); // 'movie' | 'tv' | 'music'
  const [trending,    setTrending]    = useState(null);
  const [section2,    setSection2]    = useState(null);
  const [section3,    setSection3]    = useState(null);
  const [genres,      setGenres]      = useState([]);
  const [activeGenre, setActiveGenre] = useState(null);
  const [selectedId,  setSelectedId]  = useState(null);
  const [error,       setError]       = useState(null);

  const jellyseerrUrl = cfg.services?.find(s => s.logo === 'jellyseerr')?.url || null;

  const apiFetch = url => fetch(url).then(r => {
    if (!r.ok) throw new Error(`Server returned ${r.status} — try restarting the server`);
    return r.json();
  });

  const load = (type) => {
    if (type === 'music') return; // handled by MusicDiscoverView
    setTrending(null); setSection2(null); setSection3(null);
    setGenres([]); setActiveGenre(null); setError(null);
    const urls = type === 'tv'
      ? ['/api/tmdb/tv/genres', '/api/tmdb/tv/trending', '/api/tmdb/tv/popular', '/api/tmdb/tv/on-air']
      : ['/api/tmdb/genres', '/api/tmdb/trending', '/api/tmdb/now-playing', '/api/tmdb/upcoming'];
    Promise.all(urls.map(apiFetch))
      .then(([g, t, s2, s3]) => {
        if (g.error) { setError(g.error); return; }
        setGenres(g.genres || []);
        setTrending(t.results  || []);
        setSection2(s2.results || []);
        setSection3(s3.results || []);
      })
      .catch(e => setError(String(e?.message || e)));
  };

  useEffect(() => { if (backendAvailable) load(mediaType); }, [mediaType]);

  const filter = items =>
    activeGenre ? (items || []).filter(m => m.genre_ids?.includes(activeGenre)) : (items || []);

  const loading = trending === null && mediaType !== 'music';

  const switchType = type => { if (type !== mediaType) setMediaType(type); };

  const sec2Title = mediaType === 'tv' ? 'Popular'    : 'Now playing';
  const sec3Title = mediaType === 'tv' ? 'On air now' : 'Coming soon';

  const allItems = [...(trending || []), ...(section2 || []), ...(section3 || [])];
  const usedGenreIds = new Set(allItems.flatMap(m => m.genre_ids || []));
  const visibleGenres = genres.filter(g => usedGenreIds.has(g.id));

  const toggle = h('div', { className: 'discover-type-tabs' },
    h('button', { className: `discover-type-tab${mediaType === 'movie' ? ' on' : ''}`, onClick: () => switchType('movie') }, 'Movies'),
    h('button', { className: `discover-type-tab${mediaType === 'tv'    ? ' on' : ''}`, onClick: () => switchType('tv')    }, 'TV Shows'),
    h('button', { className: `discover-type-tab${mediaType === 'music' ? ' on' : ''}`, onClick: () => switchType('music') }, 'Music'),
  );

  if (mediaType === 'music') return h('div', { className: 'discover-wrap' },
    toggle,
    h(MusicDiscoverView, null),
  );

  if (error) return h('div', { className: 'discover-wrap' },
    toggle,
    h('div', { className: 'discover-empty' },
      h('div', { className: 'discover-empty-title' }, 'TMDB unavailable'),
      h('div', { className: 'discover-empty-sub' }, error),
    ),
  );

  return h('div', { className: 'discover-wrap' },
    selectedId && h(FilmModal, {
      movieId: selectedId, genres, jellyseerrUrl, mediaType,
      onClose: () => setSelectedId(null),
    }),
    toggle,
    visibleGenres.length > 0 && h('div', { className: 'genre-chips' },
      h('button', { className: `genre-chip${!activeGenre ? ' on' : ''}`, onClick: () => setActiveGenre(null) }, 'All'),
      visibleGenres.map(g => h('button', {
        key: g.id,
        className: `genre-chip${activeGenre === g.id ? ' on' : ''}`,
        onClick: () => setActiveGenre(g.id === activeGenre ? null : g.id),
      }, g.name)),
    ),
    h(FilmSection, { title: 'Trending this week', movies: filter(trending),  genres, onSelect: m => setSelectedId(m.id), loading, mediaType }),
    h(FilmSection, { title: sec2Title,            movies: filter(section2),  genres, onSelect: m => setSelectedId(m.id), loading, mediaType }),
    h(FilmSection, { title: sec3Title,            movies: filter(section3),  genres, onSelect: m => setSelectedId(m.id), loading, mediaType }),
  );
}

function ServersView({ cfg, mode }) {
  const services = filterByMode(cfg.services, mode);
  const live = useServiceStats(services);
  const [collapsed, setCollapsed] = useState(() => {
    try { return JSON.parse(localStorage.getItem('earth:collapsed-sections') || '{}'); } catch { return {}; }
  });
  const toggleSection = name => {
    const next = { ...collapsed, [name]: !collapsed[name] };
    setCollapsed(next);
    try { localStorage.setItem('earth:collapsed-sections', JSON.stringify(next)); } catch {}
  };

  if (!services?.length) {
    return h('div', { className: 'nv-empty' },
      h(Icon, { d: I.srvr, size: 22 }),
      h('span', null, 'No services configured'),
      h('span', { style: { fontSize: '.72rem' } }, 'Add services in Settings → Services to see live stats here.')
    );
  }

  // Build section groups
  const DEFAULT = '__default__';
  const seen = new Map();
  const groups = [];
  services.forEach(svc => {
    const key = svc.section?.trim() || DEFAULT;
    if (!seen.has(key)) { seen.set(key, []); groups.push(key); }
    seen.get(key).push(svc);
  });
  const singleDefault = groups.length === 1 && groups[0] === DEFAULT;

  return h('div', { className: 'sv-wrap' },
    !backendAvailable && h('p', { className: 'sv-note' },
      'Backend not running — showing configured fallback stats. Start it with ',
      h('code', { style: { color: 'var(--t2)' } }, 'node server.mjs'),
      ' to see live data.'),

    singleDefault
      ? h('div', { className: 'sv-grid' },
          ...services.map(svc => h(SvCard, { key: svc.id, svc, live }))
        )
      : h('div', { className: 'svc-sections' },
          groups.map(key => {
            const group = seen.get(key);
            const label = key === DEFAULT ? 'Services' : key;
            const isOpen = !collapsed[key];
            return h('div', { key, className: 'svc-section' },
              h('div', { className: 'svc-section-hd', onClick: () => toggleSection(key) },
                h('div', { className: 'svc-section-toggle' + (isOpen ? '' : ' closed') },
                  h(Icon, { d: I.collapse, size: 11 }),
                ),
                h('span', { className: 'svc-section-lbl' }, label),
                h('span', { className: 'svc-section-count' }, group.length),
              ),
              isOpen && h('div', { style: { padding: '4px 20px 14px' } },
                h('div', { className: 'sv-grid' },
                  ...group.map(svc => h(SvCard, { key: svc.id, svc, live }))
                )
              ),
            );
          })
        )
  );
}

function useHAStates(domain) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  useEffect(() => {
    if (!backendAvailable) { setLoading(false); return; }
    let dead = false;
    const load = () =>
      fetch(`/api/ha/states?domain=${domain}`)
        .then(r => r.json())
        .then(d => { if (!dead) { if (d.error) setError(d.error); else { setData(d); setError(null); } setLoading(false); } })
        .catch(e => { if (!dead) { setError(String(e?.message || e)); setLoading(false); } });
    load();
    const id = setInterval(load, 15_000);
    return () => { dead = true; clearInterval(id); };
  }, [domain]);
  return { data, loading, error, reload: () => { setLoading(true); setData(null); } };
}

function haCallService(domain, service, entity_id, data) {
  return fetch('/api/ha/service', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ domain, service, entity_id, data }),
  }).then(r => r.json());
}

function relTimeHA(isoStr) {
  if (!isoStr) return null;
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)   return 'just now';
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function friendlyName(entity_id, attributes) {
  return attributes?.friendly_name || entity_id.split('.')[1].replace(/_/g, ' ');
}

function AutomationCard({ entity, onToggle, onTrigger }) {
  const [busy, setBusy] = useState(false);

  return h('div', { className: 'auto-card' },
    h('div', { className: `auto-card-icon${isOn ? ' on' : ''}` },
      h(Icon, { d: I.bolt, size: 15 }),

  );
}

// Hook: fetch states for a list of entity IDs, poll every 8s
function useEntityStates(entityIds) {
  const [states, setStates] = useState({});
  const [loading, setLoading] = useState(true);
  const idsKey = entityIds.join(',');
  useEffect(() => {
    if (!entityIds.length || !backendAvailable) { setLoading(false); return; }
    let dead = false;
    const load = () =>
      fetch('/api/ha/states')
        .then(r => r.json())
        .then(all => {
          if (dead) return;
          if (Array.isArray(all)) {
            const map = {};
            all.forEach(e => { if (entityIds.includes(e.entity_id)) map[e.entity_id] = e; });
            setStates(map);
          }
          setLoading(false);
        })
        .catch(() => { if (!dead) setLoading(false); });
    load();
    const t = setInterval(load, 8000);
    return () => { dead = true; clearInterval(t); };
  }, [idsKey]);
  return { states, loading };
}

// Helper: colour for on/off/unavailable
function entityStateColor(state) {
  if (!state) return 'var(--t4)';
  if (state === 'on' || state === 'home' || state === 'open' || state === 'playing' || state === 'locked') return 'var(--a)';
  if (state === 'unavailable' || state === 'unknown') return 'var(--t4)';
  return 'var(--t3)';
}

  const isHome = state === 'home';
  return h('div', { className: 'ew-body ew-person-body' },
    h('div', { className: 'ew-person-badge' + (isHome ? ' home' : '') },
      isHome ? '🏠 Home' : `📍 ${state === 'not_home' ? 'Away' : state}`,
    ),
  );
}

// ── Input number / number ─────────────────────────────────────────────────────
function NumberWidget({ entity }) {
  const val  = parseFloat(entity.state);
  const min  = entity.attributes?.min  ?? 0;
  const max  = entity.attributes?.max  ?? 100;
  const step = entity.attributes?.step ?? 1;
  const unit = entity.attributes?.unit_of_measurement || '';
  const domain = entity.entity_id.split('.')[0];
  const set  = v => haCallService(domain, 'set_value', entity.entity_id, { value: v });
  return h('div', { className: 'ew-body' },
    h('div', { className: 'ew-number-row' },
      h('span', { className: 'ew-sensor-val' }, isNaN(val) ? '—' : val),
      unit && h('span', { className: 'ew-sensor-unit' }, unit),
    ),
    h('input', {
      type: 'range', min, max, step, value: isNaN(val) ? min : val,
      className: 'ew-slider',
      onChange: e => set(Number(e.target.value)),
    }),
  );
}

// ── Lock widget ───────────────────────────────────────────────────────────────
function LockWidget({ entity }) {
  const locked = entity.state === 'locked';
  const call   = svc => haCallService('lock', svc, entity.entity_id);
  return h('div', { className: 'ew-body ew-toggle-body' },
    h('button', {
      type: 'button',
      className: 'ew-lock-btn' + (locked ? ' locked' : ''),
      onClick: () => call(locked ? 'unlock' : 'lock'),
    }, locked ? '🔒 Locked' : '🔓 Unlocked'),
  );
}

// ── Main EntityWidget dispatcher ─────────────────────────────────────────────
function EntityWidget({ entityId, name, state }) {
  const domain  = entityId.split('.')[0];
  const label   = name || state?.attributes?.friendly_name || entityId.split('.')[1].replace(/_/g, ' ');
  const isUnavail = !state || state.state === 'unavailable';

  const body = () => {
    if (!state) return h('div', { className: 'ew-loading' }, '…');
    switch (domain) {
      case 'light':           return h(LightWidget,  { entity: state, name: label });
      case 'switch':
      case 'input_boolean':
      case 'fan':
      case 'automation':      return h(ToggleWidget, { entity: state, name: label });
      case 'climate':         return h(ClimateWidget, { entity: state });
      case 'cover':           return h(CoverWidget,   { entity: state });
      case 'media_player':    return h(MediaWidget,   { entity: state });
      case 'person':
      case 'device_tracker':  return h(PersonWidget,  { entity: state });
      case 'input_number':
      case 'number':          return h(NumberWidget,  { entity: state });
      case 'lock':            return h(LockWidget,    { entity: state });
      case 'sensor':
      case 'binary_sensor':
      case 'weather':
      default:                return h(SensorWidget,  { entity: state });
    }
  };

  return h('div', { className: 'entity-widget' + (isUnavail ? ' unavail' : '') },
    h('div', { className: 'ew-header' },
      h('div', { className: 'ew-dot', style: { background: isUnavail ? 'var(--t4)' : entityStateColor(state?.state) } }),
      h('span', { className: 'ew-name' }, label),
      h('span', { className: 'ew-domain' }, domain.replace(/_/g, ' ')),
    ),
    body(),
  );
}

function AutomationsView({ cfg }) {
  const [tab, setTab] = useState('automations');
  const autos   = useHAStates('automation');
  const scenes  = useHAStates('scene');
  const scripts = useHAStates('script');

  // Entities tab
  const widgets   = cfg.ha?.widgets || [];
  const entityIds = widgets.map(w => w.entity_id);
  const { states: entityStates, loading: entitiesLoading } = useEntityStates(entityIds);

  const haUrl = cfg.ha?.url || cfg.services?.find(s => (s.adapter || s.logo) === 'home-assistant')?.url || null;
  const hidden = new Set(cfg.ha?.hiddenEntities || []);
  const showDisabled = cfg.ha?.showDisabled !== false;

  const onToggle = (entity_id, isOn) =>
    haCallService('automation', isOn ? 'turn_off' : 'turn_on', entity_id);
  const onTrigger = entity_id =>
    haCallService('automation', 'trigger', entity_id, { skip_condition: true });
  const onActivate = entity_id =>
    haCallService('scene', 'turn_on', entity_id);
  const onRunScript = entity_id => {
    const scriptName = entity_id.split('.')[1];
    return haCallService('script', scriptName, undefined);
  };

  const filterEntities = (list) => (list || []).filter(e => !hidden.has(e.entity_id));

  const visibleAutos = filterEntities(autos.data)
    .filter(e => showDisabled || e.state === 'on')
    .sort((a, b) => {
      if (a.state !== b.state) return a.state === 'on' ? -1 : 1;
      return friendlyName(a.entity_id, a.attributes).localeCompare(friendlyName(b.entity_id, b.attributes));
    });

  const tabs = [
    { key: 'entities',    label: 'Entities',    count: widgets.length },
    { key: 'automations', label: 'Automations', count: visibleAutos.length },
    { key: 'scenes',      label: 'Scenes',      count: filterEntities(scenes.data).length },
    { key: 'scripts',     label: 'Scripts',     count: filterEntities(scripts.data).length },
  ];

  const current = tab === 'automations' ? autos : tab === 'scenes' ? scenes : tab === 'scripts' ? scripts : { loading: entitiesLoading, error: null, data: [] };

  if (!backendAvailable) return h('div', { className: 'auto-wrap' },
    h('div', { className: 'auto-hd' }, h('div', { className: 'auto-title' }, 'Automations')),
    h('div', { className: 'auto-error' }, 'Backend required — start with node server.mjs'),
  );

  return h('div', { className: 'auto-wrap' },
    h('div', { className: 'auto-hd' },
      h('div', null,
        h('div', { className: 'auto-title' }, 'Automations'),
        haUrl && h('div', { style: { fontSize: '.68rem', color: 'var(--t4)', marginTop: 2 } },
          'Home Assistant · ',
          h('a', { href: haUrl, target: '_blank', rel: 'noopener', style: { color: 'var(--t3)', textDecoration: 'none' } }, haUrl),
        ),
      ),
      h('div', { className: 'auto-tabs' },
        tabs.map(t => h('button', {
          key: t.key,
          className: 'auto-tab' + (tab === t.key ? ' on' : ''),
          onClick: () => setTab(t.key),
        }, t.label, t.count != null && h('span', { style: { marginLeft: 5, opacity: .55, fontSize: '.65rem' } }, t.count))),
      ),
    ),

    current.error && h('div', { className: 'auto-error' }, 'HA error: ', current.error),

    current.loading && h('div', { className: 'auto-loading' },
      h('div', { className: 'pulse', style: { width: 6, height: 6, borderRadius: '50%', background: 'var(--t4)' } }),
      'Connecting to Home Assistant…',
    ),

    // ── Entities tab ────────────────────────────────────────────────────────
    tab === 'entities' && h('div', null,
      widgets.length === 0
        ? h('div', { className: 'auto-empty' },
            h('div', { className: 'auto-empty-title' }, 'No entity widgets configured'),
            h('div', { style: { fontSize: '.72rem', color: 'var(--t4)', marginTop: 4 } }, 'Add entities in Settings → Automations → Entities'),
          )
        : (() => {
            // Group by room
            const rooms = {};
            widgets.forEach(w => {
              const room = w.room || 'Widgets';
              if (!rooms[room]) rooms[room] = [];
              rooms[room].push(w);
            });
            return h(React.Fragment, null,
              ...Object.entries(rooms).map(([room, ws]) =>
                h('div', { key: room, className: 'entity-room' },
                  Object.keys(rooms).length > 1 && h('div', { className: 'entity-room-label' }, room),
                  h('div', { className: 'entity-grid' },
                    ws.map(w => h(EntityWidget, {
                      key: w.entity_id,
                      entityId: w.entity_id,
                      name: w.name,
                      state: entityStates[w.entity_id] || null,
                    }))
                  ),
                )
              )
            );
          })()
    ),

    tab !== 'entities' && !current.loading && !current.error && h('div', { className: 'auto-grid' },
      tab === 'automations' && visibleAutos
        .map(e => h(AutomationCard, { key: e.entity_id, entity: e, onToggle, onTrigger })),

      tab === 'scenes' && filterEntities(scenes.data)
        .sort((a, b) => friendlyName(a.entity_id, a.attributes).localeCompare(friendlyName(b.entity_id, b.attributes)))
        .map(e => h(SceneCard, { key: e.entity_id, entity: e, onActivate })),

      tab === 'scripts' && filterEntities(scripts.data)
        .sort((a, b) => friendlyName(a.entity_id, a.attributes).localeCompare(friendlyName(b.entity_id, b.attributes)))
        .map(e => h(ScriptCard, { key: e.entity_id, entity: e, onRun: onRunScript })),

      !current.loading && !current.error && current.data?.length === 0 && h('div', { className: 'auto-empty' },
        h('div', { className: 'auto-empty-title' }, `No ${tab} found`),
        h('div', { style: { fontSize: '.72rem', color: 'var(--t4)' } }, 'Nothing returned from Home Assistant'),
      ),
    ),
  );
}

/* ─────────────────────────────────────────────────────────
   TOPBAR SERVER STATS
───────────────────────────────────────────────────────── */
function useTopbarStats(backend) {
  const [data, setData] = useState(null);
  useEffect(() => {
    if (!backend) return;
    let dead = false;
    const load = async () => {
      try {
        const r = await fetch('/api/sysinfo', { signal: AbortSignal.timeout(5000) });
        const j = await r.json();
        if (!dead && j?.stats) setData(j.stats);
      } catch {}
    };
    load();
    const id = setInterval(load, 10_000);
    return () => { dead = true; clearInterval(id); };
  }, [backend]);
  return data;
}

function TopbarStats({ backend }) {
  const stats = useTopbarStats(backend);
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  if (!backend || !stats) return null;

  const get   = key => stats.find(s => s.key === key);
  const cpu   = get('cpu');
  const mem   = get('mem');
  const disks = stats.filter(s => s.key === 'disk' || s.key.startsWith('disk_'));
  const disk  = disks[0]; // primary disk for topbar chip

  // Parse pct from stat.value since server sends it as string percent value
  const getPct = stat => {
    if (!stat) return null;
    if (stat.format === 'percent') return parseFloat(stat.value);
    return null;
  };

  const chip = (label, stat) => {
    if (!stat) return null;
    const pct = getPct(stat);
    const cls = pct >= 85 ? 'crit' : pct >= 65 ? 'warn' : '';
    return h('div', { className: `tb-stat-chip${cls ? ' ' + cls : ''}`, onClick: () => setOpen(o => !o) },
      h('span', { className: 'tb-stat-label' }, label),
      fmtStatVal(stat),
      pct != null && h('div', { className: 'tb-stat-bar' },
        h('div', { className: `tb-stat-bar-fill${cls ? ' ' + cls : ''}`, style: { width: `${Math.min(pct, 100)}%` } })
      ),
    );
  };

  const barStat = (label, stat) => {
    if (!stat) return null;
    const pct = getPct(stat);
    const barCls = pct >= 85 ? 'crit' : pct >= 65 ? 'warn' : '';
    return h('div', { className: 'tb-panel-stat' },
      h('div', { className: 'tb-panel-stat-row' },
        h('span', { className: 'tb-panel-stat-lbl' }, label),
        pct != null && h('div', { className: 'tb-panel-bar' },
          h('div', { className: `tb-panel-bar-fill${barCls ? ' ' + barCls : ''}`, style: { width: `${Math.min(pct, 100)}%` } })
        ),
        h('span', { className: 'tb-panel-stat-val' }, fmtStatVal(stat)),
      ),
      stat.sub && h('div', { className: 'tb-panel-sub' }, stat.sub),
    );
  };

  const net_tx = get('net_tx');
  const net_rx = get('net_rx');
  const load   = get('load');
  const uptime = get('uptime');

  return h(React.Fragment, null,
    open && h('div', { className: 'tb-panel-backdrop', onClick: () => setOpen(false) }),
    h('div', { className: 'tb-stats', ref },
      chip('CPU', cpu),
      chip('RAM', mem),
      chip('Disk', disk),
      open && h('div', { className: 'tb-panel' },
        h('div', { className: 'tb-panel-hd' },
          h('span', { className: 'tb-panel-title' }, 'System resources'),
          h('button', { className: 'tb-panel-close', onClick: () => setOpen(false) },
            h(Icon, { d: I.x, size: 10 }),
          ),
        ),
        h('div', { className: 'tb-panel-body' },
          barStat('CPU', cpu),
          load && h('div', { className: 'tb-panel-sub', style: { marginTop: -4 } },
            `Load avg: ${load.value}  ·  ${load.sub}`
          ),
          barStat('Memory', mem),
          disks.map(d => barStat(d.label || 'Disk', d)),
          (net_tx || net_rx) && h('div', { className: 'tb-panel-divider' }),
          (net_tx || net_rx) && h('div', { className: 'tb-panel-stat' },
            h('div', { className: 'tb-panel-stat-row' },
              h('span', { className: 'tb-panel-stat-lbl' }, 'Network'),
            ),
            h('div', { className: 'tb-panel-net-row' },
              net_tx && h('div', { className: 'tb-panel-net-half' },
                h('span', { className: 'tb-panel-net-lbl' }, '↑ Upload'),
                h('span', { className: 'tb-panel-net-val' }, fmtStatVal(net_tx)),
              ),
              net_rx && h('div', { className: 'tb-panel-net-half' },
                h('span', { className: 'tb-panel-net-lbl' }, '↓ Download'),
                h('span', { className: 'tb-panel-net-val' }, fmtStatVal(net_rx)),
              ),
            ),
          ),
          uptime && h('div', { className: 'tb-panel-divider' }),
          uptime && h('div', { className: 'tb-panel-stat-row' },
            h('span', { className: 'tb-panel-stat-lbl' }, 'Uptime'),
            h('span', { className: 'tb-panel-stat-val', style: { fontWeight: 500, color: 'var(--t2)' } }, uptime.value),
          ),
        ),
      ),
    ),
  );
}
