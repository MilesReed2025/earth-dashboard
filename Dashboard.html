      transition: transform .18s ease-out, box-shadow .18s ease-out, border-color .14s;
    }
    .film-card:hover { transform: translateY(-5px); box-shadow: 0 14px 32px oklch(0% 0 0 / .32); border-color: var(--b2); }
    .film-poster { position: relative; aspect-ratio: 2/3; overflow: hidden; background: var(--s2); }
    .film-poster img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s ease-out; }
    .film-card:hover .film-poster img { transform: scale(1.04); }
    .film-poster-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--t4); font-size: .68rem; text-align: center; padding: 10px; line-height: 1.4; }
    .film-rating-badge {
      position: absolute; top: 6px; right: 6px;
      background: oklch(0% 0 0 / .68); backdrop-filter: blur(6px);
      border-radius: 6px; padding: 2px 6px;
      font-size: .63rem; font-weight: 700; color: oklch(84% 0.18 86);
      display: flex; align-items: center; gap: 2px; letter-spacing: .01em;
    }
    .film-card-body { padding: 8px 10px 10px; }
    .film-card-title {
      font-size: .7rem; font-weight: 600; color: var(--t1);
      line-height: 1.35; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .film-card-year { font-size: .6rem; color: var(--t4); margin-top: 3px; }

    .film-skel { flex: 0 0 130px; border-radius: 10px; overflow: hidden; background: var(--s1); border: 1px solid var(--b); }
    .film-skel-poster { aspect-ratio: 2/3; background: var(--s2); animation: pulse 1.4s ease-in-out infinite; }
    .film-skel-body { padding: 8px 10px 10px; }
    .film-skel-line { height: 9px; border-radius: 4px; background: var(--s2); animation: pulse 1.4s ease-in-out infinite; margin-bottom: 5px; }
    .film-skel-line.short { width: 55%; }

    .film-modal-bg { position: fixed; inset: 0; background: oklch(0% 0 0 / .58); z-index: 400; animation: fadeIn .18s ease-out; }
    .film-modal {
      position: fixed; inset: 12px; z-index: 401;
      background: var(--frame); border: 1px solid var(--b2);
      border-radius: 18px; overflow: hidden;
      display: flex; flex-direction: column;
      max-width: 680px; max-height: 88vh;
      margin: auto;
      animation: slideUp .22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .film-modal-top { flex: none; height: 190px; overflow: hidden; position: relative; background: var(--s1); }
    .film-modal-top img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .film-modal-top-grad { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, var(--frame) 100%); }
    .film-modal-close {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      width: 28px; height: 28px; border-radius: 50%;
      background: oklch(0% 0 0 / .52); backdrop-filter: blur(4px);
      color: oklch(95% 0.005 228); border: none; cursor: pointer;
      font-size: .95rem; line-height: 1; font-family: inherit;
      transition: background .12s;
    }
    .film-modal-close:hover { background: oklch(0% 0 0 / .75); }
    .film-modal-scroll { flex: 1; overflow-y: auto; }
    .film-modal-body { padding: 0 20px 24px; }
    .film-modal-row { display: flex; gap: 14px; margin-top: -56px; position: relative; }
    .film-modal-poster { flex: 0 0 82px; height: 123px; border-radius: 8px; overflow: hidden; border: 2px solid var(--b2); box-shadow: 0 6px 20px oklch(0% 0 0 / .45); flex-shrink: 0; }
    .film-modal-poster img { width: 100%; height: 100%; object-fit: cover; }
    .film-modal-info { flex: 1; min-width: 0; padding-top: 60px; }
    .film-modal-title { font-size: .96rem; font-weight: 700; color: var(--t1); letter-spacing: -.02em; line-height: 1.2; }
    .film-modal-tagline { font-size: .7rem; color: var(--t3); margin-top: 3px; font-style: italic; }
    .film-modal-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .film-modal-pill { padding: 2px 9px; background: var(--s2); border-radius: 99px; font-size: .65rem; color: var(--t3); border: 1px solid var(--b); }
    .film-modal-pill.gold { background: oklch(18% 0.045 86); color: oklch(82% 0.18 86); border-color: oklch(28% 0.07 86); font-weight: 700; }
    .film-modal-overview { font-size: .77rem; color: var(--t2); line-height: 1.65; margin-top: 14px; }
    .film-modal-sh { font-size: .65rem; font-weight: 600; color: var(--t4); letter-spacing: .06em; text-transform: uppercase; margin: 14px 0 8px; }
    .film-cast { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .film-cast::-webkit-scrollbar { display: none; }
    .cast-chip { flex: none; text-align: center; width: 56px; }
    .cast-photo { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; margin: 0 auto 4px; background: var(--s2); border: 1px solid var(--b); }
    .cast-photo img { width: 100%; height: 100%; object-fit: cover; }
    .cast-name { font-size: .58rem; color: var(--t2); line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .film-modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .film-btn { padding: 7px 16px; border-radius: 8px; font-size: .74rem; font-weight: 600; cursor: pointer; border: 1px solid var(--b); background: var(--s1); color: var(--t2); font-family: inherit; transition: all .12s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .film-btn:hover { background: var(--s2); color: var(--t1); border-color: var(--b2); }
    .film-btn.primary { background: var(--t1); color: var(--frame); border-color: transparent; }
    .film-btn.primary:hover { opacity: .88; }
    .film-btn.icon-only { padding: 6px 9px; }
    .film-btn-logo { width: 18px; height: 18px; object-fit: contain; border-radius: 3px; display: block; }
    .discover-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; gap: 8px; text-align: center; }
    .discover-empty-title { font-size: .88rem; font-weight: 600; color: var(--t3); }
    .discover-empty-sub { font-size: .74rem; color: var(--t4); }

    /* ── MUSIC DISCOVER ──────────────────────────────────── */
    .music-card {
      flex: 0 0 120px; scroll-snap-align: start; cursor: pointer;
      border-radius: 10px; overflow: hidden;
      background: var(--s1); border: 1px solid var(--b);
      transition: transform .18s ease-out, box-shadow .18s ease-out, border-color .14s;
    }
    .music-card:hover { transform: translateY(-5px); box-shadow: 0 14px 32px oklch(0% 0 0 / .32); border-color: var(--b2); }
    .music-art { position: relative; aspect-ratio: 1/1; overflow: hidden; background: var(--s2); }
    .music-art img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s ease-out; }
    .music-card:hover .music-art img { transform: scale(1.04); }
    .music-art-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--t4); font-size: 1.6rem; }
    .music-card-body { padding: 8px 10px 10px; }
    .music-card-title { font-size: .7rem; font-weight: 600; color: var(--t1); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .music-card-sub { font-size: .6rem; color: var(--t4); margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .music-skel { flex: 0 0 120px; border-radius: 10px; overflow: hidden; background: var(--s1); border: 1px solid var(--b); }
    .music-skel-art { aspect-ratio: 1/1; background: var(--s2); animation: pulse 1.4s ease-in-out infinite; }
    .music-skel-body { padding: 8px 10px 10px; }
    .music-skel-line { height: 9px; border-radius: 4px; background: var(--s2); animation: pulse 1.4s ease-in-out infinite; margin-bottom: 5px; }
    .music-skel-line.short { width: 65%; }

    .music-plays {
      position: absolute; bottom: 5px; right: 6px;
      background: oklch(0% 0 0 / .68); backdrop-filter: blur(6px);
      border-radius: 5px; padding: 2px 6px;
      font-size: .58rem; font-weight: 600; color: oklch(84% 0.05 228);
    }

    /* Music detail modal */
    .music-modal-bg { position: fixed; inset: 0; background: oklch(0% 0 0 / .58); z-index: 400; animation: fadeIn .18s ease-out; }
    .music-modal {
      position: fixed; inset: 12px; z-index: 401;
      background: var(--frame); border: 1px solid var(--b2);
      border-radius: 18px; overflow: hidden;
      display: flex; flex-direction: column;
      max-width: 580px; max-height: 82vh;
      margin: auto;
      animation: slideUp .22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .music-modal-hero { flex: none; height: 160px; overflow: hidden; position: relative; background: var(--s2); }
    .music-modal-hero img { width: 100%; height: 100%; object-fit: cover; filter: blur(18px) saturate(1.4); transform: scale(1.1); }
    .music-modal-hero-art { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .music-modal-hero-art img { width: 100px; height: 100px; border-radius: 8px; box-shadow: 0 8px 28px oklch(0% 0 0 / .55); }
    .music-modal-close { position: absolute; top: 10px; right: 10px; z-index: 2; width: 28px; height: 28px; border-radius: 50%; background: oklch(0% 0 0 / .52); backdrop-filter: blur(4px); color: oklch(95% 0.005 228); border: none; cursor: pointer; font-size: .95rem; line-height: 1; font-family: inherit; transition: background .12s; }
    .music-modal-close:hover { background: oklch(0% 0 0 / .75); }
    .music-modal-scroll { flex: 1; overflow-y: auto; }
    .music-modal-body { padding: 16px 20px 24px; }
    .music-modal-title { font-size: .96rem; font-weight: 700; color: var(--t1); letter-spacing: -.02em; }
    .music-modal-artist { font-size: .78rem; color: var(--a); margin-top: 3px; font-weight: 500; }
    .music-modal-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .music-modal-tag { padding: 2px 9px; background: var(--s2); border-radius: 99px; font-size: .65rem; color: var(--t3); border: 1px solid var(--b); }
    .music-modal-sh { font-size: .65rem; font-weight: 600; color: var(--t4); letter-spacing: .06em; text-transform: uppercase; margin: 16px 0 8px; }
    .music-tracklist { display: flex; flex-direction: column; gap: 1px; }
    .music-track { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 7px; transition: background .1s; }
    .music-track:hover { background: var(--s1); }
    .music-track-num { font-size: .65rem; color: var(--t4); width: 18px; text-align: right; flex-shrink: 0; font-family: 'Geist Mono', monospace; }
    .music-track-name { font-size: .74rem; color: var(--t2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .music-track-dur { font-size: .65rem; color: var(--t4); font-family: 'Geist Mono', monospace; flex-shrink: 0; }
    .music-modal-actions { display: flex; gap: 8px; margin-top: 14px; }

    /* ── TRAILER PLAYER ──────────────────────────────────── */
    .trailer-bg { position: fixed; inset: 0; background: oklch(0% 0 0 / .88); z-index: 9000; animation: fadeIn 160ms ease; }
    .trailer-wrap { position: fixed; inset: 0; z-index: 9001; display: flex; align-items: center; justify-content: center; padding: 32px; }
    .trailer-frame { width: 100%; max-width: 960px; aspect-ratio: 16/9; border: none; border-radius: 10px; box-shadow: 0 32px 80px oklch(0% 0 0 / .7); }
    .trailer-close { position: fixed; top: 16px; right: 16px; z-index: 9002; width: 36px; height: 36px; border-radius: 50%; border: 1px solid oklch(100% 0 0 / .25); background: oklch(0% 0 0 / .55); color: oklch(96% 0 0); font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: background .12s; }
    .trailer-close:hover { background: oklch(0% 0 0 / .8); }

    /* ── AUTOMATIONS VIEW ───────────────────────────────── */
    .auto-wrap { padding: 0 24px 40px; display: flex; flex-direction: column; gap: 0; }
    .auto-hd { padding: 26px 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .auto-title { font-size: 1.1rem; font-weight: 600; color: var(--t1); letter-spacing: -.025em; }
    .auto-tabs { display: flex; gap: 3px; background: var(--s1); border-radius: 9px; padding: 3px; border: 1px solid var(--b); }
    .auto-tab { padding: 5px 14px; border-radius: 6px; border: none; background: transparent; color: var(--t3); font-size: .74rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .12s; white-space: nowrap; }
    .auto-tab.on { background: var(--s2); color: var(--t1); box-shadow: 0 1px 3px oklch(0% 0 0 / .15); }
    .auto-tab:hover:not(.on) { color: var(--t2); }
    .auto-grid { display: flex; flex-direction: column; gap: 6px; }
    .auto-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      background: var(--s1); border: 1px solid var(--b);
      transition: background .12s, border-color .12s;
    }
    .auto-card:hover { background: var(--s2); border-color: var(--b2); }
    .auto-card-icon {
      width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--s2); color: var(--t3);
    }
    .auto-card-icon.on { background: oklch(72% 0.14 145 / .15); color: oklch(68% 0.16 145); }
    .auto-card-icon.scene { background: oklch(72% 0.12 290 / .15); color: oklch(68% 0.14 290); }
    .auto-card-icon.script { background: oklch(72% 0.14 55 / .15); color: oklch(68% 0.16 55); }
    .auto-card-body { flex: 1; min-width: 0; }
    .auto-card-name { font-size: .82rem; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .auto-card-meta { font-size: .68rem; color: var(--t4); margin-top: 2px; }
    .auto-card-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .auto-toggle { position: relative; width: 34px; height: 20px; flex-shrink: 0; }
    .auto-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .auto-toggle-track { position: absolute; inset: 0; border-radius: 99px; background: var(--s2); border: 1px solid var(--b); cursor: pointer; transition: background .2s, border-color .2s; }
    .auto-toggle input:checked ~ .auto-toggle-track { background: oklch(68% 0.16 145); border-color: oklch(68% 0.16 145); }
    .auto-toggle-thumb { position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 50%; background: var(--t4); transition: transform .2s, background .2s; pointer-events: none; }
    .auto-toggle input:checked ~ .auto-toggle-track .auto-toggle-thumb { transform: translateX(14px); background: oklch(98% 0.004 145); }
    .auto-btn { padding: 5px 11px; border-radius: 7px; font-size: .7rem; font-weight: 600; cursor: pointer; border: 1px solid var(--b); background: var(--s1); color: var(--t2); font-family: inherit; transition: all .12s; display: inline-flex; align-items: center; gap: 4px; }
    .auto-btn:hover { background: var(--s2); color: var(--t1); border-color: var(--b2); }
    .auto-btn:active { opacity: .75; }
    .auto-btn:disabled { opacity: .4; cursor: default; }
    .auto-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 8px; color: var(--t4); text-align: center; }
    .auto-empty-title { font-size: .88rem; font-weight: 600; color: var(--t3); }
    .auto-loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 48px 0; color: var(--t4); font-size: .78rem; }
    .auto-error { background: oklch(30% 0.06 18 / .3); border: 1px solid oklch(50% 0.1 18 / .4); border-radius: 10px; padding: 14px 16px; font-size: .78rem; color: oklch(72% 0.12 18); margin-top: 8px; }
    .auto-section-lbl { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--t4); padding: 14px 0 6px; }

    /* ── NOTES SECTION ───────────────────────────────────── */
    .notes-section { padding: 26px 24px 0; }
    .notes-box { background: var(--s1); border-radius: 10px; padding: 14px 16px; }
    .notes-ta {
      width: 100%; min-height: 72px; resize: vertical;
      background: transparent; border: none; outline: none;
      color: var(--t2); font-family: 'Geist', sans-serif;
      font-size: .82rem; line-height: 1.65; font-weight: 400;
    }
    .notes-ta::placeholder { color: var(--t4); }

    /* ── EMPTY / LOADING ─────────────────────────────────── */
    .row-empty { font-size: .76rem; color: var(--t4); padding: 0 24px 10px; }
    .row-loading { display: flex; align-items: center; gap: 8px; padding: 8px 24px; font-size: .75rem; color: var(--t4); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SETTINGS ─────────────────────────────────────────── */
    .set { padding: 24px 24px 40px; }
    .set-h { font-size: 1rem; font-weight: 600; color: var(--t1); letter-spacing: -.02em; margin-bottom: 4px; }
    .set-sub { font-size: .78rem; color: var(--t4); margin-bottom: 22px; }
    /* Settings sidebar layout */
    .set-layout { display: flex; min-height: 0; flex: 1; }
    .set-side {
      width: 168px; flex-shrink: 0; border-right: 1px solid var(--b);
      display: flex; flex-direction: column; padding: 6px 0 16px; gap: 0;
      overflow-y: auto;
    }
    .set-side-hd {
      padding: 14px 16px 12px; font-size: .65rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--t4);
    }
    .set-nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 14px; margin: 1px 6px; border-radius: 7px;
      background: none; border: none; cursor: pointer;
      color: var(--t3); font-size: .78rem; font-weight: 500;
      font-family: inherit; text-align: left; width: calc(100% - 12px);
      transition: background .12s, color .12s;
    }
    .set-nav-item:hover:not(.on) { background: var(--s2); color: var(--t2); }
    .set-nav-item.on { background: var(--a-lo); color: var(--a); }
    .set-nav-sep { height: 1px; background: var(--b); margin: 6px 12px; }
    .set-main { flex: 1; padding: 22px 26px; overflow-y: auto; min-width: 0; }

    /* Legacy tab pills — kept for inner sub-tabs only */
    .set-tabs { display: flex; gap: 4px; margin-bottom: 22px; flex-wrap: wrap; }
    .set-tab {
      padding: 5px 13px; border-radius: 7px; cursor: pointer; font-size: .78rem;
      font-weight: 500; color: var(--t3); background: var(--s1); border: none; font-family: 'Geist', sans-serif;
      transition: background .12s, color .12s;
    }
    .set-tab.on { background: var(--a-lo); color: var(--a); }
    .set-tab:hover:not(.on) { background: var(--s2); color: var(--t2); }
    .set-g { background: var(--s1); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .set-gtitle { font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--t4); margin-bottom: 14px; }
    .set-f { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .set-f:last-child { margin-bottom: 0; }
    .set-l { font-size: .72rem; font-weight: 500; color: var(--t3); }
    .set-i {
      background: var(--inner); border: 1px solid var(--b); border-radius: 7px;
      padding: 7px 10px; font-size: .8rem; color: var(--t1);
      font-family: 'Geist', sans-serif; width: 100%; outline: none;
      transition: border-color .12s;
    }
    .set-i:focus { border-color: var(--a); }
    .set-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 7px; cursor: pointer; font-size: .77rem; font-weight: 500; font-family: 'Geist', sans-serif; border: none; transition: background .12s; }
    .btn-p { background: var(--t1); color: var(--frame); }
    .btn-p:hover { opacity: .88; }
    .btn-s { background: var(--s2); color: var(--t2); }
    .btn-s:hover { color: var(--t1); }
    .btn-d { background: color-mix(in oklch, var(--r) 14%, transparent); color: var(--r); }
    .btn-d:hover { background: color-mix(in oklch, var(--r) 24%, transparent); }
    .list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--inner); border-radius: 8px; margin-bottom: 6px; }
    .li-body { flex: 1; min-width: 0; }
    .li-name { font-size: .8rem; font-weight: 500; color: var(--t1); letter-spacing: -.01em; display: block; }
    .li-url  { font-size: .67rem; color: var(--t4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
    .li-acts { display: flex; gap: 5px; flex: none; }
    .mini { padding: 4px 9px; border-radius: 6px; font-size: .7rem; font-weight: 500; cursor: pointer; font-family: 'Geist', sans-serif; border: 1px solid var(--b); background: var(--s1); color: var(--t3); transition: background .1s, color .1s; }
    .mini:hover { background: var(--s2); color: var(--t1); }
    .mini.del { color: var(--r); border-color: color-mix(in oklch, var(--r) 28%, transparent); background: color-mix(in oklch, var(--r) 8%, transparent); }
    .mini.del:hover { background: color-mix(in oklch, var(--r) 20%, transparent); }
    .edit-form { background: var(--s2); border-radius: 9px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--b); }
    .swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    .swatch { width: 18px; height: 18px; border-radius: 4px; cursor: pointer; transition: transform .1s; border: 2px solid transparent; }
    .swatch:hover { transform: scale(1.2); }
    .swatch.on { border-color: var(--t1); transform: scale(1.1); }
    .icon-preview { width: 38px; height: 38px; border-radius: 9px; background: var(--s2); border: 1px solid var(--b); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .icon-preview img { width: 28px; height: 28px; object-fit: contain; }
    .icon-browse { font-size: .65rem; color: var(--a); margin-top: 3px; display: inline-block; text-decoration: none; }
    .icon-browse:hover { text-decoration: underline; }
    /* Weather daily narrative rows */
    .fx-dl-wrap { margin-top: 14px; display: flex; flex-direction: column; }
    .fx-dl { display: flex; flex-direction: column; gap: 5px; padding: 11px 0; border-bottom: 1px solid var(--b); }
    .fx-dl:last-child { border-bottom: none; padding-bottom: 0; }
    .fx-dl-hd { display: flex; align-items: center; gap: 8px; }
    .fx-dl-day { font-size: .75rem; font-weight: 600; color: var(--t1); letter-spacing: -.01em; }
    .fx-dl-range { font-size: .65rem; color: var(--t4); }
    .fx-dl-text { font-size: .79rem; line-height: 1.68; color: var(--t2); margin: 0; padding-left: 26px; font-style: italic; }
    .save-bar { display: flex; align-items: center; gap: 10px; margin-top: 16px; }
    .saved-ok { font-size: .72rem; color: var(--g); display: flex; align-items: center; gap: 4px; }
    .set-help { font-size: .7rem; color: var(--t4); margin-top: 4px; }

    /* ── LIVE STATS / SERVERS VIEW ───────────────────────── */
    @keyframes statPulse { 0%, 100% { opacity: .35; } 50% { opacity: .85; } }
    .stat-v.pulse { animation: statPulse 1.2s ease-in-out infinite; color: var(--t4); }
    .widget-dot.err { background: var(--r); box-shadow: 0 0 0 3px color-mix(in oklch, var(--r) 22%, transparent); }
    .sv-wrap { padding: 22px 24px 40px; }
    .sv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
    .sv-card {
      background: var(--s1); border-radius: 12px; padding: 16px;
      border: 1px solid var(--b); position: relative; overflow: hidden;
      transition: border-color .15s;
    }
    .sv-card::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(135deg, color-mix(in oklch, var(--wc, var(--t2)) 10%, transparent) 0%, transparent 50%);
      border-radius: inherit;
    }
    .sv-card:hover { border-color: color-mix(in oklch, var(--wc, var(--t2)) 40%, transparent); }
    .sv-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sv-name { font-size: .88rem; font-weight: 600; color: var(--t1); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: -.01em; }
    .sv-badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 99px; font-size: .62rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; flex: none; }
    .sv-badge.ok   { background: var(--g-lo); color: var(--g); }
    .sv-badge.err  { background: color-mix(in oklch, var(--r) 14%, transparent); color: var(--r); }
    .sv-badge.off  { background: var(--s2); color: var(--t4); }
    .sv-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .sv-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sv-stat { background: var(--inner); border-radius: 8px; padding: 9px 11px; min-width: 0; }
    .sv-stat-k { font-size: .62rem; color: var(--t4); display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: .05em; }
    .sv-stat-v { font-size: .86rem; font-weight: 600; color: var(--t1); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sv-stat-m { font-size: .6rem; color: var(--t4); display: block; margin-top: 1px; }
    .sv-err { font-size: .68rem; color: var(--r); margin-top: 10px; line-height: 1.4; word-break: break-word; }
    .sv-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .sv-url { font-size: .68rem; color: var(--t4); text-decoration: none; transition: color .12s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sv-url:hover { color: var(--wc, var(--t2)); }
    .sv-note { font-size: .78rem; color: var(--t4); margin-bottom: 16px; line-height: 1.6; }

    /* ── FORM VALIDATION ─────────────────────────────────── */
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .set-i.shake { animation: shake .2s ease 2; border-color: var(--r); }
    .field-err  { font-size: .68rem; color: var(--r); margin-top: 2px; }
    .field-hint { font-size: .6rem; color: var(--t4); margin-top: 3px; display: block; }
    .set-sel    { appearance: auto; }
    .adapter-tag { display: inline-flex; align-items: center; gap: 4px; font-size: .62rem;
      color: var(--t4); background: var(--s2); border-radius: 5px; padding: 2px 7px;
      margin-top: 5px; border: 1px solid var(--b); }
    .stats-cfg { display: flex; flex-direction: column; gap: 1px; margin-top: 5px; }
    .stats-cfg-row { display: flex; align-items: center; gap: 8px; padding: 4px 6px;
      border-radius: 5px; cursor: pointer; }
    .stats-cfg-row:hover { background: var(--s2); }
    .stats-cfg-row input[type=checkbox] { flex: none; cursor: pointer; accent-color: var(--a); }
    .stats-cfg-lbl  { font-size: .72rem; color: var(--t2); font-weight: 500; min-width: 72px; }
    .stats-cfg-desc { font-size: .62rem; color: var(--t4); }

    /* ── CONFIG (YAML) TAB ───────────────────────────────── */
    .cfg-ta {
      width: 100%; min-height: 380px; resize: vertical;
      background: var(--inner); border: 1px solid var(--b); border-radius: 9px;
      padding: 12px 14px; outline: none; color: var(--t1);
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: .76rem; line-height: 1.6; tab-size: 2;
      transition: border-color .12s;
    }
    .cfg-ta:focus { border-color: var(--a); }
    .cfg-ta:disabled { opacity: .55; cursor: not-allowed; }

    /* ── EMPTY STATES ────────────────────────────────────── */
    .row-empty-cta { display: flex; flex-direction: column; align-items: flex-start; gap: 9px; padding: 4px 24px 12px; }
    .row-empty-cta p { font-size: .76rem; color: var(--t4); margin: 0; }

    /* collapsed sidebar: let hover tooltips escape the rail */
    .frame.col .sidebar { overflow: visible; }

    /* ── DEMO MODE ───────────────────────────────────────── */
    .demo-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: .63rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      background: oklch(72% 0.19 160); color: oklch(10% 0.03 160);
      padding: 3px 9px; border-radius: 20px;
      user-select: none; flex-shrink: 0;
    }
    .demo-pill::before { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: oklch(22% 0.06 160); }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────────
       Three breakpoints:
         820px  Tablet landscape — collapse sidebar, shrink margins
         600px  Tablet portrait  — bottom nav replaces sidebar
         480px  Phone            — further tightening
    ──────────────────────────────────────────────────────────────────────── */

    /* Mobile nav — hidden on desktop, shown via media query below */
    .mobile-nav { display: none; }
    .mobile-nav-btn { -webkit-tap-highlight-color: transparent; }

    /* ── 820px: tablet landscape ─────────────────────── */
    @media (max-width: 820px) {
      .frame { inset: 0; border-radius: 0; }
      .inner { margin: 6px 6px 6px 0; border-radius: 12px; }
    }

    /* ── 600px: sidebar → bottom tab bar ─────────────── */
    @media (max-width: 600px) {
      /* Reset frame/inner to full bleed */
      .frame { inset: 0; border-radius: 0; flex-direction: column; }
      .inner { margin: 0; border-radius: 0; border: none; flex: 1; min-height: 0; order: 1; }

      /* Hide the sidebar entirely */
      .sidebar { display: none; }

      /* Bottom navigation bar — order: 2 pushes it below .inner (order:1) */
      .mobile-nav {
        display: flex !important;
        order: 2;
        flex: 0 0 auto;
        background: var(--frame);
        border-top: 1px solid var(--b);
        padding: 0 4px env(safe-area-inset-bottom, 8px);
        gap: 0;
      }
      .mobile-nav-btn {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 3px; padding: 8px 4px;
        background: none; border: none; cursor: pointer;
        color: var(--t4); font-family: inherit;
        transition: color .15s;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-nav-btn.on { color: var(--a); }
      .mobile-nav-btn-lbl { font-size: .6rem; font-weight: 500; letter-spacing: .01em; }

      /* Topbar on mobile */
      .topbar { padding: 0 12px; height: 44px; }

      /* Scroll areas */
      .scroll { -webkit-overflow-scrolling: touch; }

      /* Row cards — narrower on phone */
      .nv-wrap { padding: 14px 14px 30px; }
      .svc-card, .link-tile { flex: 0 0 140px; }
      .news-card { flex: 0 0 175px; }

      /* Suppress stat chips in topbar to save space */
      .tb-stats { display: none; }

      /* Weather forecast grid wraps to 4 cols */
      .fx-days { grid-template-columns: repeat(4, 1fr) !important; }

      /* News grid → single column */
      .nm-grid { grid-template-columns: 1fr !important; }
      .nm-top  { grid-template-columns: 1fr !important; }

      /* Settings panel */
      .set-layout { flex-direction: column; }
      .set-side { width: 100%; border-right: none; border-bottom: 1px solid var(--b);
                  flex-direction: row; overflow-x: auto; padding: 4px 8px; gap: 0; }
      .set-side-hd { display: none; }
      .set-nav-sep { display: none; }
      .set-nav-item { white-space: nowrap; width: auto; padding: 6px 10px; margin: 2px 2px; }
      .set-main { padding: 16px; }
      .set-tabs { flex-direction: row; overflow-x: auto; min-width: 0;
                  border-right: none; border-bottom: 1px solid var(--b);
                  padding: 6px 10px; gap: 4px; }
      .set-tab { white-space: nowrap; }
    }

    /* ── 480px: phone ─────────────────────────────────── */
    @media (max-width: 480px) {
      .topbar { padding: 0 10px; }
      .nv-wrap { padding: 12px 12px 24px; gap: 10px; }
      .fx-days { grid-template-columns: repeat(4, 1fr) !important; font-size: .7rem; }
      .svc-card { flex: 0 0 130px; }

      /* Service cards: 2-column grid fallback instead of horizontal scroll */
      .svc-grid-wrap { overflow-x: visible !important; }
      .svc-row { display: grid !important; grid-template-columns: 1fr 1fr;
                 gap: 8px; flex-wrap: unset; scroll-snap-type: none; }
      .svc-card { flex: none; width: auto; }

      /* Discovery films 2-col */
      .film-row .film-card { flex: 0 0 calc(50vw - 22px); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/react@18/umd/react.production.min.js'"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'"></script>
<script>
'use strict';

/* ─────────────────────────────────────────────────────────
   DEMO MODE
   Activated when served from /demo (window.EARTH_DEMO = true).
   Intercepts all /api/* fetch calls with realistic fake data so
   the full dashboard can be shown without any real services or keys.
   External URLs (Open-Meteo weather, RSS feeds, etc.) pass through.
───────────────────────────────────────────────────────── */
if (window.EARTH_DEMO) {
  const _realFetch = window.fetch.bind(window);

  // ── Demo config (mirrors a real earth.yaml) ──────────────
  const DEMO_CFG = {
    name: 'Alex',
    location: { name: 'London, UK', lat: 51.5074, lng: -0.1278 },
    theme: 'dark',

    workStart: '09:00',
    workEnd: '18:00',
    services: [
      { id: 's1',  name: 'Jellyfin',       logo: 'jellyfin',      adapter: 'jellyfin',      url: 'http://jellyfin.local:8096',   color: '#00a4dc', stats: [], section: 'Media'     },
      { id: 's2',  name: 'Radarr',         logo: 'radarr',        adapter: 'radarr',        url: 'http://radarr.local:7878',     color: '#ffc230', stats: [], section: 'Media'     },
      { id: 's3',  name: 'Sonarr',         logo: 'sonarr',        adapter: 'sonarr',        url: 'http://sonarr.local:8989',     color: '#00ccff', stats: [], section: 'Media'     },
      { id: 's4',  name: 'Immich',         logo: 'immich',        adapter: 'immich',        url: 'http://immich.local:2283',     color: '#4250af', stats: [], section: 'Media'     },
      { id: 's5',  name: 'qBittorrent',    logo: 'qbittorrent',   adapter: 'qbittorrent',   url: 'http://localhost:8080',        color: '#2f67ba', stats: [], section: 'Downloads' },
      { id: 's6',  name: 'Home Assistant', logo: 'homeassistant', adapter: 'homeassistant', url: 'http://ha.local:8123',         color: '#18bcf2', stats: [], section: 'Home'      },
      { id: 's7',  name: 'AdGuard Home',   logo: 'adguard',       adapter: 'adguard',       url: 'http://adguard.local:3000',    color: '#67b346', stats: [], section: 'Network'   },
      { id: 's8',  name: 'Portainer',      logo: 'portainer',     adapter: 'ping',          url: 'http://portainer.local:9000',  color: '#13bef9', stats: [], section: 'Infra'     },
      { id: 's9',  name: 'Proxmox',        logo: 'proxmox',       adapter: 'ping',          url: 'http://proxmox.local:8006',    color: '#e57000', stats: [], section: 'Infra'     },
      { id: 's10', name: 'Grafana',        logo: 'grafana',       adapter: 'ping',          url: 'http://grafana.local:3000',    color: '#f46800', stats: [], section: 'Infra'     },
    ],
    links: [
      { id: 'l1', name: 'Home Assistant', url: 'http://ha.local',        color: '#18bcf2', desc: 'Smart home' },
      { id: 'l2', name: 'Portainer',      url: 'http://portainer.local', color: '#13bef9', desc: 'Containers' },
      { id: 'l3', name: 'Proxmox',        url: 'http://proxmox.local',   color: '#e57000', desc: 'Hypervisor' },
      { id: 'l4', name: 'Grafana',        url: 'http://grafana.local',   color: '#f46800', desc: 'Monitoring' },
    ],
    feeds: [
      { id: 'f1', name: 'Hacker News',  url: 'https://news.ycombinator.com/rss' },
      { id: 'f2', name: 'The Verge',    url: 'https://www.theverge.com/rss/index.xml' },
      { id: 'f3', name: 'Ars Technica', url: 'https://feeds.arstechnica.com/arstechnica/index' },
    ],
    externalStatus: [
      { id: 'es1', name: 'GitHub',     logo: 'github',     url: 'https://www.githubstatus.com/api/v2/status.json'    },
      { id: 'es2', name: 'Cloudflare', logo: 'cloudflare', url: 'https://www.cloudflarestatus.com/api/v2/status.json' },
    ],
  };

  // ── Calendar — different events per weekday for realistic nav ──
  const _EVT_POOLS = {
    0: [ // Sunday
      { s: 'Farmers market',    h: 10, m:  0, d: 90,  loc: 'Borough Market'         },
      { s: 'Family call',       h: 14, m:  0, d: 60,  loc: ''                       },
    ],
    1: [ // Monday
      { s: 'Team standup',      h:  9, m:  0, d: 15,  loc: ''                       },
      { s: 'Sprint planning',   h: 10, m:  0, d: 90,  loc: 'Conf room B'            },
      { s: 'Lunch with Sarah',  h: 12, m: 30, d: 60,  loc: 'The Ivy, Covent Garden' },
      { s: 'Sprint review',     h: 15, m:  0, d: 60,  loc: ''                       },
    ],
    2: [ // Tuesday
      { s: 'Team standup',      h:  9, m:  0, d: 15,  loc: ''                       },
      { s: '1:1 with manager',  h: 11, m:  0, d: 30,  loc: ''                       },
      { s: 'Dentist',           h: 17, m: 30, d: 45,  loc: 'Dental Care, Holborn'   },
    ],
    3: [ // Wednesday
      { s: 'Team standup',      h:  9, m:  0, d: 15,  loc: ''                       },
      { s: 'Architecture review',h:14, m:  0, d: 60,  loc: ''                       },
      { s: 'Gym',               h: 18, m:  0, d: 60,  loc: 'PureGym'                },
    ],
    4: [ // Thursday
      { s: 'Team standup',      h:  9, m:  0, d: 15,  loc: ''                       },
      { s: 'Design critique',   h: 10, m: 30, d: 45,  loc: ''                       },
      { s: 'Tech leads sync',   h: 14, m:  0, d: 30,  loc: ''                       },
      { s: 'Code review',       h: 16, m:  0, d: 30,  loc: ''                       },
    ],
    5: [ // Friday
      { s: 'Team standup',      h:  9, m:  0, d: 15,  loc: ''                       },
      { s: 'Product demo',      h: 11, m:  0, d: 60,  loc: ''                       },
      { s: 'Team lunch',        h: 12, m: 30, d: 90,  loc: 'Flat Iron, Soho'        },
      { s: 'Retrospective',     h: 16, m:  0, d: 60,  loc: ''                       },
    ],
    6: [ // Saturday
      { s: 'Parkrun',           h:  9, m:  0, d: 30,  loc: 'Victoria Park'          },
      { s: 'Brunch',            h: 11, m:  0, d: 90,  loc: 'Dishoom, Shoreditch'    },
      { s: 'Homelab tinkering', h: 15, m:  0, d: 120, loc: ''                       },
    ],
  };

  function _demoEvents(dateStr) {
    const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
    const pool = _EVT_POOLS[d.getDay()] || [];
    return pool.map(ev => {
      const start = new Date(d); start.setHours(ev.h, ev.m, 0, 0);
      const end   = new Date(start); end.setMinutes(end.getMinutes() + ev.d);
      return { summary: ev.s, start: start.toISOString(), end: end.toISOString(), allDay: false, location: ev.loc };
    });
  }

  // ── System stats — completely unhinged specs ─────────────
  const DEMO_SYSINFO = {
    status: 'ok', source: 'node',
    stats: [
      { key: 'cpu',    label: 'CPU',               value: '2.1',  format: 'percent', bar: true, sub: '256 cores · 6.2 GHz'          },
      { key: 'mem',    label: 'RAM',               value: '12.4', format: 'percent', bar: true, sub: '158.3 GB / 1.0 TB'            },
      { key: 'disk',   label: 'Disk /',            value: '8',    format: 'percent', bar: true, sub: '3.8 TB / 48 TB'               },
      { key: 'disk_1', label: 'Disk /mnt/array',   value: '61',   format: 'percent', bar: true, sub: '244 TB / 400 TB'              },
      { key: 'disk_2', label: 'Disk /mnt/backup',  value: '34',   format: 'percent', bar: true, sub: '51 TB / 150 TB'               },
      { key: 'net_tx', label: 'Net ↑',             value: 11743488000,  format: 'speed'                                             },
      { key: 'net_rx', label: 'Net ↓',             value: 98453504000,  format: 'speed'                                             },
      { key: 'load',   label: 'Load avg',          value: '0.04 · 0.07 · 0.05', sub: '1m · 5m · 15m', format: 'text'               },
      { key: 'uptime', label: 'Uptime',            value: '847d 13h 6m', format: 'text'                                             },
    ],
  };

  // ── Service adapter stats ─────────────────────────────────
  const DEMO_SVCS = {
    jellyfin:      { service: 'jellyfin',      label: 'Jellyfin',       status: 'ok', stats: [
      { key: 'movies',   label: 'Movies',   value: 31847,  format: 'number' },
      { key: 'shows',    label: 'TV Shows', value: 4312,   format: 'number' },
      { key: 'episodes', label: 'Episodes', value: 208934, format: 'number' },
      { key: 'sessions', label: 'Streams',  value: 7,      format: 'number' },
    ]},
    radarr:        { service: 'radarr',        label: 'Radarr',         status: 'ok', stats: [
      { key: 'movies',  label: 'Movies',  value: 31847, format: 'number' },
      { key: 'missing', label: 'Missing', value: 2,     format: 'number' },
      { key: 'queued',  label: 'Queued',  value: 14,    format: 'number' },
    ]},
    sonarr:        { service: 'sonarr',        label: 'Sonarr',         status: 'ok', stats: [
      { key: 'series',   label: 'Series',   value: 4312,   format: 'number' },
      { key: 'episodes', label: 'Episodes', value: 208934, format: 'number' },
      { key: 'missing',  label: 'Missing',  value: 3,      format: 'number' },
    ]},
    immich:        { service: 'immich',        label: 'Immich',          status: 'ok', stats: [
      { key: 'photos',  label: 'Photos',  value: 847293, format: 'number'  },
      { key: 'videos',  label: 'Videos',  value: 23841,  format: 'number'  },
      { key: 'storage', label: 'Storage', value: '14.2', format: 'percent', bar: true, sub: '5.7 TB / 40 TB' },
    ]},
    qbittorrent:   { service: 'qbittorrent',   label: 'qBittorrent',    status: 'ok', stats: [
      { key: 'downloading', label: 'Downloading', value: 8,           format: 'number' },
      { key: 'seeding',     label: 'Seeding',     value: 3847,        format: 'number' },
      { key: 'dl_speed',    label: '↓ Speed',     value: 1258291200,  format: 'speed'  },
      { key: 'ul_speed',    label: '↑ Speed',     value: 943718400,   format: 'speed'  },
    ]},
    homeassistant: { service: 'homeassistant', label: 'Home Assistant', status: 'ok', stats: [
      { key: 'entities',    label: 'Entities',    value: 847, format: 'number' },
      { key: 'automations', label: 'Automations', value: 203, format: 'number' },
      { key: 'addons',      label: 'Add-ons',     value: 34,  format: 'number' },
    ]},
    adguard:       { service: 'adguard',       label: 'AdGuard Home',   status: 'ok', stats: [
      { key: 'queries',    label: 'Queries today', value: 2847293, format: 'number'  },
      { key: 'blocked',    label: 'Blocked',       value: 847102,  format: 'number'  },
      { key: 'block_rate', label: 'Block rate',    value: '29.8',  format: 'percent' },
    ]},
    ping:          { service: 'ping', label: 'Service', status: 'ok', stats: [] },
  };

  // ── Home Assistant entities ───────────────────────────────
  const DEMO_HA = {
    automation: [
      { entity_id: 'automation.morning_lights',   state: 'on',  attributes: { friendly_name: 'Morning Lights',    last_triggered: new Date(Date.now() - 28800000).toISOString() } },
      { entity_id: 'automation.goodnight',        state: 'on',  attributes: { friendly_name: 'Goodnight Routine', last_triggered: new Date(Date.now() - 86400000).toISOString() } },
      { entity_id: 'automation.arrival_home',     state: 'on',  attributes: { friendly_name: 'Arrival Home',      last_triggered: new Date(Date.now() - 57600000).toISOString() } },
      { entity_id: 'automation.away_mode',        state: 'off', attributes: { friendly_name: 'Away Mode',         last_triggered: new Date(Date.now() - 604800000).toISOString() } },
      { entity_id: 'automation.heating_schedule', state: 'on',  attributes: { friendly_name: 'Heating Schedule',  last_triggered: new Date(Date.now() - 14400000).toISOString() } },
    ],
    scene: [
      { entity_id: 'scene.movie_time', state: 'scening', attributes: { friendly_name: 'Movie Time' } },
      { entity_id: 'scene.dinner',     state: 'scening', attributes: { friendly_name: 'Dinner'     } },
      { entity_id: 'scene.bright',     state: 'scening', attributes: { friendly_name: 'Bright'     } },
      { entity_id: 'scene.relax',      state: 'scening', attributes: { friendly_name: 'Relax'      } },
    ],
    script: [
      { entity_id: 'script.tv_off',         state: 'off', attributes: { friendly_name: 'TV Off'          } },
      { entity_id: 'script.bedtime_routine', state: 'off', attributes: { friendly_name: 'Bedtime Routine' } },
    ],
  };

  // ── Helper: build a fake Response ────────────────────────
  function _r(data, status) {
    return Promise.resolve(new Response(JSON.stringify(data), {
      status: status || 200, headers: { 'Content-Type': 'application/json' },
    }));
  }

  // ── Intercept fetch ───────────────────────────────────────
  window.fetch = (url, opts) => {
    const urlStr = (typeof url === 'string' ? url : (url instanceof Request ? url.url : String(url)));
    if (!urlStr.startsWith('/api/')) return _realFetch(url, opts);

    const [path, qs] = urlStr.split('?');
    const params     = Object.fromEntries(new URLSearchParams(qs || ''));
    const method     = ((opts && opts.method) || 'GET').toUpperCase();

    // Config — reads return demo config; writes are silent no-ops
    if (path === '/api/config')     return method === 'POST' ? _r({ ok: true }) : _r(DEMO_CFG);
    if (path === '/api/config/raw') return _r('# demo mode\nname: Alex\n');

    // Calendar
    if (path === '/api/calendar/today')   return _r({ events: _demoEvents(params.date || '') });
    if (path === '/api/calendar-status')  return _r({ configured: true });
    if (path === '/api/set-calendar-url') return _r({ ok: true });

    // Email — hidden in demo so only calendar shows in the day panel
    if (path === '/api/gmail/recent')    return _r({ emails: [] });
    if (path === '/api/gmail-status')    return _r({ configured: false });
    if (path === '/api/set-gmail-creds') return _r({ ok: true });

    // System info
    if (path === '/api/sysinfo') return _r(DEMO_SYSINFO);

    // Service adapters (/api/jellyfin, /api/radarr, etc.)
    const svcKey = path.replace('/api/', '');
    if (DEMO_SVCS[svcKey]) return _r(DEMO_SVCS[svcKey]);

    // Home Assistant
    if (path === '/api/ha/states')  return _r(DEMO_HA[params.domain] || []);
    if (path === '/api/ha/service') return _r({ ok: true });

    // Status page checks — always green
    if (path === '/api/status-check') return _r({ indicator: 'none', description: 'All Systems Operational' });

    // Services list
    if (path === '/api/services') return _r(Object.keys(DEMO_SVCS).map(k => ({ key: k, label: DEMO_SVCS[k].label, enabled: true })));

    // Feature toggles — TMDB/LastFM/Mistral unconfigured so the "add key" UX shows
    if (path === '/api/mistral-status') return _r({ configured: false });
    if (path === '/api/ai-status') return _r({ mistral: false, openai: false, anthropic: false, gemini: false });
    if (path === '/api/tmdb-status')    return _r({ configured: false });
    if (path === '/api/lastfm-status')  return _r({ configured: false });

    // Onboard / token writes — silent no-ops
    if (path === '/api/onboard')         return _r({ ok: true });
    if (path === '/api/set-tmdb-token')  return _r({ ok: true });
    if (path === '/api/set-lastfm-key')  return _r({ ok: true });

    // LLM (Mistral) — not "configured" above so shouldn't be called, guard anyway
    if (path === '/api/llm') return _r({ choices: [{ message: { content: 'Demo mode.' } }] });

    // Everything else (feeds, health, TMDB proxy if key exists, etc.) — pass through
    return _realFetch(url, opts);
  };
}

function relTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr), now = new Date();
  const diff = now - d;
  if (diff < 0) return 'just now';
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

/* ── stale-while-revalidate feed cache ────────────────────
   Last good items per feed live in localStorage: render them
   instantly on load, then refresh in the background. */
const FEED_CACHE = 'earth:feedcache:v2';
function feedCacheRead(kind, key) {
  try {
    const hit = JSON.parse(localStorage.getItem(FEED_CACHE) || '{}')[`${kind}:${key}`];
    return hit ? hit.items : null;
  } catch { return null; }
}
function feedCacheWrite(kind, key, items) {
  try {
    const all = JSON.parse(localStorage.getItem(FEED_CACHE) || '{}');
    all[`${kind}:${key}`] = { at: Date.now(), items };
    const keys = Object.keys(all); // keep the cache bounded
    if (keys.length > 40)
      keys.sort((a, b) => all[a].at - all[b].at).slice(0, keys.length - 40).forEach(k => delete all[k]);
    localStorage.setItem(FEED_CACHE, JSON.stringify(all));
  } catch {}
}

function readSet() {

// Best-effort image for a feed item: media:content / media:thumbnail,
// an image enclosure, or the first <img> in the item's HTML.
function feedItemImage(el, html) {
  for (const tag of ['media:content', 'media:thumbnail']) {
    for (const m of el.getElementsByTagName(tag)) {
      const u = m.getAttribute('url') || '';
      const t = m.getAttribute('type') || '';
      const medium = m.getAttribute('medium') || '';
      if (u && (tag === 'media:thumbnail' || medium === 'image' || /^image\//.test(t)
                || /\.(jpe?g|png|webp|gif|avif)(\?|$)/i.test(u))) return u;
    }
  }
  const enc = el.querySelector('enclosure');
  if (enc && /^image\//.test(enc.getAttribute('type') || '') && enc.getAttribute('url'))
    return enc.getAttribute('url');
  return (html || '').match(/<img[^>]+src=["']([^"']+)["']/i)?.[1] || '';
}

function parseRSSItems(xml) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  const items = [];
  doc.querySelectorAll('item, entry').forEach(el => {
    const get = s => el.querySelector(s)?.textContent?.trim() || '';
    const attr = (s, a) => el.querySelector(s)?.getAttribute(a) || '';
    const link = get('link') || attr('link[rel="alternate"]', 'href') || attr('link', 'href');
    const date = get('pubDate') || get('published') || get('updated');
    const title = get('title').replace(/<!\[CDATA\[(.*?)\]\]>/s, '$1').trim();
    // querySelector can't reach namespaced content:encoded — getElementsByTagName can
    const rawDesc = get('description') || get('summary') || get('content')
      || el.getElementsByTagName('content:encoded')[0]?.textContent?.trim() || '';
    const desc = rawDesc.replace(/<!\[CDATA\[(.*?)\]\]>/s, '$1').replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim().slice(0, 220);
    if (!title) return;
    items.push({ title, link, date, desc, image: feedItemImage(el, rawDesc) });
  });
  return items.slice(0, 25);
}

function parseYouTubeItems(xml) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  const items = [];
  doc.querySelectorAll('entry').forEach(el => {
    const get = s => el.querySelector(s)?.textContent?.trim() || '';
    const ytId = get('id') || '';
    const linkHref = el.querySelector('link')?.getAttribute('href') || '';
    const videoId = ytId.startsWith('yt:video:') ? ytId.replace('yt:video:', '')
      : linkHref.match(/v=([^&]+)/)?.[1] || linkHref.match(/shorts\/([^?/]+)/)?.[1] || '';
    const title = get('title').replace(/<!\[CDATA\[(.*?)\]\]>/s, '$1').trim();
    const published = get('published');
    if (!videoId || !title) return;
    // Skip Shorts: identified by /shorts/ in the link URL or #shorts in the title
    if (linkHref.includes('/shorts/') || /#shorts/i.test(title)) return;
    items.push({
      videoId, title, published,
      thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
    });
  });
  return items.slice(0, 8);
}

async function generateForecastNarrative(forecastData, locationName, personality, { customPrompt, aiProvider } = {}) {
  const days = forecastData.daily.time.map((date, i) => {
    const d = new Date(date);
    const name = d.toLocaleDateString('en-GB', { weekday: 'long' });
    return `${name}: ${WX_CODES[forecastData.daily.weathercode[i]] || 'Variable'}, ${Math.round(forecastData.daily.temperature_2m_min[i])}–${Math.round(forecastData.daily.temperature_2m_max[i])}°C, rain ${(forecastData.daily.precipitation_sum[i] || 0).toFixed(1)}mm, wind up to ${Math.round(forecastData.daily.windspeed_10m_max[i])} mph`;
  }).join('\n');

  const p = personality || 'sarcastic';
  const provider = aiProvider || 'mistral';

  const PROMPTS = {
    normal:
      `Write a clear, practical 7-day weather forecast for ${locationName}. One sentence per day. ` +
      `Cover temperature range, precipitation, and notable conditions. Suggest clothing or activity adjustments where useful. ` +
      `Write in plain prose — no bullet points, no markdown, one line per day, under 190 words.`,

    sarcastic:
      `You are a veteran weather presenter who has watched ${locationName} disappoint everyone for thirty years. ` +
      `Write a 7-day forecast — dry, sardonic, quietly exhausted. Rain arrives with resigned inevitability. ` +
      `Sun gets a suspicious squint. Wind is "that thing off the water again." ` +
      `Drop one wry practical note per forecast (umbrella, layers, stay inside). ` +
      `No corporate weather-speak. Plain text, one line per day, under 190 words.`,

    rude:
      `You are a weather forecaster who is openly furious about the weather and furious at anyone asking about it. ` +
      `Write a 7-day forecast for ${locationName} — genuinely rude, contemptuous, and zero patience. ` +
      `Rain is "obviously it's going to rain, it always rains." Sunshine is "don't get used to it." Cold is "your own fault for living here." ` +
      `Use short, clipped sentences. Express real irritation. Still technically informative but delivered with obvious disdain. ` +
      `Plain text, one line per day, under 190 words.`,

    cheerful:
      `You are an unstoppably, possibly delusional optimist presenting the weather for ${locationName}. ` +
      `Write a 7-day forecast finding the absolute best in everything. Torrential rain is "the garden will love this." ` +
      `Grey skies are "beautifully moody." Gale-force wind is "nature's free exfoliation." ` +
      `Your positivity borders on a medical condition but you're fully committed. ` +
      `Plain text, one line per day, under 190 words.`,

    depressed:
      `You are a weather forecaster in the grip of a quiet existential crisis. ` +
      `Write a 7-day forecast for ${locationName} with a melancholic, introspective tone — the weather feels like a metaphor. ` +
      `Even a clear day carries a hint of something ending. Rain is rain but also everything else. ` +
      `Keep it poetic and still informative. No wallowing, just wistfulness. ` +
      `Plain text, one line per day, under 190 words.`,

    custom: customPrompt
      ? `${customPrompt.trim()}\n\nLocation: ${locationName}. Plain text only, no markdown, one line per day, under 190 words.`
      : null,
  };

  const systemPrompt = PROMPTS[p] ?? PROMPTS.sarcastic;
  if (!systemPrompt) throw new Error('Custom prompt is empty — add one in Settings → General.');

  const model = AI_DEFAULT_MODELS[provider] || AI_DEFAULT_MODELS.mistral;
  const text = await llmChat({ provider, model, messages: [{ role: 'user', content: `${systemPrompt}\n\nForecast data:\n${days}` }], max_tokens: 400 });
  return text.trim() || null;
}

const WX_CODES = {
  0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Fog',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',
  80:'Showers',81:'Heavy showers',82:'Violent showers',
  95:'Thunderstorm',96:'Thunderstorm + hail',99:'Thunderstorm + heavy hail',
};
function wxIcon(wmo) {
  if (wmo <= 1) return I.wx_sun;
  if (wmo <= 3) return I.wx_cloud;
  if (wmo >= 71 && wmo <= 77) return I.wx_cloud;
  if (wmo >= 51) return I.wx_cloud;
  return I.wx_sun;
}

function useWeather(lat, lng) {
  const [wx, setWx] = useState(null);
  const [error, setError] = useState(false);
  useEffect(() => {
    if (!lat || !lng) return;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&hourly=windspeed_10m&windspeed_unit=mph&temperature_unit=celsius&timezone=auto`,
      { signal: AbortSignal.timeout(10000) })
      .then(r => { if (!r.ok) throw new Error('weather failed'); return r.json(); })
      .then(d => { setWx(d.current_weather || null); setError(!d.current_weather); })
      .catch(() => setError(true));
  }, [lat, lng]);
  return { wx, error };
}

/* ─────────────────────────────────────────────────────────

───────────────────────────────────────────────────────── */
function WeatherModal({ cfg, onClose }) {
  const [forecast, setForecast] = useState(null);
  const [narrative, setNarrative] = useState(undefined); // undefined = pending, null = unavailable
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selectedDay, setSelectedDay] = useState(0);

  useEffect(() => {
    const { lat, lng, name } = cfg.location || {};
    if (!lat || !lng) { setError('No location configured.'); setLoading(false); return; }
    fetchForecast7Day(lat, lng)
      .then(data => {
        setForecast(data);
        setLoading(false); // show the grid as soon as the data is in
        // narrative is decoration — its failure must never hide the forecast
        generateForecastNarrative(data, name || 'your area', cfg.weatherPersonality, { customPrompt: cfg.weatherCustomPrompt, aiProvider: cfg.aiProvider })
          .then(text => setNarrative(text || null))
          .catch(() => setNarrative(null));
      })
      .catch(() => { setError('Could not load forecast.'); setLoading(false); });
  }, []);

  // Close on backdrop click
  const handleBg = e => { if (e.target === e.currentTarget) onClose(); };

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  return h('div', { className: 'modal-bg', onClick: handleBg },
    h('div', { className: 'modal' },
      h('div', { className: 'modal-hd' },
        h('div', { className: 'modal-titles' },
          h('span', { className: 'modal-title' }, '7-day forecast'),
          h('span', { className: 'modal-sub' }, cfg.location?.name || 'Your location'),
        ),
        h('button', { type: 'button', className: 'modal-close', onClick: onClose, title: 'Close' }, '×')
      ),
      h('div', { className: 'modal-body' },

        // ── Day grid (top) ──
        !loading && !error && forecast && h('div', { className: 'fx-days fx-days-scroll' },
          ...(forecast.daily?.time || []).map((dateStr, i) => {
            const d   = new Date(dateStr);
            const wmo = forecast.daily.weathercode[i];
            const hi  = Math.round(forecast.daily.temperature_2m_max[i]);
            const lo  = Math.round(forecast.daily.temperature_2m_min[i]);
            const rain = (forecast.daily.precipitation_sum[i] || 0).toFixed(1);
            const condLabel = (WX_CODES[wmo] || 'Variable')
              .replace('Mainly clear','Clear').replace('Light drizzle','Drizzle')
              .replace('Heavy drizzle','Drizzle').replace('Light rain','L. Rain')
              .replace('Heavy rain','H. Rain').replace('Light snow','L. Snow')
              .replace('Heavy snow','H. Snow').replace('Heavy showers','Showers')
              .replace('Violent showers','Showers').replace('Thunderstorm + hail','Thunder')
              .replace('Thunderstorm + heavy hail','Thunder').replace('Icy fog','Fog');
            const isSelected = i === selectedDay;
            return h('div', {
              className: 'fx-day' + (i === 0 ? ' fx-today' : '') + (isSelected ? ' fx-selected' : ''),
              key: i,
              onClick: () => setSelectedDay(i),
              role: 'button',
              tabIndex: 0,
            },
              h('span', { className: 'fx-dn' }, i === 0 ? 'Today' : dayNames[d.getDay()]),
              h(WxDayIcon, { wmo, size: 22 }),
              h('span', { className: 'fx-hi' }, `${hi}°`),
              h('span', { className: 'fx-lo' }, `${lo}°`),
              h('span', { className: 'fx-cond' }, condLabel),
              parseFloat(rain) > 0 && h('span', { className: 'fx-rain' }, `${rain}mm`),
            );
          })
        ),

        // ── Per-day narrative rows (below grid) ──
        loading || (!error && narrative === undefined)
          ? h('div', { className: 'fx-loading', style: { marginTop: 18 } },
              h('svg', { width: 14, height: 14, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, className: 'spin' },
                h('path', { d: 'M21 12a9 9 0 11-6.219-8.56' })),
              'Consulting the skies...'
            )
          : error
            ? h('p', { style: { fontSize: '.8rem', color: 'var(--r)', marginTop: 16 } }, error)
            : narrative && forecast && (() => {
                const lines = stripMd(narrative).split('\n').filter(l => l.trim());
                const days  = forecast.daily?.time || [];
                const i     = selectedDay;
                const dateStr = days[i];
                if (!dateStr) return null;
                const d   = new Date(dateStr);
                const wmo = forecast.daily.weathercode[i];
                const hi  = Math.round(forecast.daily.temperature_2m_max[i]);
                const lo  = Math.round(forecast.daily.temperature_2m_min[i]);
                const dayLabel = i === 0 ? 'Today' : d.toLocaleDateString('en-GB', { weekday: 'long' });
                const text = stripDayPrefix(lines[i] || '');
                return h('div', { className: 'fx-dl-wrap' },
                  h('div', { className: 'fx-dl' },
                    h('div', { className: 'fx-dl-hd' },
                      h(WxDayIcon, { wmo, size: 17 }),
                      h('span', { className: 'fx-dl-day' }, dayLabel),
                      h('span', { className: 'fx-dl-range' }, `${hi}° / ${lo}°`),
                    ),
                    text && h('p', { className: 'fx-dl-text' }, text),

                );
              })(),

  );
}

/* ─────────────────────────────────────────────────────────
   DAY PANEL — today's calendar events + recent emails
───────────────────────────────────────────────────────── */
function DayPanel({ backend }) {
  const [dayOffset, setDayOffset] = useState(0);
  const [events, setEvents]       = useState(null);  // null = loading
  const [emails, setEmails]       = useState(null);
  const [calErr, setCalErr]       = useState(null);
  const [mailErr, setMailErr]     = useState(null);
  // Stay true once we know calendar/email is reachable — prevents section vanishing during day nav
  const [calReady, setCalReady]   = useState(false);
  const [mailReady, setMailReady] = useState(false);
  const [calExpanded, setCalExpanded] = useState(false);

  const getOffsetDate = (offset) => {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d;
  };

  const navLabel = (() => {
    if (dayOffset === 0)  return 'Today';
    if (dayOffset === 1)  return 'Tomorrow';
    if (dayOffset === -1) return 'Yesterday';
    const d = getOffsetDate(dayOffset);
    const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  })();

  const getDateParam = (offset) => {
    const d = getOffsetDate(offset);
    return `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}`;
  };

  // Fetch emails once on mount (inbox is always "today")
  useEffect(() => {
    if (!backend) return;
    fetch('/api/gmail/recent')
      .then(r => r.json())
      .then(j => {
        setEmails(j.emails || []);
        if (j.error) setMailErr(j.error);
        if (!j.error || !j.error.includes('not configured')) setMailReady(true);
      })
      .catch(e => { setMailErr(String(e?.message || e)); setMailReady(true); });
  }, [backend]);

  // Re-fetch calendar events whenever the day changes
  useEffect(() => {
    if (!backend) return;
    setEvents(null);
    setCalErr(null);
    setCalExpanded(false);
    const dateParam = dayOffset === 0 ? '' : `?date=${getDateParam(dayOffset)}`;
    fetch(`/api/calendar/today${dateParam}`)
      .then(r => r.json())
      .then(j => {
        setEvents(j.events || []);
        if (j.error) setCalErr(j.error);
        if (!j.error || !j.error.includes('not configured')) setCalReady(true);
      })
      .catch(e => { setCalErr(String(e?.message || e)); setCalReady(true); });
  }, [backend, dayOffset]);

  const fmtTime = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    return `${padZ(d.getHours())}:${padZ(d.getMinutes())}`;
  };

  const calUnconfigured  = calErr && calErr.includes('not configured');
  const mailUnconfigured = mailErr && mailErr.includes('not configured');

  if (!backend) return null;

  // calReady/mailReady latch true on first response; prevents section disappearing during nav loading
  const hasCalendar = calReady && !calUnconfigured;
  const hasEmail    = mailReady && !mailUnconfigured;
  if (!hasCalendar && !hasEmail) return null;

  // Chevron icon paths
  const chevL = 'M15 18l-6-6 6-6';
  const chevR = 'M9 18l6-6-6-6';

  return h('div', { className: 'day-panel' },

    // CALENDAR
    hasCalendar && h('div', { className: 'day-section' },

/* ── live stats from the backend proxy ──────────────────── */
function fmtBytes(n) {
  n = Number(n) || 0;
  if (n >= 1e12) return `${(n / 1e12).toFixed(1)} TB`;
  if (n >= 1e9)  return `${(n / 1e9).toFixed(1)} GB`;
  if (n >= 1e6)  return `${(n / 1e6).toFixed(1)} MB`;
  if (n >= 1e3)  return `${(n / 1e3).toFixed(1)} kB`;
  return `${Math.round(n)} B`;
}
function fmtStatVal(s) {
  switch (s.format) {
    case 'bytes':   return fmtBytes(s.value);
    case 'speed':   return `${fmtBytes(s.value)}/s`;
    case 'percent': return `${Number(s.value).toFixed(1)}%`;
    case 'number':  return Number(s.value).toLocaleString();
    default:        return String(s.value ?? '');
  }
}
const adapterKey = svc => svc.adapter || svc.logo;

// Polls /api/:adapter for each configured service. stats[svc.id] is
// undefined while loading, then { status, stats[], error? }.
function useServiceStats(services) {
  const [stats, setStats] = useState({});
  const sig = JSON.stringify((services || []).map(s => s.id + ':' + adapterKey(s)));
  useEffect(() => {
    if (!backendAvailable || !services?.length) return;
    let dead = false;
    // Track adapter keys that returned 404 (unknown adapter) — stop polling them
    const notFound = new Set();
    const load = () => services.forEach(svc => {
      const key = adapterKey(svc);
      if (!key || notFound.has(key)) return;
      fetch(`/api/${encodeURIComponent(key)}?svcid=${encodeURIComponent(svc.id)}`, { signal: AbortSignal.timeout(15000) })
        .then(r => r.json().then(j => ({ status: r.status, ok: r.ok, j })).catch(() => ({ status: r.status, ok: false, j: {} })))
        .then(({ status, ok, j }) => {
          if (dead) return;
          // 404 = adapter doesn't exist — don't keep hammering the server
          if (status === 404) { notFound.add(key); setStats(p => ({ ...p, [svc.id]: { status: 'unconfigured' } })); return; }
          setStats(p => ({ ...p, [svc.id]: ok ? j : { status: j.status || 'error', error: j.error } }));
        })
        .catch(() => { if (!dead) setStats(p => ({ ...p, [svc.id]: { status: 'error' } })); });
    });
    load();
    const id = setInterval(load, 30000);
    return () => { dead = true; clearInterval(id); };
  }, [sig, backendAvailable]);
  return stats;
}

function ServiceWidget({ svc, live }) {
  // live === undefined  → backend present, still loading (pulse)
  // live.status 'ok'    → real stats
  // live.status 'error' → red dot, fall back to configured stats
  // 'unconfigured' / no backend → configured (demo) stats
  const loading = backendAvailable && live === undefined;
  const isLive  = live?.status === 'ok' && Array.isArray(live.stats);
  const isErr   = live?.status === 'error';

  // Build rows from live data or fallback config
  // statsVisible: array of stat keys to show; null/[] = show all
  const rows = isLive
    ? live.stats
        .filter(s => !svc.statsVisible?.length || svc.statsVisible.includes(s.key))
        .map(s => ({ k: s.label, v: fmtStatVal(s) }))
    : (svc.stats || []);

  const primary   = rows[0] || null;
  const secondary = rows.slice(1);

  const dotCls    = isLive ? 'live' : isErr ? 'err' : 'demo';
  const dotTitle  = isLive ? 'Live' : isErr ? 'Unreachable' : 'Demo data';
  const statusLbl = isLive ? 'Live' : isErr ? 'Down' : !backendAvailable ? 'Demo' : 'Connecting…';

  return h('div', { className: 'widget', style: { '--wc': svc.color || 'var(--a)' } },
    // Header: logo + name + link
    h('div', { className: 'widget-hd' },
      h('div', { className: 'widget-logo' }, h(ServiceLogo, { logo: svc.logo })),
      h('span', { className: 'widget-name' }, svc.name),
      svc.url && h('a', {
        className: 'widget-url', href: svc.url, target: '_blank',
        rel: 'noreferrer', title: `Open ${svc.name}`
      }, '↗'),
    ),
    // Primary stat — large featured value
    primary && h('div', { className: 'stat-primary' },
      h('span', { className: 'stat-primary-val' + (loading ? ' pulse' : '') },
        loading ? '···' : primary.v
      ),
      h('span', { className: 'stat-primary-lbl' }, primary.k),
    ),
    // Secondary stats — compact table
    secondary.length > 0 && h('div', { className: 'widget-stats' },
      ...secondary.map((s, i) =>
        h('div', { className: 'stat-row', key: i },
          h('span', { className: 'stat-k' }, s.k),
          h('span', { className: 'stat-v' + (loading ? ' pulse' : '') },
            loading ? '···' : s.v
          ),
        )
      )
    ),
    // Status footer
    h('div', { className: 'widget-foot' },
      h('span', { className: `widget-status-dot ${dotCls}`, title: dotTitle }),
      h('span', { className: 'widget-status-lbl' }, statusLbl),

  );
}

function ServicesRow({ services }) {
  const live = useServiceStats(services);
  // collapsed sections — persisted per-session in localStorage
  const [collapsed, setCollapsed] = useState(() => {
    try { return JSON.parse(localStorage.getItem('earth:collapsed-sections') || '{}'); } catch { return {}; }
  });
  const toggleSection = name => {
    const next = { ...collapsed, [name]: !collapsed[name] };
    setCollapsed(next);
    try { localStorage.setItem('earth:collapsed-sections', JSON.stringify(next)); } catch {}
  };

  if (!services?.length) return null;

  // Group services by section; undefined/empty → DEFAULT_SECTION sentinel
  const DEFAULT = '__default__';
  const groups = [];
  const seen = new Map();
  for (const s of services) {
    const key = s.section?.trim() || DEFAULT;
    if (!seen.has(key)) { seen.set(key, []); groups.push(key); }
    seen.get(key).push(s);
  }

  // If everything is in the default group, render the old flat layout
  if (groups.length === 1 && groups[0] === DEFAULT) {
    return h(SectionRow, { title: 'Services', note: `${services.length} configured` },
      ...services.map(s => h(ServiceWidget, { key: s.id, svc: s, live: live[s.id] }))
    );
  }

  // Multi-section layout
  return h('div', { className: 'svc-sections' },
    groups.map(key => {
      const group  = seen.get(key);
      const label  = key === DEFAULT ? 'Services' : key;
      const isOpen = !collapsed[key];
      return h('div', { key, className: 'svc-section' },
        h('div', {
          className: 'svc-section-hd',
          onClick: () => toggleSection(key),
        },
          h('div', { className: 'svc-section-toggle' + (isOpen ? '' : ' closed') },
            h(Icon, { d: I.collapse, size: 11 }),
          ),
          h('span', { className: 'svc-section-lbl' }, label),
          h('span', { className: 'svc-section-count' }, group.length),
        ),
        isOpen && h('div', { className: 'row-outer' },
          h('div', { className: 'row-track' },
            group.map(s => h(ServiceWidget, { key: s.id, svc: s, live: live[s.id] }))
          ),
        ),
      );
    })
  );
}

───────────────────────────────────────────────────────── */
function useGlancesStats(url) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!backendAvailable) { setLoading(false); return; }
    let dead = false;
    const load = async () => {
      try {
        // Try Glances first if configured, fall back to built-in Node sysinfo
        let j = null;
        if (url) {
          try {
            const r = await fetch('/api/glances', { signal: AbortSignal.timeout(6000) });
            j = await r.json();
          } catch { /* will try sysinfo fallback */ }
        }
        // Fall back to /api/sysinfo (reads host stats via Node os module — always works)
        if (!j || j.status !== 'ok' || !j.stats?.length) {
          const r2 = await fetch('/api/sysinfo', { signal: AbortSignal.timeout(5000) });
          j = await r2.json();
          if (j?.stats) j._source = 'node';
        }
        if (!dead) { setData(j); setLoading(false); }
      } catch {
        if (!dead) setLoading(false);
      }
    };
    load();
    const id = setInterval(load, 8000);
    return () => { dead = true; clearInterval(id); };
  }, [url]);
  return { data, loading };
}

  const stats = data?.stats || [];

    mem && h(SysTile, { lbl: 'RAM', val: `${Number(mem.value).toFixed(1)}%`,

function useTilt() {
  const ref = useRef(null);
  const onMove = e => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top)  / r.height;
    el.style.setProperty('--rx', `${(y - 0.5) * -14}deg`);
    el.style.setProperty('--ry', `${(x - 0.5) *  14}deg`);
  };
  const onLeave = e => {
    const el = ref.current; if (!el) return;
    el.style.setProperty('--rx', '0deg');
    el.style.setProperty('--ry', '0deg');
  };
  return { ref, onMouseMove: onMove, onMouseLeave: onLeave };
}

function YouTubeRow({ channels, onGoSettings }) {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (!channels?.length) { setVideos([]); setLoading(false); setError(null); return; }
    let dead = false; // ignore late responses after unmount / channel-list change

    // 1) last good videos paint instantly (stale-while-revalidate)
    const cachedAll = channels.flatMap(ch =>
      (feedCacheRead('yt', ch.channelId) || []).map(v => ({ ...v, channelName: ch.name })));
    cachedAll.sort((a, b) => new Date(b.published) - new Date(a.published));
    setVideos(cachedAll);
    setLoading(!cachedAll.length);
    setError(null);

    // 2) fresh fetch in the background
    let serverMissing = false;
    const fetches = channels.map(ch =>
      fetchYTFeed(ch.channelId)
        .then(videos => { feedCacheWrite('yt', ch.channelId, videos); return videos.map(v => ({ ...v, channelName: ch.name })); })
        .catch(e => { if (e?.message === 'server-required') serverMissing = true; return null; })
    );
    Promise.all(fetches).then(results => {
      if (dead) return;
      const all = results.filter(Boolean).flat();
      all.sort((a, b) => new Date(b.published) - new Date(a.published));
      if (all.length) setVideos(all);
      else if (serverMissing) setError('Open via http://localhost:8787 — feeds need the backend server.');
      else if (!cachedAll.length) setError('Could not load videos. Check channel IDs in Settings.');
      setLoading(false);
    });
    return () => { dead = true; };
  }, [JSON.stringify(channels)]);

  if (!channels?.length) {
    return h('div', { className: 'section' },
      h('div', { className: 'section-hd' }, h('span', { className: 'section-title' }, 'YouTube')),
      h('div', { className: 'row-empty-cta' },
        h('p', null, 'No channels yet — add a few and the latest videos show up here.'),
        h('button', { type: 'button', className: 'btn btn-s', onClick: onGoSettings },
          h(Icon, { d: I.yt, size: 13 }), ' Add channels in Settings')
      )
    );
  }

  const title = channels.length === 1 ? channels[0].name : 'YouTube';
  return h(SectionRow, { title, note: 'YouTube', loading, empty: error || (!loading && !videos.length ? 'No videos loaded.' : null) },
    ...videos.map(v => h(YouTubeCard, { key: v.videoId, video: v, channelName: channels.length > 1 ? v.channelName : null }))
  );
}
